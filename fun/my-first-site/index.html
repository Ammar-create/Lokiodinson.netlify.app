<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaLab - AI Model Testing Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-4"/>
                        <path d="M14 3h7v7"/>
                        <path d="M21 3L12 12"/>
                    </svg>
                    <span>AquaLab</span>
                </div>
                <button id="sidebar-toggle" class="icon-btn" title="Toggle sidebar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-item active" data-tab="chat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                    </svg>
                    <span>Chat</span>
                </button>
                <button class="nav-item" data-tab="image">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    <span>Image</span>
                </button>
                <button class="nav-item" data-tab="tts">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M19.07 4.93a10 10 0 010 14.14"/>
                        <path d="M15.54 8.46a5 5 0 010 7.07"/>
                    </svg>
                    <span>TTS</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="settings-btn" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <span>Settings</span>
                </button>
            </div>
        </aside>

        <!-- Mobile topbar -->
        <header id="mobile-header">
            <button id="mobile-menu-btn" class="icon-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12h18M3 6h18M3 18h18"/>
                </svg>
            </button>
            <div class="mobile-logo">AquaLab</div>
            <div style="width:36px"></div>
        </header>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay"></div>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Chat Panel -->
            <section id="panel-chat" class="panel active">
                <div class="panel-header">
                    <div class="panel-title-row">
                        <h2>Chat</h2>
                        <div class="header-actions">
                            <button id="chat-clear" class="icon-btn ghost" title="Clear chat">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="model-selector-row">
                        <label>Model</label>
                        <div class="custom-select" id="chat-model-select">
                            <button class="select-trigger" id="chat-model-trigger">
                                <span id="chat-model-label">gpt-5.4-nano</span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="select-dropdown" id="chat-model-dropdown"></div>
                        </div>
                        <div class="param-group">
                            <label>Temp</label>
                            <input type="number" id="chat-temp" value="0.7" min="0" max="2" step="0.1" class="param-input">
                        </div>
                        <div class="param-group">
                            <label>Max</label>
                            <input type="number" id="chat-max-tokens" value="2048" min="64" max="65536" step="64" class="param-input">
                        </div>
                    </div>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input-area">
                    <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
                    <button id="chat-send" class="send-btn" title="Send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                    <button id="chat-stop" class="send-btn stop hidden" title="Stop">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <rect x="6" y="6" width="12" height="12" rx="2"/>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- Image Panel -->
            <section id="panel-image" class="panel">
                <div class="panel-header">
                    <h2>Image Generation</h2>
                    <div class="model-selector-row">
                        <label>Model</label>
                        <div class="custom-select" id="image-model-select">
                            <button class="select-trigger" id="image-model-trigger">
                                <span id="image-model-label">qwen-image</span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="select-dropdown" id="image-model-dropdown"></div>
                        </div>
                        <div class="param-group">
                            <label>Ratio</label>
                            <div class="custom-select" id="ratio-select">
                                <button class="select-trigger" id="ratio-trigger">
                                    <span id="ratio-label">Square</span>
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                                </button>
                                <div class="select-dropdown" id="ratio-dropdown"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="image-workspace">
                    <div class="image-grid" id="image-grid"></div>
                    <div class="image-placeholder" id="image-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                        <p>Generate an image to see it here</p>
                    </div>
                </div>
                <div class="chat-input-area">
                    <textarea id="image-input" placeholder="Describe the image you want..." rows="1"></textarea>
                    <button id="image-generate" class="send-btn accent" title="Generate">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
                        </svg>
                    </button>
                </div>
            </section>

            <!-- TTS Panel -->
            <section id="panel-tts" class="panel">
                <div class="panel-header">
                    <h2>Text to Speech</h2>
                    <div class="model-selector-row">
                        <label>Model</label>
                        <div class="custom-select" id="tts-model-select">
                            <button class="select-trigger" id="tts-model-trigger">
                                <span id="tts-model-label">mimo-v2.5-tts</span>
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
                            </button>
                            <div class="select-dropdown" id="tts-model-dropdown"></div>
                        </div>
                        <div class="param-group" id="voice-name-group">
                            <label>Voice Name</label>
                            <input type="text" id="tts-voice-name" value="Alloy" class="param-input" placeholder="Voice name">
                        </div>
                    </div>
                    <div class="model-selector-row" id="tts-voice-design-row" style="display:none">
                        <div class="param-group" style="flex:1">
                            <label>Voice Description</label>
                            <input type="text" id="tts-voice-description" class="param-input" placeholder="e.g. A warm, friendly female voice with a British accent">
                        </div>
                    </div>
                </div>
                <div class="tts-workspace">
                    <textarea id="tts-input" class="tts-textarea" placeholder="Enter the text you want to convert to speech..."></textarea>
                    <div class="tts-controls">
                        <button id="tts-generate" class="primary-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="5 3 19 12 5 21 5 3"/>
                            </svg>
                            <span>Generate Speech</span>
                        </button>
                    </div>
                    <div id="tts-player-container" class="tts-player-container hidden">
                        <audio id="tts-audio" controls></audio>
                        <div class="tts-player-info">
                            <span id="tts-status">Ready</span>
                            <button id="tts-download" class="icon-btn ghost" title="Download audio">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings</h3>
                <button id="settings-close" class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label>API Key</label>
                    <div class="input-with-action">
                        <input type="password" id="api-key-input" placeholder="Enter your AquaDevs API key" class="setting-input">
                        <button id="toggle-key-visibility" class="icon-btn ghost" title="Toggle visibility">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <p class="setting-hint">Your key is stored locally in your browser. Never shared.</p>
                </div>
                <div class="setting-group">
                    <label>API Base URL</label>
                    <input type="text" id="api-base-input" value="https://api.aquadevs.com/v1" class="setting-input">
                </div>
                <div class="setting-group">
                    <label>System Prompt (Chat)</label>
                    <textarea id="system-prompt-input" class="setting-textarea" rows="3" placeholder="You are a helpful assistant."></textarea>
                </div>
                <button id="settings-save" class="primary-btn full-width">Save Settings</button>
                <div id="settings-status" class="setting-status hidden"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox for images -->
    <div id="lightbox" class="lightbox hidden">
        <button class="lightbox-close icon-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="">
        <a id="lightbox-download" class="primary-btn" download>Download</a>
    </div>

    <script src="app.js"></script>
</body>
</html>
