<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupaVault - Secure Notes & Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --color-primary: #1E3A8A;
      --color-on-primary: #FFFFFF;
      --color-secondary: #3B82F6;
      --color-accent: #7C3AED;
      --color-background: #F8FAFC;
      --color-foreground: #1E40AF;
      --color-muted: #E9EEF5;
      --color-border: #BFDBFE;
      --color-destructive: #DC2626;
      --color-ring: #1E3A8A;
      --color-success: #16A34A;
      
      --font-sans: 'Fira Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'Fira Code', monospace;
      
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      
      --shadow-sm: 0 2px 4px rgba(30, 58, 138, 0.06);
      --shadow-md: 0 4px 12px rgba(30, 58, 138, 0.1);
      --shadow-lg: 0 8px 24px rgba(30, 58, 138, 0.12);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
    
    body {
      font-family: var(--font-sans);
      background: var(--color-background);
      color: var(--color-foreground);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .screen {
      display: none;
    }
    
    .screen.active {
      display: block;
    }
    
    .btn {
      font-family: var(--font-sans);
      font-weight: 500;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: all 200ms ease;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn:focus-visible {
      outline: 2px solid var(--color-ring);
      outline-offset: 2px;
    }
    
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }
    
    .btn-primary:not(:disabled):hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    .btn-secondary {
      background: var(--color-muted);
      color: var(--color-foreground);
    }
    
    .btn-secondary:not(:disabled):hover {
      background: #dbeafe;
    }
    
    .btn-destructive {
      background: var(--color-destructive);
      color: white;
    }
    
    .btn-destructive:not(:disabled):hover {
      background: #b91c1c;
    }
    
    .btn-full {
      width: 100%;
    }
    
    .btn-sm {
      padding: 8px 16px;
      font-size: 14px;
    }
    
    .screen {
      display: none;
    }
    
    .screen.active {
      display: block;
    }
    
    /* Auth Screen Styles */
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 40px;
      max-width: 440px;
      width: 100%;
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .auth-header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 8px;
    }
    
    .auth-header p {
      color: #64748b;
      font-size: 15px;
    }
    
    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--color-muted);
      padding: 4px;
      border-radius: var(--radius-md);
    }
    
    .auth-tab {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 500;
      color: var(--color-foreground);
      transition: all 200ms ease;
    }
    
    .auth-tab.active {
      background: white;
      box-shadow: var(--shadow-sm);
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--color-foreground);
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 15px;
      transition: all 200ms ease;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }
    
    .form-group small {
      display: block;
      margin-top: 6px;
      color: #64748b;
      font-size: 13px;
    }
    
    .form-message {
      margin-top: 16px;
      padding: 12px;
      border-radius: var(--radius-md);
      font-size: 14px;
      display: none;
    }
    
    .form-message.success {
      display: block;
      background: #dcfce7;
      color: var(--color-success);
      border: 1px solid #86efac;
    }
    
    .form-message.error {
      display: block;
      background: #fee2e2;
      color: var(--color-destructive);
      border: 1px solid #fca5a5;
    }
    
    .auth-config {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--color-border);
    }
    
    .auth-config details summary {
      cursor: pointer;
      font-weight: 500;
      color: var(--color-foreground);
      padding: 8px;
      border-radius: var(--radius-sm);
      transition: background 200ms ease;
    }
    
    .auth-config details summary:hover {
      background: var(--color-muted);
    }
    
    .config-fields {
      margin-top: 16px;
    }
    
    /* Button Styles */
    .btn {
      font-family: var(--font-sans);
      font-weight: 500;
      padding: 12px 24px;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      transition: all 200ms ease;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }
    
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .btn:focus-visible {
      outline: 2px solid var(--color-ring);
      outline-offset: 2px;
    }
    
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-on-primary);
    }
    
    .btn-primary:not(:disabled):hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    
    .btn-secondary {
      background: var(--color-muted);
      color: var(--color-foreground);
    }
    
    .btn-secondary:not(:disabled):hover {
      background: #dbeafe;
    }
    
    .btn-destructive {
      background: var(--color-destructive);
      color: white;
    }
    
    .btn-destructive:not(:disabled):hover {
      background: #b91c1c;
    }
    
    .btn-full {
      width: 100%;
    }
    
    .btn-sm {
      padding: 8px 16px;
      font-size: 14px;
    }
    
    /* Dashboard Styles */
    .dashboard {
      min-height: 100vh;
    }
    
    .dashboard-header {
      background: white;
      border-bottom: 1px solid var(--color-border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
    }
    
    .dashboard-header h1 {
      font-size: 24px;
      font-weight: 700;
      color: var(--color-primary);
    }
    
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    .user-email {
      font-size: 14px;
      color: #64748b;
    }
    
    .dashboard-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    
    .notes-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .notes-header h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--color-foreground);
    }
    
    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    
    .note-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      transition: all 200ms ease;
      cursor: pointer;
    }
    
    .note-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    
    .note-card h3 {
      font-size: 18px;
      font-weight: 600;
      color: var(--color-foreground);
      margin-bottom: 8px;
    }
    
    .note-card p {
      color: #64748b;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    
    .note-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #94a3b8;
    }
    
    .note-actions {
      display: flex;
      gap: 8px;
    }
    
    .note-actions button {
      padding: 4px 8px;
      font-size: 12px;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    
    .empty-state h3 {
      font-size: 18px;
      color: var(--color-foreground);
      margin-bottom: 8px;
    }
    
    .empty-state p {
      color: #64748b;
      margin-bottom: 20px;
    }
    
    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 32px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .modal-header h2 {
      font-size: 24px;
      font-weight: 600;
      color: var(--color-foreground);
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #64748b;
      padding: 4px;
      line-height: 1;
    }
    
    .modal-close:hover {
      color: var(--color-foreground);
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    
    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-sans);
      font-size: 15px;
      transition: all 200ms ease;
      resize: vertical;
      min-height: 120px;
    }
    
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .dashboard-header {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
      
      .notes-grid {
        grid-template-columns: 1fr;
      }
      
      .auth-card {
        padding: 24px;
      }
      
      .modal-content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-header">
            <h1>SupaVault</h1>
            <p>Secure notes and tasks, powered by Supabase</p>
          </div>
          
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="signin">Sign In</button>
            <button class="auth-tab" data-tab="signup">Sign Up</button>
          </div>
          
          <!-- Sign In Form -->
          <form id="signin-form" class="auth-form active">
            <div class="form-group">
              <label for="signin-email">Email</label>
              <input type="email" id="signin-email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="signin-password">Password</label>
              <input type="password" id="signin-password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader" style="display:none;">Signing in...</span>
            </button>
            <div class="form-message"></div>
          </form>
          
          <!-- Sign Up Form -->
          <form id="signup-form" class="auth-form">
            <div class="form-group">
              <label for="signup-email">Email</label>
              <input type="email" id="signup-email" required placeholder="your@email.com" autocomplete="email">
            </div>
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" required minlength="6" placeholder="••••••••" autocomplete="new-password">
              <small>At least 6 characters</small>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
              <span class="btn-text">Create Account</span>
              <span class="btn-loader" style="display:none;">Creating account...</span>
            </button>
            <div class="form-message"></div>
          </form>
          
          <div class="auth-config">
            <details>
              <summary>Supabase Configuration</summary>
              <div class="config-fields">
                <div class="form-group">
                  <label for="supabase-url">Supabase URL</label>
                  <input type="url" id="supabase-url" placeholder="https://your-project.supabase.co">
                </div>
                <div class="form-group">
                  <label for="supabase-key">Supabase Anon Key</label>
                  <input type="password" id="supabase-key" placeholder="Your anon/public key">
                </div>
                <button type="button" class="btn btn-secondary" id="save-config">Save Configuration</button>
              </div>
            </details>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
      <div class="dashboard">
        <div class="dashboard-header">
          <h1>SupaVault</h1>
          <div class="user-info">
            <span class="user-email" id="user-email"></span>
            <button class="btn btn-secondary btn-sm" id="signout-btn">Sign Out</button>
          </div>
        </div>
        
        <div class="dashboard-content">
          <div class="notes-header">
            <h2>My Notes</h2>
            <button class="btn btn-primary" id="new-note-btn">+ New Note</button>
          </div>
          
          <div id="notes-container">
            <div class="empty-state">
              <h3>No notes yet</h3>
              <p>Create your first note to get started</p>
              <button class="btn btn-primary" id="empty-new-note-btn">+ Create Note</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <!-- Note Modal -->
    <div id="note-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">New Note</h2>
          <button class="modal-close" id="close-modal">&times;</button>
        </div>
        
        <form id="note-form">
          <div class="form-group">
            <label for="note-title">Title</label>
            <input type="text" id="note-title" required placeholder="Enter note title">
          </div>
          <div class="form-group">
            <label for="note-content">Content</label>
            <textarea id="note-content" required placeholder="Write your note here..."></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" id="cancel-note">Cancel</button>
            <button type="submit" class="btn btn-primary">
              <span class="btn-text">Save Note</span>
              <span class="btn-loader" style="display:none;">Saving...</span>
            </button>
          </div>
          <div class="form-message"></div>
        </form>
      </div>
    </div>
  </div>
  
  <script>
    // Supabase client
    let supabase = null;
    let currentUser = null;
    let currentNoteId = null;
    let notesSubscription = null;

    // Default Supabase credentials
    const DEFAULT_SUPABASE_URL = 'https://lycjamvdwaofjfcbeiev.supabase.co';
    const DEFAULT_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5Y2phbXZkd2FvZmpmY2JlaWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzkzMzQsImV4cCI6MjA5NjMxNTMzNH0.q7MFysi0AsPETP1277M2EHFgfwFZluYuNi7hcoHSPnQ';
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadConfig();
      setupEventListeners();
    });
    
    function loadConfig() {
      const url = localStorage.getItem('supabase_url') || DEFAULT_SUPABASE_URL;
      const key = localStorage.getItem('supabase_key') || DEFAULT_SUPABASE_KEY;
      
      document.getElementById('supabase-url').value = url;
      document.getElementById('supabase-key').value = key;
      initSupabase(url, key);
      checkAuth();
    }
    
    function initSupabase(url, key) {
      try {
        supabase = window.supabase.createClient(url, key);
        console.log('Supabase client initialized');
      } catch (error) {
        console.error('Failed to initialize Supabase:', error);
        showMessage('signin-form', 'error', 'Invalid Supabase configuration');
      }
    }
    
    async function checkAuth() {
      if (!supabase) return;
      
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          currentUser = session.user;
          showDashboard();
        }
      } catch (error) {
        console.error('Auth check failed:', error);
      }
    }
    
    function setupEventListeners() {
      // Config
      document.getElementById('save-config').addEventListener('click', saveConfig);
      
      // Auth tabs
      document.querySelectorAll('.auth-tab').forEach(tab => {
        tab.addEventListener('click', () => switchAuthTab(tab.dataset.tab));
      });
      
      // Auth forms
      document.getElementById('signin-form').addEventListener('submit', handleSignIn);
      document.getElementById('signup-form').addEventListener('submit', handleSignUp);
      document.getElementById('signout-btn').addEventListener('click', handleSignOut);
      
      // Notes
      document.getElementById('new-note-btn').addEventListener('click', () => openNoteModal());
      document.getElementById('empty-new-note-btn').addEventListener('click', () => openNoteModal());
      document.getElementById('close-modal').addEventListener('click', closeNoteModal);
      document.getElementById('cancel-note').addEventListener('click', closeNoteModal);
      document.getElementById('note-form').addEventListener('submit', handleNoteSave);
      
      // Close modal on backdrop click
      document.getElementById('note-modal').addEventListener('click', (e) => {
        if (e.target.id === 'note-modal') closeNoteModal();
      });
    }
    
    function saveConfig() {
      const url = document.getElementById('supabase-url').value.trim();
      const key = document.getElementById('supabase-key').value.trim();
      
      if (!url || !key) {
        alert('Please enter both URL and key');
        return;
      }
      
      localStorage.setItem('supabase_url', url);
      localStorage.setItem('supabase_key', key);
      
      initSupabase(url, key);
      alert('Configuration saved! You can now sign in.');
    }
    
    function switchAuthTab(tab) {
      document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
      
      document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
      document.getElementById(`${tab}-form`).classList.add('active');
      
      // Clear messages
      document.querySelectorAll('.form-message').forEach(m => {
        m.style.display = 'none';
        m.className = 'form-message';
      });
    }
    
    async function handleSignIn(e) {
      e.preventDefault();
      
      if (!supabase) {
        showMessage('signin-form', 'error', 'Please configure Supabase first');
        return;
      }
      
      const email = document.getElementById('signin-email').value;
      const password = document.getElementById('signin-password').value;
      const btn = e.target.querySelector('button[type="submit"]');
      
      setLoading(btn, true);
      
      try {
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        currentUser = data.user;
        showMessage('signin-form', 'success', 'Signed in successfully!');
        setTimeout(() => showDashboard(), 500);
      } catch (error) {
        console.error('Sign in error:', error);
        showMessage('signin-form', 'error', error.message || 'Sign in failed');
      } finally {
        setLoading(btn, false);
      }
    }
    
    async function handleSignUp(e) {
      e.preventDefault();
      
      if (!supabase) {
        showMessage('signup-form', 'error', 'Please configure Supabase first');
        return;
      }
      
      const email = document.getElementById('signup-email').value;
      const password = document.getElementById('signup-password').value;
      const btn = e.target.querySelector('button[type="submit"]');
      
      setLoading(btn, true);
      
      try {
        const { data, error } = await supabase.auth.signUp({
          email,
          password
        });
        
        if (error) throw error;
        
        showMessage('signup-form', 'success', 'Account created! Check your email for verification.');
      } catch (error) {
        console.error('Sign up error:', error);
        showMessage('signup-form', 'error', error.message || 'Sign up failed');
      } finally {
        setLoading(btn, false);
      }
    }
    
    async function handleSignOut() {
      try {
        if (notesSubscription) {
          notesSubscription.unsubscribe();
          notesSubscription = null;
        }
        
        await supabase.auth.signOut();
        currentUser = null;
        showAuth();
      } catch (error) {
        console.error('Sign out error:', error);
      }
    }
    
    function showAuth() {
      document.getElementById('auth-screen').classList.add('active');
      document.getElementById('dashboard-screen').classList.remove('active');
    }
    
    function showDashboard() {
      document.getElementById('auth-screen').classList.remove('active');
      document.getElementById('dashboard-screen').classList.add('active');
      
      if (currentUser) {
        document.getElementById('user-email').textContent = currentUser.email;
        loadNotes();
        subscribeToNotes();
      }
    }
    
    async function loadNotes() {
      if (!supabase || !currentUser) return;
      
      try {
        const { data, error } = await supabase
          .from('notes')
          .select('*')
          .eq('user_id', currentUser.id)
          .order('created_at', { ascending: false });
        
        if (error) {
          console.error('Error loading notes:', error);
          renderNotes([]);
          return;
        }
        
        renderNotes(data || []);
      } catch (error) {
        console.error('Load notes error:', error);
        renderNotes([]);
      }
    }
    
    function subscribeToNotes() {
      if (!supabase || !currentUser) return;
      
      notesSubscription = supabase
        .channel('notes_changes')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'notes',
          filter: `user_id=eq.${currentUser.id}`
        }, () => {
          loadNotes();
        })
        .subscribe();
    }
    
    function renderNotes(notes) {
      const container = document.getElementById('notes-container');
      
      if (notes.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No notes yet</h3>
            <p>Create your first note to get started</p>
            <button class="btn btn-primary" onclick="openNoteModal()">+ Create Note</button>
          </div>
        `;
        return;
      }
      
      const grid = document.createElement('div');
      grid.className = 'notes-grid';
      
      notes.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <h3>${escapeHtml(note.title)}</h3>
          <p>${escapeHtml(note.content.substring(0, 150))}${note.content.length > 150 ? '...' : ''}</p>
          <div class="note-meta">
            <span>${formatDate(note.created_at)}</span>
            <div class="note-actions">
              <button class="btn btn-secondary btn-sm" onclick="editNote('${note.id}')">Edit</button>
              <button class="btn btn-destructive btn-sm" onclick="deleteNote('${note.id}')">Delete</button>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
      
      container.innerHTML = '';
      container.appendChild(grid);
    }
    
    function openNoteModal(noteId = null) {
      currentNoteId = noteId;
      const modal = document.getElementById('note-modal');
      const form = document.getElementById('note-form');
      const title = document.getElementById('modal-title');
      
      form.reset();
      document.querySelector('#note-form .form-message').style.display = 'none';
      
      if (noteId) {
        title.textContent = 'Edit Note';
        loadNoteForEdit(noteId);
      } else {
        title.textContent = 'New Note';
      }
      
      modal.classList.add('active');
    }
    
    function closeNoteModal() {
      document.getElementById('note-modal').classList.remove('active');
      currentNoteId = null;
    }
    
    async function loadNoteForEdit(noteId) {
      try {
        const { data, error } = await supabase
          .from('notes')
          .select('*')
          .eq('id', noteId)
          .single();
        
        if (error) throw error;
        
        document.getElementById('note-title').value = data.title;
        document.getElementById('note-content').value = data.content;
      } catch (error) {
        console.error('Load note error:', error);
        showMessage('note-form', 'error', 'Failed to load note');
      }
    }
    
    async function handleNoteSave(e) {
      e.preventDefault();
      
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').value.trim();
      const btn = e.target.querySelector('button[type="submit"]');
      
      setLoading(btn, true);
      
      try {
        if (currentNoteId) {
          const { error } = await supabase
            .from('notes')
            .update({ title, content, updated_at: new Date().toISOString() })
            .eq('id', currentNoteId);
          
          if (error) throw error;
        } else {
          const { error } = await supabase
            .from('notes')
            .insert([{
              user_id: currentUser.id,
              title,
              content
            }]);
          
          if (error) throw error;
        }
        
        closeNoteModal();
        loadNotes();
      } catch (error) {
        console.error('Save note error:', error);
        showMessage('note-form', 'error', error.message || 'Failed to save note');
      } finally {
        setLoading(btn, false);
      }
    }
    
    async function editNote(noteId) {
      openNoteModal(noteId);
    }
    
    async function deleteNote(noteId) {
      if (!confirm('Are you sure you want to delete this note?')) return;
      
      try {
        const { error } = await supabase
          .from('notes')
          .delete()
          .eq('id', noteId);
        
        if (error) throw error;
        
        loadNotes();
      } catch (error) {
        console.error('Delete note error:', error);
        alert('Failed to delete note');
      }
    }
    
    function showMessage(formId, type, message) {
      const form = document.getElementById(formId);
      const messageEl = form.querySelector('.form-message');
      messageEl.textContent = message;
      messageEl.className = `form-message ${type}`;
      messageEl.style.display = 'block';
    }
    
    function setLoading(btn, loading) {
      const text = btn.querySelector('.btn-text');
      const loader = btn.querySelector('.btn-loader');
      
      if (loading) {
        text.style.display = 'none';
        loader.style.display = 'inline';
        btn.disabled = true;
      } else {
        text.style.display = 'inline';
        loader.style.display = 'none';
        btn.disabled = false;
      }
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      
      if (days === 0) return 'Today';
      if (days === 1) return 'Yesterday';
      if (days < 7) return `${days} days ago`;
      
      return date.toLocaleDateString();
    }
  </script>
</body>
</html>
