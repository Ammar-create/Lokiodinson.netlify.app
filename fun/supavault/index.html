<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupaVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════ AUTH SCREEN ═══════════ -->
  <div id="auth-screen" class="screen active">
    <div class="auth-backdrop">
      <div class="vault-glyph">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="90" stroke="currentColor" stroke-width="0.5" opacity="0.15"/>
          <circle cx="100" cy="100" r="70" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
          <circle cx="100" cy="100" r="50" stroke="currentColor" stroke-width="0.5" opacity="0.08"/>
          <line x1="100" y1="10" x2="100" y2="190" stroke="currentColor" stroke-width="0.3" opacity="0.08"/>
          <line x1="10" y1="100" x2="190" y2="100" stroke="currentColor" stroke-width="0.3" opacity="0.08"/>
          <line x1="30" y1="30" x2="170" y2="170" stroke="currentColor" stroke-width="0.3" opacity="0.06"/>
          <line x1="170" y1="30" x2="30" y2="170" stroke="currentColor" stroke-width="0.3" opacity="0.06"/>
        </svg>
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-brand">
        <span class="brand-mark">V</span>
        <h1>SupaVault</h1>
        <p>Your thoughts, preserved.</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-tab="signin" role="tab" aria-selected="true">Sign in</button>
        <button class="auth-tab" data-tab="signup" role="tab" aria-selected="false">Create account</button>
      </div>

      <form id="signin-form" class="auth-form active">
        <div class="field">
          <label for="signin-email">Email</label>
          <input type="email" id="signin-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="signin-password">Password</label>
          <input type="password" id="signin-password" required placeholder="Your password" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-accent btn-full" id="signin-btn">
          <span class="btn-label">Sign in</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        <div class="msg" id="signin-msg"></div>
      </form>

      <form id="signup-form" class="auth-form">
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required minlength="6" placeholder="Minimum 6 characters" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-accent btn-full" id="signup-btn">
          <span class="btn-label">Create account</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
        <div class="msg" id="signup-msg"></div>
      </form>

      <details class="auth-config">
        <summary>Supabase configuration</summary>
        <div class="config-fields">
          <div class="field">
            <label for="cfg-url">Project URL</label>
            <input type="url" id="cfg-url" placeholder="https://xxx.supabase.co">
          </div>
          <div class="field">
            <label for="cfg-key">Anon key</label>
            <input type="password" id="cfg-key" placeholder="eyJ...">
          </div>
          <button type="button" class="btn btn-ghost btn-sm btn-full" id="save-cfg">Save credentials</button>
        </div>
      </details>
    </div>
  </div>

  <!-- ═══════════ DASHBOARD SCREEN ═══════════ -->
  <div id="dashboard-screen" class="screen">
    <header class="dash-header">
      <div class="dash-header-left">
        <a class="dash-logo" href="#">
          <div class="dash-logo-icon">V</div>
          <span>SupaVault</span>
        </a>
        <div class="dash-search">
          <span class="dash-search-icon">&#128269;</span>
          <input type="text" id="search-input" placeholder="Search notes..." autocomplete="off">
        </div>
      </div>
      <div class="dash-header-right">
        <span class="dash-user-email" id="user-email"></span>
        <button class="btn btn-ghost btn-sm" id="signout-btn">Sign out</button>
      </div>
    </header>

    <main class="dash-body">
      <div class="dash-top">
        <h2>Notes <span class="note-count" id="note-count"></span></h2>
        <button class="btn btn-accent" id="new-note-btn">+ New note</button>
      </div>
      <div id="notes-container"></div>
    </main>
  </div>

  <!-- ═══════════ NOTE MODAL ═══════════ -->
  <div class="modal-overlay" id="note-modal">
    <div class="modal">
      <div class="modal-head">
        <h2 id="modal-title">New note</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      </div>
      <form id="note-form">
        <div class="modal-body">
          <div class="field">
            <label for="note-title">Title</label>
            <input type="text" id="note-title" required placeholder="Give it a name">
          </div>
          <div class="field">
            <label for="note-content">Content</label>
            <textarea id="note-content" required placeholder="Write your thoughts..."></textarea>
          </div>
          <div class="msg" id="note-msg"></div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-accent" id="note-save-btn">
            <span class="btn-label">Save note</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══════════ TOAST CONTAINER ═══════════ -->
  <div class="toast-container" id="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
