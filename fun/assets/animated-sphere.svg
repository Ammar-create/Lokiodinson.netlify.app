<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#001eff"/>
    </radialGradient>
  </defs>

  <!-- Pulsing core -->
  <circle cx="100" cy="100" r="60" fill="url(#pulseGrad)"
          opacity="0.9">
    <animate attributeName="r" values="60;80;60"
             dur="3s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
    <animate attributeName="opacity" values="0.9;0.5;0.9"
             dur="3s" repeatCount="indefinite"
             calcMode="spline"
             keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"/>
  </circle>

  <!-- Orbiting ring -->
  <g>
    <rect x="60" y="60" width="80" height="80"
          fill="none" stroke="#00f2ff" stroke-width="3" rx="10"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100" to="360 100 100"
      dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- Counter-rotating inner ring -->
  <g>
    <circle cx="100" cy="100" r="40"
            fill="none" stroke="#ffffff"
            stroke-width="2" stroke-dasharray="10 5"/>
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="360 100 100" to="0 100 100"
      dur="7s" repeatCount="indefinite"/>
  </g>

  <!-- Floating particle orbit -->
  <circle cx="100" cy="20" r="4" fill="#fff" opacity="0.8">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 100 100" to="360 100 100"
      dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- Second particle -->
  <circle cx="100" cy="180" r="3" fill="#fff" opacity="0.6">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="180 100 100" to="540 100 100"
      dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- Third particle -->
  <circle cx="20" cy="100" r="2.5" fill="#00f2ff" opacity="0.7">
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="90 100 100" to="-270 100 100"
      dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
