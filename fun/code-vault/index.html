<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault | Code & Quoted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #181818;
      --surface-hover: #1f1f1f;
      --border: #2a2a2a;
      --border-hover: #3a3a3a;
      --text: #ececec;
      --text-muted: #8a8a8a;
      --accent: #d4a373;
      --accent-dim: #b08655;
      --accent-bg: rgba(212, 163, 115, 0.08);
      --radius: 12px;
      --font-ui: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --font-serif: 'Lora', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      padding: 60px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 32px;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    header h1 span { color: var(--accent); }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1.1rem;
      max-width: 540px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .search-wrap {
      position: relative;
      flex: 1 1 300px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px 14px 44px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-bg);
    }

    .search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 100px;
      font-family: var(--font-ui);
      font-size: 0.875rem;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }

    .filter-chip:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .filter-chip.active {
      background: var(--accent-bg);
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .stats {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 24px;
      font-family: var(--font-mono);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 24px;
      padding-bottom: 80px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      header { padding: 40px 0 24px; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: var(--border-hover);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card__title {
      font-family: var(--font-ui);
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 8px;
      border-radius: 6px;
      background: var(--accent-bg);
      color: var(--accent);
      border: 1px solid rgba(212,163,115,0.15);
    }

    .badge--quote {
      background: rgba(138, 180, 248, 0.08);
      color: #8ab4f8;
      border-color: rgba(138, 180, 248, 0.15);
    }

    .card__actions { display: flex; gap: 8px; }

    .icon-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .card__body {
      padding: 20px;
      flex: 1;
    }

    .card__description {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .card--quote .card__body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 140px;
    }

    .quote-text {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      line-height: 1.5;
      color: var(--text);
      position: relative;
      padding-left: 24px;
      border-left: 3px solid var(--accent);
      font-style: italic;
    }

    .code-block {
      background: #121212;
      border-radius: 8px;
      border: 1px solid #222;
      overflow-x: auto;
      position: relative;
    }

    .code-block pre {
      margin: 0;
      padding: 16px;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
      color: #ddd;
    }

    code[class*="language-"], pre[class*="language-"] {
      font-family: var(--font-mono) !important;
      font-size: 0.85rem !important;
      text-shadow: none !important;
      background: transparent !important;
    }

    .token.comment { color: #6a6a6a; }
    .token.string { color: #e9c46a; }
    .token.number { color: #f4a261; }
    .token.keyword { color: #e76f51; }
    .token.function { color: #2a9d8f; }
    .token.operator { color: #f0f0f0; }
    .token.punctuation { color: #888; }
    .token.tag { color: #e76f51; }
    .token.attr-name { color: #f4a261; }
    .token.attr-value { color: #e9c46a; }

    .card__footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      display: none;
    }

    .empty h3 {
      color: var(--text);
      font-family: var(--font-mono);
      margin-bottom: 8px;
      font-size: 1.25rem;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: var(--radius);
      font-family: var(--font-ui);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 1000;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>The <span>Vault</span></h1>
      <p>An archived collection of code, quotes, and curated snippets. Add entries to data.js and they appear here automatically.</p>
    </header>

    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input type="text" id="search" placeholder="Search snippets, tags, or content..." autocomplete="off">
      </div>
      <div class="filters" id="filters"></div>
    </div>

    <div class="stats" id="stats">0 snippets found</div>

    <div class="grid" id="grid"></div>

    <div class="empty" id="empty">
      <h3>No matches found</h3>
      <p>Try adjusting your search or filters.</p>
    </div>
  </div>

  <div class="toast" id="toast">Copied</div>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('grid');
      const searchInput = document.getElementById('search');
      const filterContainer = document.getElementById('filters');
      const stats = document.getElementById('stats');
      const empty = document.getElementById('empty');
      const toast = document.getElementById('toast');

      let activeFilter = 'all';

      const categories = ['All', ...new Set(SNIPPETS.map(s => s.category))];

      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-chip' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.dataset.filter = cat === 'All' ? 'all' : cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          render();
        });
        filterContainer.appendChild(btn);
      });

      searchInput.addEventListener('input', () => {
        render();
      });

      function render() {
        grid.innerHTML = '';
        const query = searchInput.value.toLowerCase().trim();

        const filtered = SNIPPETS.filter(s => {
          const matchesFilter = activeFilter === 'all' || s.category === activeFilter;
          const matchesSearch = !query ||
            s.title.toLowerCase().includes(query) ||
            s.description.toLowerCase().includes(query) ||
            s.tags.some(t => t.toLowerCase().includes(query)) ||
            s.content.toLowerCase().includes(query);
          return matchesFilter && matchesSearch;
        });

        const count = filtered.length;
        stats.textContent = count + ' snippet' + (count !== 1 ? 's' : '') + ' found';

        if (count === 0) {
          empty.style.display = 'block';
          return;
        } else {
          empty.style.display = 'none';
        }

        filtered.forEach(s => {
          const card = document.createElement('article');
          const isQuote = s.type === 'quote' || s.language === 'quote';
          card.className = 'card ' + (isQuote ? 'card--quote' : 'card--code');
          card.id = s.id;

          const tagsHtml = s.tags.map(t => '<span class="tag">' + escapeHtml(t) + '</span>').join('');

          const copyBtn = '<button class="icon-btn" onclick="window.copySnippet(\'' + s.id + '\')" aria-label="Copy">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
          '</button>';

          let bodyHtml;
          if (isQuote) {
            bodyHtml = '<div class="quote-text">' + escapeHtml(s.content) + '</div>';
          } else {
            bodyHtml = '<div class="code-block"><pre><code class="language-' + s.language + '">' + escapeHtml(s.content) + '</code></pre></div>';
          }

          card.innerHTML = '<div class="card__header">' +
            '<div class="card__meta">' +
              '<span class="card__title">' + escapeHtml(s.title) + '</span>' +
              '<span class="badge ' + (isQuote ? 'badge--quote' : '') + '">' + s.language + '</span>' +
            '</div>' +
            '<div class="card__actions">' + copyBtn + '</div>' +
          '</div>' +
          '<div class="card__body">' +
            '<p class="card__description">' + escapeHtml(s.description) + '</p>' +
            bodyHtml +
          '</div>' +
          '<div class="card__footer">' +
            '<div class="tags">' + tagsHtml + '</div>' +
          '</div>';

          grid.appendChild(card);
        });

        if (window.Prism) {
          Prism.highlightAll();
        }
      }

      window.copySnippet = function(id) {
        const s = SNIPPETS.find(x => x.id === id);
        if (!s) return;
        navigator.clipboard.writeText(s.content).then(() => {
          toast.textContent = 'Copied to clipboard';
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        });
      };

      function escapeHtml(str) {
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      render();
    });
  </script>
</body>
</html>
