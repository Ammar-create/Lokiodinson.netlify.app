<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault | Code & Quoted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;600;700&family=DM+Serif+Display&family=Spectral:ital,wght@0,400;0,600;1,400&family=Josefin+Sans:wght@300;400;600&family=Alegreya:ital,wght@0,400;0,700;1,400&family=Sorts+Mill+Goudy:ital@0;1&family=Cutive+Mono&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
  <style id="dynamic-vars">
    :root {
      --bg: #0c0c0c;
      --surface: #161616;
      --surface-hover: #1e1e1e;
      --border: #2a2a2a;
      --border-hover: #3d3d3d;
      --text: #ececec;
      --text-muted: #888888;
      --accent: #d4a373;
      --accent-dim: #b08655;
      --accent-bg: rgba(212, 163, 115, 0.08);
      --radius: 14px;
      --grid-gap: 24px;
      --font-ui: 'Syne', sans-serif;
      --font-quote: 'Playfair Display', serif;
      --font-author: 'Cormorant Garamond', serif;
      --font-mono: 'JetBrains Mono', monospace;
      --grain-opacity: 0.04;
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-ui); line-height: 1.6;
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      opacity: var(--grain-opacity);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat; background-size: 180px;
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #444; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    header {
      padding: 60px 0 36px; border-bottom: 1px solid var(--border);
      margin-bottom: 32px; display: flex; justify-content: space-between;
      align-items: flex-end; gap: 24px; flex-wrap: wrap;
    }
    .brand h1 {
      font-family: var(--font-mono);
      font-size: clamp(2.2rem, 5vw, 3.8rem); font-weight: 700;
      letter-spacing: -0.04em; color: var(--text); line-height: 1.1;
    }
    .brand h1 span { color: var(--accent); }
    .brand p {
      color: var(--text-muted); margin-top: 10px; font-size: 1.05rem;
      max-width: 480px; line-height: 1.5;
    }
    .settings-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); width: 44px; height: 44px;
      border-radius: var(--radius); display: inline-flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all 0.25s; flex-shrink: 0;
    }
    .settings-btn:hover {
      border-color: var(--accent); color: var(--accent);
      background: var(--accent-bg); transform: rotate(30deg);
    }
    .controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin-bottom: 24px; }
    .search-wrap { position: relative; flex: 1 1 300px; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px 14px 46px;
      color: var(--text); font-family: var(--font-ui); font-size: 1rem;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg);
    }
    .search-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .filters { display: flex; flex-wrap: wrap; gap: 8px; }
    .filter-chip {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); padding: 8px 16px; border-radius: 100px;
      font-family: var(--font-ui); font-size: 0.875rem; cursor: pointer;
      user-select: none; transition: all 0.2s;
    }
    .filter-chip:hover { border-color: var(--border-hover); color: var(--text); }
    .filter-chip.active { background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); }
    .stats { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 24px; font-family: var(--font-mono); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: var(--grid-gap); padding-bottom: 80px; }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } header { padding: 40px 0 24px; } }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      display: flex; flex-direction: column;
    }
    .card:hover {
      transform: translateY(-3px); border-color: var(--border-hover);
      box-shadow: 0 16px 48px rgba(0,0,0,0.45);
    }
    .card__header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .card__meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .card__title { font-family: var(--font-ui); font-weight: 600; font-size: 1rem; color: var(--text); }
    .badge {
      font-family: var(--font-mono); font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.06em; padding: 4px 10px; border-radius: 6px;
      background: var(--accent-bg); color: var(--accent); border: 1px solid rgba(212,163,115,0.18);
    }
    .badge--quote { background: rgba(138, 180, 248, 0.08); color: #8ab4f8; border-color: rgba(138, 180, 248, 0.18); }
    .card__actions { display: flex; gap: 8px; }
    .icon-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      width: 32px; height: 32px; border-radius: 8px; display: inline-flex;
      align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .card__body { padding: 22px; flex: 1; }
    .card__description { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 18px; line-height: 1.5; }
    .card--quote .card__body { display: flex; flex-direction: column; justify-content: center; min-height: 160px; }
    .quote-wrap { position: relative; }
    .quote-text {
      font-family: var(--font-quote); font-size: 1.5rem; line-height: 1.45;
      color: var(--text); position: relative; padding-left: 22px;
      border-left: 3px solid var(--accent); font-style: italic; transition: all 0.3s;
    }
    .quote-author {
      font-family: var(--font-author); font-size: 1rem; color: var(--text-muted);
      margin-top: 18px; padding-left: 22px; letter-spacing: 0.04em;
    }
    .quote-author::before { content: "\2014  "; color: var(--accent); }
    .tx-solid { color: var(--text); }
    .tx-gradient {
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .tx-outline { -webkit-text-stroke: 1.2px var(--accent); -webkit-text-fill-color: transparent; color: transparent; }
    .tx-neon { color: var(--text); text-shadow: 0 0 6px var(--accent), 0 0 12px var(--accent-dim), 0 0 24px rgba(212,163,115,0.2); }
    .tx-shadow { color: var(--text); text-shadow: 3px 3px 0px var(--accent-dim), 6px 6px 0px rgba(212,163,115,0.15); }
    .tx-vintage { color: #d4c5b0; text-shadow: 1px 1px 0px rgba(0,0,0,0.5), 0 0 2px rgba(212,163,115,0.3); filter: sepia(0.25); }
    .tx-emboss { color: var(--text); text-shadow: 1px 1px 0px rgba(255,255,255,0.08), -1px -1px 0px rgba(0,0,0,0.5); }
    .tx-letterpress { color: var(--text); text-shadow: 0px 1px 1px rgba(0,0,0,0.6), 0px -1px 1px rgba(255,255,255,0.05); }
    .tx-glitch { color: var(--text); text-shadow: 2px 0px 0px rgba(212,163,115,0.7), -2px 0px 0px rgba(138,180,248,0.7); }
    .tx-carbon {
      color: #b0b0b0;
      background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23444' fill-opacity='0.25'%3E%3Cpath d='M5 0h1v1H5zM0 5h1v1H0z'/%3E%3C/g%3E%3C/svg%3E");
      -webkit-background-clip: text; background-clip: text;
    }
    .code-block { background: #101010; border-radius: 10px; border: 1px solid #222; overflow-x: auto; }
    .code-block pre { margin: 0; padding: 18px; font-family: var(--font-mono); font-size: 0.85rem; line-height: 1.6; color: #ddd; }
    pre[class*="language-"], code[class*="language-"] {
      font-family: var(--font-mono) !important; font-size: 0.85rem !important;
      text-shadow: none !important; background: transparent !important;
    }
    .token.comment { color: #6a6a6a; }
    .token.string { color: #e9c46a; }
    .token.number { color: #f4a261; }
    .token.keyword { color: #e76f51; }
    .token.function { color: #2a9d8f; }
    .token.operator { color: #f0f0f0; }
    .token.punctuation { color: #888; }
    .token.tag { color: #e76f51; }
    .token.attr-name { color: #f4a261; }
    .token.attr-value { color: #e9c46a; }
    .card__footer { padding: 14px 22px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag {
      font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-muted);
      background: rgba(255,255,255,0.03); padding: 4px 10px; border-radius: 6px;
      border: 1px solid var(--border); transition: border-color 0.2s, color 0.2s;
    }
    .tag:hover { border-color: var(--accent-dim); color: var(--accent); }
    .empty { text-align: center; padding: 100px 20px; color: var(--text-muted); display: none; }
    .empty h3 { color: var(--text); font-family: var(--font-mono); margin-bottom: 8px; font-size: 1.25rem; }
    .toast {
      position: fixed; bottom: 24px; right: 24px; background: var(--surface);
      border: 1px solid var(--border); color: var(--text); padding: 12px 20px;
      border-radius: var(--radius); font-family: var(--font-ui); font-size: 0.95rem;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5); opacity: 0; transform: translateY(10px);
      pointer-events: none; transition: opacity 0.3s, transform 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .settings-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .settings-overlay.open { opacity: 1; pointer-events: auto; }
    .settings-panel {
      position: fixed; top: 0; right: 0; width: 400px; max-width: 90vw;
      height: 100vh; background: var(--surface); border-left: 1px solid var(--border);
      z-index: 2001; transform: translateX(100%);
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      display: flex; flex-direction: column;
    }
    .settings-panel.open { transform: translateX(0); }
    .settings-header { display: flex; align-items: center; justify-content: space-between; padding: 24px; border-bottom: 1px solid var(--border); }
    .settings-header h2 { font-family: var(--font-ui); font-size: 1.25rem; color: var(--text); }
    .close-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text-muted);
      width: 36px; height: 36px; border-radius: 10px; display: inline-flex;
      align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
    }
    .close-btn:hover { border-color: var(--accent); color: var(--accent); }
    .settings-body { flex: 1; overflow-y: auto; padding: 24px; }
    .settings-body::-webkit-scrollbar { width: 6px; }
    .settings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .setting-group { margin-bottom: 32px; }
    .setting-group h3 {
      font-family: var(--font-mono); font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-family: var(--font-ui); font-size: 0.875rem; color: var(--text-muted); margin-bottom: 8px; }
    .field select, .field input[type="color"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-family: var(--font-ui); font-size: 0.9rem; outline: none; cursor: pointer; transition: border-color 0.2s;
    }
    .field select:focus, .field input[type="color"]:focus { border-color: var(--accent); }
    .field input[type="color"] { height: 44px; padding: 4px 8px; }
    .field input[type="range"] {
      width: 100%; -webkit-appearance: none; height: 6px;
      background: var(--border); border: none; border-radius: 3px; padding: 0; outline: none;
    }
    .field input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: 2px solid var(--bg);
    }
    .range-val { display: inline-block; margin-left: 8px; font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); }
    .color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .settings-footer { padding: 20px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    .btn {
      flex: 1; padding: 12px; border-radius: 10px; font-family: var(--font-ui);
      font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
    }
    .btn-primary { background: var(--accent); color: #0c0c0c; border-color: var(--accent); }
    .btn-primary:hover { background: var(--accent-dim); }
    .btn-secondary { background: transparent; color: var(--text-muted); }
    .btn-secondary:hover { color: var(--text); border-color: var(--border-hover); }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="container">
    <header>
      <div class="brand">
        <h1>The <span>Vault</span></h1>
        <p>An archived collection of code, quotes, and curated snippets. Add entries to data.js and they appear here automatically.</p>
      </div>
      <button class="settings-btn" id="settingsBtn" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.67 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.67 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
    </header>
    <div class="controls">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input type="text" id="search" placeholder="Search snippets, tags, or content..." autocomplete="off">
      </div>
      <div class="filters" id="filters"></div>
    </div>
    <div class="stats" id="stats">0 snippets found</div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">
      <h3>No matches found</h3>
      <p>Try adjusting your search or filters.</p>
    </div>
  </div>
  <div class="toast" id="toast">Copied</div>
  <div class="settings-overlay" id="settingsOverlay"></div>
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
      <h2>Customize Vault</h2>
      <button class="close-btn" id="closeSettings" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
      </button>
    </div>
    <div class="settings-body">
      <div class="setting-group">
        <h3>Typography</h3>
        <div class="field"><label>UI Font</label><select id="font-ui"></select></div>
        <div class="field"><label>Quote Font</label><select id="font-quote"></select></div>
        <div class="field"><label>Author Font</label><select id="font-author"></select></div>
        <div class="field"><label>Mono Font</label><select id="font-mono"></select></div>
      </div>
      <div class="setting-group">
        <h3>Quote Texture</h3>
        <div class="field">
          <label>Quote Style</label>
          <select id="quote-style">
            <option value="tx-solid">Solid</option>
            <option value="tx-gradient">Gradient</option>
            <option value="tx-outline">Outline</option>
            <option value="tx-neon">Neon Glow</option>
            <option value="tx-shadow">Shadow</option>
            <option value="tx-vintage">Vintage</option>
            <option value="tx-emboss">Emboss</option>
            <option value="tx-letterpress">Letterpress</option>
            <option value="tx-glitch">Glitch</option>
            <option value="tx-carbon">Carbon</option>
          </select>
        </div>
      </div>
      <div class="setting-group">
        <h3>Colors</h3>
        <div class="color-row">
          <div class="field"><label>Accent</label><input type="color" id="color-accent" value="#d4a373"></div>
          <div class="field"><label>Background</label><input type="color" id="color-bg" value="#0c0c0c"></div>
        </div>
        <div class="color-row">
          <div class="field"><label>Surface</label><input type="color" id="color-surface" value="#161616"></div>
          <div class="field"><label>Text</label><input type="color" id="color-text" value="#ececec"></div>
        </div>
        <div class="color-row">
          <div class="field"><label>Muted</label><input type="color" id="color-muted" value="#888888"></div>
          <div class="field"><label>Border</label><input type="color" id="color-border" value="#2a2a2a"></div>
        </div>
      </div>
      <div class="setting-group">
        <h3>Layout</h3>
        <div class="field">
          <label>Border Radius <span class="range-val" id="val-radius">14px</span></label>
          <input type="range" id="radius" min="0" max="32" value="14">
        </div>
        <div class="field">
          <label>Grid Gap <span class="range-val" id="val-gap">24px</span></label>
          <input type="range" id="gap" min="8" max="48" value="24">
        </div>
        <div class="field">
          <label>Grain Intensity <span class="range-val" id="val-grain">4%</span></label>
          <input type="range" id="grain" min="0" max="20" value="4">
        </div>
      </div>
    </div>
    <div class="settings-footer">
      <button class="btn btn-secondary" id="resetSettings">Reset</button>
      <button class="btn btn-primary" id="saveSettings">Apply</button>
    </div>
  </div>
  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var grid = document.getElementById('grid');
      var searchInput = document.getElementById('search');
      var filterContainer = document.getElementById('filters');
      var stats = document.getElementById('stats');
      var emptyEl = document.getElementById('empty');
      var toast = document.getElementById('toast');
      var settingsBtn = document.getElementById('settingsBtn');
      var settingsPanel = document.getElementById('settingsPanel');
      var settingsOverlay = document.getElementById('settingsOverlay');
      var closeSettingsBtn = document.getElementById('closeSettings');
      var saveSettingsBtn = document.getElementById('saveSettings');
      var resetSettingsBtn = document.getElementById('resetSettings');
      var dynamicVars = document.getElementById('dynamic-vars');
      var activeFilter = 'all';

      var FONT_OPTIONS = [
        { value: "'Playfair Display', serif", label: "Playfair Display" },
        { value: "'Bebas Neue', sans-serif", label: "Bebas Neue" },
        { value: "'Cormorant Garamond', serif", label: "Cormorant Garamond" },
        { value: "'Syne', sans-serif", label: "Syne" },
        { value: "'DM Serif Display', serif", label: "DM Serif Display" },
        { value: "'Spectral', serif", label: "Spectral" },
        { value: "'Josefin Sans', sans-serif", label: "Josefin Sans" },
        { value: "'Alegreya', serif", label: "Alegreya" },
        { value: "'Sorts Mill Goudy', serif", label: "Sorts Mill Goudy" },
        { value: "'Cutive Mono', monospace", label: "Cutive Mono" }
      ];
      var MONO_OPTIONS = [
        { value: "'JetBrains Mono', monospace", label: "JetBrains Mono" },
        { value: "'Cutive Mono', monospace", label: "Cutive Mono" },
        { value: "monospace", label: "System Mono" }
      ];
      var DEFAULTS = {
        fontUi: "'Syne', sans-serif",
        fontQuote: "'Playfair Display', serif",
        fontAuthor: "'Cormorant Garamond', serif",
        fontMono: "'JetBrains Mono', monospace",
        quoteStyle: "tx-solid",
        accent: "#d4a373", bg: "#0c0c0c", surface: "#161616",
        text: "#ececec", muted: "#888888", border: "#2a2a2a",
        radius: 14, gap: 24, grain: 4
      };

      function populateSelect(id, opts) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        opts.forEach(function(opt) {
          var o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.label; sel.appendChild(o);
        });
      }
      populateSelect('font-ui', FONT_OPTIONS);
      populateSelect('font-quote', FONT_OPTIONS);
      populateSelect('font-author', FONT_OPTIONS);
      populateSelect('font-mono', MONO_OPTIONS);

      function loadSettings() {
        var saved = localStorage.getItem('vaultSettings');
        var s = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULTS));
        document.getElementById('font-ui').value = s.fontUi;
        document.getElementById('font-quote').value = s.fontQuote;
        document.getElementById('font-author').value = s.fontAuthor;
        document.getElementById('font-mono').value = s.fontMono;
        document.getElementById('quote-style').value = s.quoteStyle;
        document.getElementById('color-accent').value = s.accent;
        document.getElementById('color-bg').value = s.bg;
        document.getElementById('color-surface').value = s.surface;
        document.getElementById('color-text').value = s.text;
        document.getElementById('color-muted').value = s.muted;
        document.getElementById('color-border').value = s.border;
        document.getElementById('radius').value = s.radius;
        document.getElementById('gap').value = s.gap;
        document.getElementById('grain').value = s.grain;
        updateRangeLabels();
        applyVars(s);
        return s;
      }

      function getSettings() {
        return {
          fontUi: document.getElementById('font-ui').value,
          fontQuote: document.getElementById('font-quote').value,
          fontAuthor: document.getElementById('font-author').value,
          fontMono: document.getElementById('font-mono').value,
          quoteStyle: document.getElementById('quote-style').value,
          accent: document.getElementById('color-accent').value,
          bg: document.getElementById('color-bg').value,
          surface: document.getElementById('color-surface').value,
          text: document.getElementById('color-text').value,
          muted: document.getElementById('color-muted').value,
          border: document.getElementById('color-border').value,
          radius: +document.getElementById('radius').value,
          gap: +document.getElementById('gap').value,
          grain: +document.getElementById('grain').value
        };
      }

      function applyVars(s) {
        var accentDim = adjustBrightness(s.accent, -30);
        var accentBg = hexToRgba(s.accent, 0.08);
        dynamicVars.textContent = ':root{' +
          '--bg:' + s.bg + ';' +
          '--surface:' + s.surface + ';' +
          '--surface-hover:' + adjustBrightness(s.surface, 8) + ';' +
          '--border:' + s.border + ';' +
          '--border-hover:' + adjustBrightness(s.border, 18) + ';' +
          '--text:' + s.text + ';' +
          '--text-muted:' + s.muted + ';' +
          '--accent:' + s.accent + ';' +
          '--accent-dim:' + accentDim + ';' +
          '--accent-bg:' + accentBg + ';' +
          '--radius:' + s.radius + 'px;' +
          '--grid-gap:' + s.gap + 'px;' +
          '--font-ui:' + s.fontUi + ';' +
          '--font-quote:' + s.fontQuote + ';' +
          '--font-author:' + s.fontAuthor + ';' +
          '--font-mono:' + s.fontMono + ';' +
          '--grain-opacity:' + (s.grain / 100) + ';' +
        '}';
      }

      function hexToRgba(hex, alpha) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      }

      function adjustBrightness(hex, percent) {
        var r = parseInt(hex.slice(1,3), 16);
        var g = parseInt(hex.slice(3,5), 16);
        var b = parseInt(hex.slice(5,7), 16);
        var nr = Math.min(255, Math.max(0, Math.round(r + percent * 2.55)));
        var ng = Math.min(255, Math.max(0, Math.round(g + percent * 2.55)));
        var nb = Math.min(255, Math.max(0, Math.round(b + percent * 2.55)));
        return '#' + [nr, ng, nb].map(function(x) { return x.toString(16).padStart(2,'0'); }).join('');
      }

      function updateRangeLabels() {
        document.getElementById('val-radius').textContent = document.getElementById('radius').value + 'px';
        document.getElementById('val-gap').textContent = document.getElementById('gap').value + 'px';
        document.getElementById('val-grain').textContent = document.getElementById('grain').value + '%';
      }

      ['radius', 'gap', 'grain'].forEach(function(id) {
        document.getElementById(id).addEventListener('input', updateRangeLabels);
      });

      function openSettings() {
        settingsPanel.classList.add('open');
        settingsOverlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeSettingsPanel() {
        settingsPanel.classList.remove('open');
        settingsOverlay.classList.remove('open');
        document.body.style.overflow = '';
      }
      settingsBtn.addEventListener('click', openSettings);
      closeSettingsBtn.addEventListener('click', closeSettingsPanel);
      settingsOverlay.addEventListener('click', closeSettingsPanel);
      saveSettingsBtn.addEventListener('click', function() {
        var s = getSettings();
        localStorage.setItem('vaultSettings', JSON.stringify(s));
        applyVars(s);
        render();
        closeSettingsPanel();
        toast.textContent = 'Settings applied';
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
      });
      resetSettingsBtn.addEventListener('click', function() {
        localStorage.removeItem('vaultSettings');
        loadSettings();
        render();
        toast.textContent = 'Defaults restored';
        toast.classList.add('show');
        setTimeout(function() { toast.classList.remove('show'); }, 2000);
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSettingsPanel();
      });

      var categories = ['All'];
      var seen = {};
      SNIPPETS.forEach(function(s) {
        if (!seen[s.category]) { seen[s.category] = true; categories.push(s.category); }
      });
      categories.forEach(function(cat) {
        var btn = document.createElement('button');
        btn.className = 'filter-chip' + (cat === 'All' ? ' active' : '');
        btn.textContent = cat;
        btn.dataset.filter = cat === 'All' ? 'all' : cat;
        btn.addEventListener('click', function() {
          document.querySelectorAll('.filter-chip').forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          render();
        });
        filterContainer.appendChild(btn);
      });
      searchInput.addEventListener('input', function() { render(); });

      function render() {
        grid.innerHTML = '';
        var query = searchInput.value.toLowerCase().trim();
        var curSettings = getSettings();
        var filtered = [];
        SNIPPETS.forEach(function(s) {
          var matchesFilter = activeFilter === 'all' || s.category === activeFilter;
          var matchesSearch = !query ||
            s.title.toLowerCase().includes(query) ||
            s.description.toLowerCase().includes(query) ||
            s.tags.some(function(t) { return t.toLowerCase().includes(query); }) ||
            s.content.toLowerCase().includes(query);
          if (matchesFilter && matchesSearch) filtered.push(s);
        });
        stats.textContent = filtered.length + ' snippet' + (filtered.length !== 1 ? 's' : '') + ' found';
        if (filtered.length === 0) {
          emptyEl.style.display = 'block';
          return;
        } else {
          emptyEl.style.display = 'none';
        }
        filtered.forEach(function(s) {
          var card = document.createElement('article');
          var isQuote = s.type === 'quote' || s.language === 'quote';
          card.className = 'card ' + (isQuote ? 'card--quote' : 'card--code');
          card.id = s.id;
          var tagsHtml = s.tags.map(function(t) { return '<span class="tag">' + escapeHtml(t) + '</span>'; }).join('');
          var copyBtn = '<button class="icon-btn" onclick="window.copySnippet(\'' + s.id + '\')" aria-label="Copy">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>' +
          '</button>';
          var bodyHtml;
          if (isQuote) {
            var styleClass = curSettings.quoteStyle || 'tx-solid';
            var authorHtml = s.author ? '<p class="quote-author">' + escapeHtml(s.author) + '</p>' : '';
            bodyHtml = '<div class="quote-wrap"><div class="quote-text ' + styleClass + '">' + escapeHtml(s.content) + '</div>' + authorHtml + '</div>';
          } else {
            bodyHtml = '<div class="code-block"><pre><code class="language-' + s.language + '">' + escapeHtml(s.content) + '</code></pre></div>';
          }
          card.innerHTML = '<div class="card__header">' +
            '<div class="card__meta"><span class="card__title">' + escapeHtml(s.title) + '</span>' +
            '<span class="badge ' + (isQuote ? 'badge--quote' : '') + '">' + s.language + '</span></div>' +
            '<div class="card__actions">' + copyBtn + '</div></div>' +
            '<div class="card__body"><p class="card__description">' + escapeHtml(s.description) + '</p>' + bodyHtml + '</div>' +
            '<div class="card__footer"><div class="tags">' + tagsHtml + '</div></div>';
          grid.appendChild(card);
        });
        if (window.Prism) { Prism.highlightAll(); }
      }

      window.copySnippet = function(id) {
        var s = null;
        for (var i = 0; i < SNIPPETS.length; i++) { if (SNIPPETS[i].id === id) { s = SNIPPETS[i]; break; } }
        if (!s) return;
        navigator.clipboard.writeText(s.content).then(function() {
          toast.textContent = 'Copied to clipboard';
          toast.classList.add('show');
          setTimeout(function() { toast.classList.remove('show'); }, 2000);
        });
      };

      function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      loadSettings();
      render();
    });
  </script>
</body>
</html>
