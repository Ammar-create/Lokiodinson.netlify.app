<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAND LINE ARCHIVE — One Piece Wiki (Pre-Ep 110)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Spectral:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --abyss:#020a18;
  --deep:#04122b;
  --mid:#0a2342;
  --shelf:#0e3a6b;
  --surf:#1c6fd1;
  --foam:#5ec8f2;
  --glow:#8fe3ff;
  --ink:#dceefc;
  --ink-dim:#7fa3c4;
  --gold:#f2c14e;
  --rose:#ff5e7a;
  --card:#071a36;
  --line:rgba(94,200,242,.18);
  --font-display:'Pirata One', cursive;
  --font-body:'Spectral', serif;
  --font-mono:'IBM Plex Mono', monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body);
  background:var(--abyss);
  color:var(--ink);
  line-height:1.65;
  overflow-x:hidden;
  min-height:100vh;
}
::selection{background:var(--surf);color:#fff}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--abyss)}
::-webkit-scrollbar-thumb{background:var(--shelf);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--surf)}

/* ============ OCEAN ATMOSPHERE ============ */
#ocean{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
  background:
    radial-gradient(ellipse 120% 60% at 50% -10%, #0d3b66 0%, transparent 55%),
    radial-gradient(ellipse 80% 50% at 80% 100%, #06204a 0%, transparent 60%),
    linear-gradient(180deg,#04122b 0%, #020a18 60%, #01060f 100%);
}
#ocean::after{ /* grain */
  content:'';position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.ray{position:absolute;top:-12%;width:18vw;height:75vh;
  background:linear-gradient(180deg,rgba(143,227,255,.10),transparent 80%);
  transform:skewX(-12deg);filter:blur(14px);
  animation:rayDrift 11s ease-in-out infinite alternate;
}
.ray:nth-child(1){left:8%}
.ray:nth-child(2){left:34%;animation-delay:-4s;width:10vw;opacity:.7}
.ray:nth-child(3){left:62%;animation-delay:-7s;width:24vw;opacity:.5}
@keyframes rayDrift{from{transform:skewX(-12deg) translateX(-3vw);opacity:.45}to{transform:skewX(-9deg) translateX(3vw);opacity:.9}}
.bubble{position:absolute;bottom:-60px;border-radius:50%;
  background:radial-gradient(circle at 32% 30%, rgba(255,255,255,.5), rgba(143,227,255,.12) 45%, transparent 70%);
  border:1px solid rgba(143,227,255,.25);
  animation:rise linear infinite;
}
@keyframes rise{
  0%{transform:translateY(0) translateX(0) scale(1);opacity:0}
  8%{opacity:.85}
  50%{transform:translateY(-55vh) translateX(3vw) scale(1.08)}
  100%{transform:translateY(-112vh) translateX(-2vw) scale(.8);opacity:0}
}

/* ============ HERO ============ */
header{position:relative;z-index:2;text-align:center;padding:5.5rem 1rem 0}
.log-pose{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.55em;
  text-transform:uppercase;color:var(--foam);opacity:0;
  animation:fadeDown .9s .2s ease forwards;
}
h1{
  font-family:var(--font-display);font-weight:400;
  font-size:clamp(3.2rem, 9.5vw, 7.5rem);
  line-height:1;margin:1rem 0 .4rem;letter-spacing:.04em;
  background:linear-gradient(180deg,#fff 8%, var(--glow) 38%, var(--surf) 75%, #0d4f9e 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 28px rgba(94,200,242,.35));
}
h1 span{display:inline-block;opacity:0;transform:translateY(34px) rotate(4deg);
  animation:letterIn .7s cubic-bezier(.2,.9,.3,1.2) forwards;
}
@keyframes letterIn{to{opacity:1;transform:translateY(0) rotate(0)}}
.sub{color:var(--ink-dim);font-style:italic;font-size:1.05rem;opacity:0;animation:fadeDown .9s .9s ease forwards}
.sub b{color:var(--gold);font-style:normal;font-family:var(--font-mono);font-size:.85em}
@keyframes fadeDown{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:translateY(0)}}

/* compass divider */
.compass-row{display:flex;align-items:center;justify-content:center;gap:1.2rem;margin:2rem auto 0;max-width:560px;
  opacity:0;animation:fadeDown 1s 1.2s ease forwards}
.compass-row .lin{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--foam))}
.compass-row .lin:last-child{background:linear-gradient(90deg,var(--foam),transparent)}
.compass{width:44px;height:44px;border:1px solid var(--line);border-radius:50%;position:relative;flex-shrink:0}
.compass::before{content:'';position:absolute;inset:6px;border:1px dashed rgba(94,200,242,.4);border-radius:50%;
  animation:spin 14s linear infinite}
.compass::after{content:'✦';position:absolute;inset:0;display:grid;place-items:center;color:var(--gold);font-size:.9rem;
  animation:pulse 2.4s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.25);opacity:1}}

/* ============ NAV TABS ============ */
nav{position:sticky;top:1rem;z-index:50;display:flex;justify-content:center;margin:2.4rem 0 0;padding:0 1rem;
  opacity:0;animation:fadeDown .8s 1.4s ease forwards}
.tabs{display:flex;gap:.4rem;padding:.4rem;border-radius:100px;
  background:rgba(4,18,43,.72);backdrop-filter:blur(14px);
  border:1px solid var(--line);
  box-shadow:0 12px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(143,227,255,.12);
}
.tab{
  font-family:var(--font-mono);font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-dim);background:none;border:none;cursor:pointer;
  padding:.7rem 1.6rem;border-radius:100px;position:relative;
  transition:color .3s ease, transform .2s ease;
}
.tab:hover{color:var(--glow);transform:translateY(-1px)}
.tab.active{color:#031021;
  background:linear-gradient(135deg,var(--glow),var(--surf));
  box-shadow:0 0 22px rgba(94,200,242,.45);
  font-weight:600;
}

/* ============ MAIN ============ */
main{position:relative;z-index:2;max-width:1240px;margin:3.2rem auto 5rem;padding:0 1.4rem}
.view{display:none}
.view.on{display:block;animation:viewIn .55s cubic-bezier(.2,.8,.3,1) both}
@keyframes viewIn{from{opacity:0;transform:translateY(26px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
.section-head{display:flex;align-items:baseline;gap:1rem;margin-bottom:2rem;flex-wrap:wrap}
.section-head h2{font-family:var(--font-display);font-weight:400;font-size:clamp(1.8rem,4vw,2.6rem);color:var(--glow);letter-spacing:.05em}
.section-head .count{font-family:var(--font-mono);font-size:.75rem;color:var(--gold);letter-spacing:.2em;text-transform:uppercase}

/* ============ CHARACTER GRID ============ */
#char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1.4rem}
.char-card{
  position:relative;cursor:pointer;border-radius:18px;padding:1.8rem 1.4rem 1.5rem;text-align:center;
  background:linear-gradient(165deg, rgba(28,111,209,.12), rgba(7,26,54,.92) 45%), var(--card);
  border:1px solid var(--line);overflow:hidden;
  opacity:0;transform:translateY(36px);
  transition:transform .4s cubic-bezier(.2,.8,.3,1.3), border-color .35s, box-shadow .35s;
}
.char-card.in{animation:cardIn .6s cubic-bezier(.2,.85,.3,1.15) forwards}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}
.char-card:hover{transform:translateY(-9px) !important;border-color:rgba(94,200,242,.55);
  box-shadow:0 24px 50px rgba(2,10,24,.8), 0 0 34px rgba(94,200,242,.18)}
.char-card::before{ /* sweep shine */
  content:'';position:absolute;top:0;left:-80%;width:55%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(143,227,255,.14),transparent);
  transform:skewX(-18deg);transition:left .7s ease;
}
.char-card:hover::before{left:130%}
.char-card .tagline{position:absolute;top:.85rem;left:0;right:0;
  font-family:var(--font-mono);font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-dim);opacity:.75}

/* medallion crest */
.crest{width:104px;height:104px;margin:1.1rem auto .9rem;position:relative;border-radius:50%}
.crest .ring{position:absolute;inset:0;border-radius:50%;
  border:2px dashed hsla(var(--h),85%,68%,.55);
  animation:spin 24s linear infinite;
}
.crest .ring2{position:absolute;inset:7px;border-radius:50%;
  border:1px solid hsla(var(--h),85%,72%,.35);
  animation:spin 17s linear infinite reverse;
}
.crest .core{position:absolute;inset:13px;border-radius:50%;display:grid;place-items:center;
  font-family:var(--font-display);font-size:2.1rem;color:#fff;
  background:
    radial-gradient(circle at 32% 28%, hsla(var(--h),90%,75%,.9), hsla(var(--h),85%,45%,.95) 48%, hsla(var(--h),90%,22%,1) 100%);
  box-shadow:0 0 26px hsla(var(--h),90%,60%,.45), inset 0 -8px 18px rgba(0,0,0,.45), inset 0 4px 10px rgba(255,255,255,.3);
  text-shadow:0 2px 8px rgba(0,0,0,.6);
  transition:transform .45s cubic-bezier(.2,.8,.3,1.4);
}
.char-card:hover .core{transform:scale(1.12) rotate(-5deg)}
.char-card h3{font-family:var(--font-display);font-weight:400;font-size:1.35rem;letter-spacing:.04em;color:var(--ink)}
.char-card .epithet{font-style:italic;font-size:.85rem;color:hsla(var(--h),80%,72%,.95);margin-top:.15rem}
.char-card .df-chip{display:inline-block;margin-top:.8rem;font-family:var(--font-mono);font-size:.6rem;
  letter-spacing:.14em;text-transform:uppercase;padding:.3rem .8rem;border-radius:100px;
  border:1px solid var(--line);color:var(--foam);background:rgba(28,111,209,.1)}
.char-card .df-chip.none{color:var(--ink-dim);opacity:.65}

/* ============ DETAILS ============ */
#detail-panel{border-radius:22px;overflow:hidden;border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(14,58,107,.32), rgba(7,26,54,.95) 30%), var(--card);
  box-shadow:0 30px 80px rgba(0,0,0,.6)}
.detail-hero{position:relative;padding:3rem 2.5rem 2.2rem;display:flex;gap:2.2rem;align-items:center;flex-wrap:wrap;
  background:
    radial-gradient(ellipse 60% 100% at 18% 0%, hsla(var(--h),80%,45%,.28), transparent 60%),
    linear-gradient(180deg, rgba(28,111,209,.14), transparent);
  border-bottom:1px solid var(--line)}
.detail-hero .crest{width:148px;height:148px;margin:0;flex-shrink:0;animation:crestFloat 5s ease-in-out infinite}
.detail-hero .crest .core{font-size:3rem}
@keyframes crestFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.detail-id h2{font-family:var(--font-display);font-weight:400;font-size:clamp(2.2rem,5vw,3.4rem);line-height:1.05;
  color:#fff;text-shadow:0 0 30px hsla(var(--h),85%,60%,.5)}
.detail-id .ep{font-style:italic;color:hsla(var(--h),82%,74%,1);font-size:1.15rem}
.detail-id .aff{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink-dim);margin-top:.7rem}
.detail-id .fruit-line{display:inline-block;margin-top:.9rem;padding:.45rem 1.1rem;border-radius:100px;
  font-family:var(--font-mono);font-size:.72rem;letter-spacing:.1em;
  border:1px solid hsla(var(--h),80%,65%,.4);color:var(--glow);background:hsla(var(--h),80%,40%,.12)}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:0}
.detail-col{padding:2.2rem 2.5rem}
.detail-col + .detail-col{border-left:1px solid var(--line)}
.detail-col h3{font-family:var(--font-display);font-weight:400;font-size:1.45rem;color:var(--foam);
  letter-spacing:.05em;margin-bottom:1.1rem;display:flex;align-items:center;gap:.6rem}
.detail-col h3::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.detail-col ul{list-style:none}
.detail-col li{padding:.5rem 0 .5rem 1.6rem;position:relative;font-size:.95rem;color:var(--ink);
  border-bottom:1px dashed rgba(94,200,242,.1);opacity:0;transform:translateX(-14px);animation:liIn .5s ease forwards}
.detail-col li:last-child{border-bottom:none}
@keyframes liIn{to{opacity:1;transform:translateX(0)}}
.detail-col li::before{content:'⚓';position:absolute;left:0;top:.55rem;font-size:.75rem;color:hsla(var(--h),80%,65%,.9)}

/* stats */
.stats-block{padding:2.2rem 2.5rem;border-top:1px solid var(--line)}
.stats-block h3{font-family:var(--font-display);font-weight:400;font-size:1.45rem;color:var(--foam);margin-bottom:1.4rem;letter-spacing:.05em}
.stat-row{display:grid;grid-template-columns:150px 1fr 52px;align-items:center;gap:1.1rem;margin-bottom:1rem}
.stat-row .lbl{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim)}
.gauge{height:12px;border-radius:8px;background:rgba(2,10,24,.8);border:1px solid var(--line);overflow:hidden;position:relative}
.gauge .fill{height:100%;width:0;border-radius:8px;position:relative;
  transition:width 1.1s cubic-bezier(.25,.9,.3,1)}
.gauge .fill::after{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 30%,rgba(255,255,255,.4) 50%,transparent 70%);
  background-size:200% 100%;animation:shimmer 2.2s linear infinite}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.f-strength{background:linear-gradient(90deg,#ff5e7a,#ff8a5c)}
.f-speed{background:linear-gradient(90deg,#5ec8f2,#2a7fe0)}
.f-durability{background:linear-gradient(90deg,#b08d57,#8a6a3b)}
.f-skill{background:linear-gradient(90deg,#b78aff,#7c5ce0)}
.f-intelligence{background:linear-gradient(90deg,#f2c14e,#e09a2a)}
.stat-row .val{font-family:var(--font-mono);font-size:.8rem;color:var(--glow);text-align:right}

/* ============ DEVIL FRUITS ============ */
#fruit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.4rem}
.fruit-card{position:relative;border-radius:18px;padding:1.6rem;display:flex;gap:1.3rem;align-items:flex-start;
  background:linear-gradient(160deg, rgba(28,111,209,.1), rgba(7,26,54,.94) 50%), var(--card);
  border:1px solid var(--line);overflow:hidden;
  opacity:0;transform:translateY(30px);
  transition:transform .35s cubic-bezier(.2,.8,.3,1.2), border-color .3s, box-shadow .3s}
.fruit-card.in{animation:cardIn .6s cubic-bezier(.2,.85,.3,1.15) forwards}
.fruit-card:hover{transform:translateY(-6px) !important;border-color:rgba(94,200,242,.5);
  box-shadow:0 18px 44px rgba(2,10,24,.75)}
.fruit-orb{width:72px;height:72px;flex-shrink:0;border-radius:50%;position:relative;
  background:
    radial-gradient(circle at 30% 26%, hsla(var(--fh),85%,72%,.95), hsla(var(--fh),80%,42%,1) 55%, hsla(var(--fh),85%,20%,1));
  box-shadow:0 0 22px hsla(var(--fh),90%,55%,.4), inset 0 -6px 14px rgba(0,0,0,.5), inset 0 4px 8px rgba(255,255,255,.35);
  animation:orbBob 4.5s ease-in-out infinite}
.fruit-card:nth-child(even) .fruit-orb{animation-delay:-2.2s}
@keyframes orbBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-7px) rotate(3deg)}}
.fruit-orb::before{ /* swirl pattern */
  content:'';position:absolute;inset:10px;border-radius:50%;
  border:2px solid transparent;
  border-top-color:rgba(255,255,255,.5);border-right-color:rgba(255,255,255,.18);
  animation:spin 6s linear infinite}
.fruit-orb::after{ /* stem */
  content:'';position:absolute;top:-9px;left:50%;width:4px;height:13px;border-radius:3px;
  background:linear-gradient(180deg,#6fae4e,#3d6e2a);transform:translateX(-50%) rotate(8deg)}
.fruit-info h4{font-family:var(--font-display);font-weight:400;font-size:1.3rem;letter-spacing:.04em;color:var(--ink)}
.fruit-info .meta{display:flex;gap:.5rem;flex-wrap:wrap;margin:.45rem 0 .6rem}
.badge{font-family:var(--font-mono);font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  padding:.25rem .7rem;border-radius:100px;border:1px solid}
.badge.paramecia{color:#b78aff;border-color:rgba(183,138,255,.4);background:rgba(183,138,255,.08)}
.badge.logia{color:#ff8a5c;border-color:rgba(255,138,92,.4);background:rgba(255,138,92,.08)}
.badge.zoan{color:#7ddc8e;border-color:rgba(125,220,142,.4);background:rgba(125,220,142,.08)}
.badge.user{color:var(--foam);border-color:var(--line);background:rgba(28,111,209,.1)}
.fruit-info p{font-size:.9rem;color:var(--ink-dim)}

/* ============ BUTTONS ============ */
.btn-back{display:inline-flex;align-items:center;gap:.6rem;cursor:pointer;margin-bottom:1.6rem;
  font-family:var(--font-mono);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--foam);background:rgba(28,111,209,.1);border:1px solid var(--line);
  padding:.75rem 1.5rem;border-radius:100px;
  transition:all .3s ease}
.btn-back:hover{background:rgba(28,111,209,.28);border-color:var(--foam);transform:translateX(-4px);
  box-shadow:0 0 20px rgba(94,200,242,.25)}
.btn-back .arr{transition:transform .3s ease;display:inline-block}
.btn-back:hover .arr{transform:translateX(-4px)}

/* ============ FOOTER ============ */
footer{position:relative;z-index:2;text-align:center;padding:3rem 1rem 2.4rem;
  border-top:1px solid var(--line);background:linear-gradient(180deg,transparent,rgba(2,10,24,.9))}
footer .skull{font-size:1.6rem;display:inline-block;animation:pulse 3s ease-in-out infinite;
  filter:drop-shadow(0 0 10px rgba(94,200,242,.5))}
footer p{font-family:var(--font-mono);font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--ink-dim);margin-top:.7rem}
footer p b{color:var(--gold)}

/* ============ RESPONSIVE ============ */
@media (max-width:860px){
  .detail-body{grid-template-columns:1fr}
  .detail-col + .detail-col{border-left:none;border-top:1px solid var(--line)}
  .detail-hero{padding:2.2rem 1.4rem;justify-content:center;text-align:center}
  .detail-id .fruit-line{font-size:.62rem}
  .detail-col,.stats-block{padding:1.6rem 1.4rem}
  .stat-row{grid-template-columns:104px 1fr 44px;gap:.7rem}
}
@media (max-width:520px){
  #char-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.9rem}
  .char-card{padding:1.4rem .8rem 1.1rem}
  .crest{width:80px;height:80px}
  .crest .core{font-size:1.6rem}
  .char-card h3{font-size:1.05rem}
  .tab{padding:.6rem 1rem;font-size:.66rem}
  #fruit-grid{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
}
</style>
</head>
<body>

<div id="ocean">
  <div class="ray"></div><div class="ray"></div><div class="ray"></div>
</div>

<header>
  <div class="log-pose">⊹ LOG POSE SET · EAST BLUE → ALABASTA ⊹</div>
  <h1 id="title">GRAND LINE ARCHIVE</h1>
  <p class="sub">Records of pirates, marines &amp; cursed fruits — <b>chronicled to Episode 109</b></p>
  <div class="compass-row"><div class="lin"></div><div class="compass"></div><div class="lin"></div></div>
</header>

<nav>
  <div class="tabs">
    <button class="tab active" id="tab-chars">☠ Wanted Souls</button>
    <button class="tab" id="tab-fruits">◉ Devil Fruits</button>
  </div>
</nav>

<main>
  <section class="view on" id="view-chars">
    <div class="section-head"><h2>Souls of the Sea</h2><span class="count" id="char-count"></span></div>
    <div id="char-grid"></div>
  </section>

  <section class="view" id="view-detail">
    <button class="btn-back" id="btn-detail-back"><span class="arr">←</span> Return to Archive</button>
    <div id="detail-panel"></div>
  </section>

  <section class="view" id="view-fruits">
    <button class="btn-back" id="btn-fruit-back"><span class="arr">←</span> Return to Archive</button>
    <div class="section-head"><h2>Cursed Fruits of the Sea Devil</h2><span class="count" id="fruit-count"></span></div>
    <div id="fruit-grid"></div>
  </section>
</main>

<footer>
  <span class="skull">☠</span>
  <p>Grand Line Archive · © <b>Libertas 🕊️</b> · All rights reserved</p>
</footer>

<script>

/* ================= SETUP ================= */
const $=id=>document.getElementById(id);
const views={chars:$('view-chars'),detail:$('view-detail'),fruits:$('view-fruits')};
const tabs={chars:$('tab-chars'),fruits:$('tab-fruits')};

function showView(key){
  Object.values(views).forEach(v=>v.classList.remove('on'));
  views[key].classList.remove('on'); // restart animation
  void views[key].offsetWidth;
  views[key].classList.add('on');
  tabs.chars.classList.toggle('active',key==='chars'||key==='detail');
  tabs.fruits.classList.toggle('active',key==='fruits');
  window.scrollTo({top:0,behavior:'smooth'});
}

/* split hero title into animated letters */
(function(){
  const t=$('title'),text=t.textContent;t.textContent='';
  [...text].forEach((ch,i)=>{
    const s=document.createElement('span');
    s.textContent=ch;
    if(ch===' ')s.style.width='.35em';
    s.style.animationDelay=(0.25+i*0.045)+'s';
    t.appendChild(s);
  });
})();

/* ambient bubbles */
(function(){
  const ocean=$('ocean');
  for(let i=0;i<26;i++){
    const b=document.createElement('div');
    b.className='bubble';
    const size=4+Math.random()*16;
    b.style.width=b.style.height=size+'px';
    b.style.left=Math.random()*100+'vw';
    b.style.animationDuration=(9+Math.random()*16)+'s';
    b.style.animationDelay=(-Math.random()*20)+'s';
    ocean.appendChild(b);
  }
})();

/* ================= CHARACTER GRID ================= */
function renderGrid(){
  const grid=$('char-grid');
  grid.innerHTML='';
  $('char-count').textContent=characters.length+' RECORDS LOGGED';
  characters.forEach((c,i)=>{
    const card=document.createElement('div');
    card.className='char-card';
    card.style.setProperty('--h',c.hue);
    card.style.animationDelay=(i*0.055)+'s';
    card.classList.add('in');
    const hasFruit=c.devil_fruit&&c.devil_fruit!=='None';
    card.innerHTML=`
      <div class="tagline">— ${c.role} —</div>
      <div class="crest">
        <div class="ring"></div><div class="ring2"></div>
        <div class="core">${c.initials}</div>
      </div>
      <h3>${c.name}</h3>
      <div class="epithet">${c.epithet}</div>
      <span class="df-chip ${hasFruit?'':'none'}">${hasFruit?'◉ Fruit User':'No Fruit'}</span>`;
    card.addEventListener('click',()=>showDetail(c.id));
    grid.appendChild(card);
  });
}

/* ================= DETAIL ================= */
function statRow(label,value,cls){
  const v=typeof value==='number'&&!isNaN(value)?Math.max(0,Math.min(100,value)):0;
  return `<div class="stat-row">
    <span class="lbl">${label}</span>
    <div class="gauge"><div class="fill f-${cls}" data-w="${v}"></div></div>
    <span class="val" data-target="${v}">0</span>
  </div>`;
}

function showDetail(id){
  const c=characters.find(x=>x.id===id);
  if(!c)return;
  const p=$('detail-panel');
  p.style.setProperty('--h',c.hue);
  const li=(arr,base)=>arr.map((t,i)=>`<li style="animation-delay:${base+i*0.08}s">${t}</li>`).join('');
  p.innerHTML=`
    <div class="detail-hero">
      <div class="crest">
        <div class="ring"></div><div class="ring2"></div>
        <div class="core">${c.initials}</div>
      </div>
      <div class="detail-id">
        <h2>${c.name}</h2>
        <div class="ep">“${c.epithet}”</div>
        <div class="aff">⚓ ${c.affiliation}</div>
        <span class="fruit-line">◉ ${c.devil_fruit||'None'}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-col">
        <h3>Abilities &amp; Powers</h3>
        <ul>${li(c.abilities||[],0.15)}</ul>
      </div>
      <div class="detail-col">
        <h3>Notable Feats <small style="font-family:var(--font-mono);font-size:.55em;color:var(--ink-dim)">PRE-EP 110</small></h3>
        <ul>${li(c.feats||[],0.25)}</ul>
      </div>
    </div>
    <div class="stats-block">
      <h3>Combat Assessment</h3>
      ${statRow('Strength',c.stats.Strength,'strength')}
      ${statRow('Speed',c.stats.Speed,'speed')}
      ${statRow('Durability',c.stats.Durability,'durability')}
      ${statRow('Skill / Technique',c.stats.Skill,'skill')}
      ${statRow('Intelligence',c.stats.Intelligence,'intelligence')}
    </div>`;
  showView('detail');
  /* animate gauges + counters after paint */
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    p.querySelectorAll('.fill').forEach(f=>{f.style.width=f.dataset.w+'%';});
    p.querySelectorAll('.val').forEach(el=>{
      const target=+el.dataset.target;const start=performance.now();
      (function tick(now){
        const t=Math.min(1,(now-start)/1100);
        el.textContent=Math.round(target*(1-Math.pow(1-t,3)));
        if(t<1)requestAnimationFrame(tick);
      })(start);
    });
  }));
}

/* ================= FRUITS ================= */
function renderFruits(){
  const grid=$('fruit-grid');
  grid.innerHTML='';
  $('fruit-count').textContent=devilFruits.length+' FRUITS IDENTIFIED';
  [...devilFruits].sort((a,b)=>a.name.localeCompare(b.name)).forEach((f,i)=>{
    const card=document.createElement('div');
    card.className='fruit-card in';
    card.style.setProperty('--fh',f.hue);
    card.style.animationDelay=(i*0.06)+'s';
    card.innerHTML=`
      <div class="fruit-orb"></div>
      <div class="fruit-info">
        <h4>${f.name}</h4>
        <div class="meta">
          <span class="badge ${f.type.toLowerCase()}">${f.type}</span>
          <span class="badge user">☠ ${f.user||'Unknown'}</span>
        </div>
        <p>${f.description}</p>
      </div>`;
    grid.appendChild(card);
  });
  showView('fruits');
}

/* ================= EVENTS ================= */
tabs.chars.addEventListener('click',()=>{renderGrid();showView('chars');});
tabs.fruits.addEventListener('click',renderFruits);
$('btn-detail-back').addEventListener('click',()=>{renderGrid();showView('chars');});
$('btn-fruit-back').addEventListener('click',()=>{renderGrid();showView('chars');});

/* ================= INIT ================= */
renderGrid();
</script>
