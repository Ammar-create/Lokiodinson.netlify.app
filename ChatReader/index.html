    // ─── PARSER ───────────────────────────────────────────────
    function parseChat(text) {
      if (!text) return null;
      const lines = text.split('\n');
      let title = 'Untitled Conversation', date = '';

      const tLine = lines.find(l => l.trim().startsWith('# '));
      if (tLine) title = tLine.replace(/^#\s*/, '').trim();

      const dLine = lines.slice(0, 20).find(l => { const t = l.trim(); return (t.startsWith('*') && t.endsWith('*')) || (t.startsWith('_') && t.endsWith('_')); });
      if (dLine) date = dLine.replace(/^[*_]+|[*_]+$/g, '').trim();

      const rawBlocks = text.split(/\n\s*---\s*\n/);
      const messages = [];
      let id = 0;

      for (const block of rawBlocks) {
        const trimmed = block.trim();
        if (!trimmed) continue;

        let role = null, content = trimmed;
        if (trimmed.startsWith('**User**:')) { role = 'user'; content = trimmed.slice(9).trim(); }
        else if (trimmed.startsWith('**Assistant**:')) { role = 'assistant'; content = trimmed.slice(14).trim(); }
        else {
          const u = trimmed.indexOf('**User**:'), a = trimmed.indexOf('**Assistant**:');
          if (u !== -1 && (a === -1 || u < a)) { role = 'user'; content = trimmed.slice(u + 9).trim(); }
          else if (a !== -1) { role = 'assistant'; content = trimmed.slice(a + 14).trim(); }
        }
        if (!role) continue;

        let reasoning = null;
        if (role === 'assistant') {
          const mLines = content.split('\n');
          const rLines = [], bodyLines = [];
          let inR = true;
          for (const l of mLines) {
            const tl = l.trim();
            if (inR && (tl.startsWith('>') || (tl === '' && rLines.length > 0))) {
              rLines.push(tl.startsWith('>') ? tl.slice(1).replace(/^\s/, '') : tl);
            } else { inR = false; bodyLines.push(l); }
          }
          if (rLines.some(l => l.trim())) {
            reasoning = rLines.join('\n').trim();
            content = bodyLines.join('\n').trim();
          }
        }

        messages.push({ id: id++, role, content, reasoning });
      }
      return { title, date, messages };
    }

    const escapeReg = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    function highlightMatches(html, term) {
      if (!term.trim()) return html;
      const re = new RegExp(`(${escapeReg(term.trim())})`, 'gi');
      return html.replace(/<(?:"[^"]*"['"]*|'[^']*'['"]*|[^'">])+>|([^<<]+)/g, (match, text) => {
        if (text) return text.replace(re, '<mark class="bg-gold-400/25 dark:bg-gold-400/20 text-inherit px-0.5 rounded-sm ring-1 ring-gold-400/40">$1</mark>');
        return match;
      });
    }

    // ─── SAMPLE DATA ──────────────────────────────────────────
    const SAMPLE = `# Architecture for Scalable AI Systems
*Exported on November 12, 2024 — Personal Archive*

**User**:
I need to design a production-grade API layer for integrating LLMs into our platform. We're expecting around 25,000 concurrent users. What architecture patterns and caching strategies would you recommend?

---

**Assistant**:
> Thinking process:
> 1. Analyze the scale — 25K concurrent implies we need async, non-blocking I/O
> 2. Key layers: edge proxy, API gateway, orchestration, semantic cache, fallback
> 3. Caching strategies: semantic similarity cache using vector embeddings
> 4. Resilience: circuit breakers for provider failures, model fallback chains

To handle this scale gracefully, you need a **reactive, decoupled architecture** — not synchronous request-response chains that tie up server resources.

### Proposed Topology

\`\`\`
[ Clients ]
    │
    ▼
[ Edge Proxy ]  ← TLS, DDoS, Rate Limiting
    │
    ▼
[ API Gateway ]  ← Auth, Routing
    │
    ├──────────────────┐
    ▼                  ▼
[ Semantic Cache ]  [ Orchestrator ]
[ Redis + Vectors ]      │
    │               ┌────┴────┐
    │               ▼         ▼
    │          [ Queue ]  [ Vector DB ]
    │               │
    ▼               ▼
[ LLM Providers ] ◄──────┘
\`\`\`

### Key Strategies

| Strategy | Mechanism | Impact |
|:---|:---|:---|
| **Semantic Cache** | Embed prompts, match ≥96% similarity | -40% token cost, ~30ms latency |
| **Circuit Breaker** | Fallback to secondary model on 5xx | 99.9% availability |
| **SSE Streaming** | Stream tokens via Server-Sent Events | TTFT from 5s → 120ms |

### Semantic Cache Implementation

\`\`\`python
class SemanticCache:
    def __init__(self, threshold=0.96):
        self.redis = redis.Redis()
        self.threshold = threshold

    def lookup(self, prompt: str):
        embedding = embed(prompt)
        results = self.redis.ft("idx").search(
            f"*=>[KNN 1 @vec $v AS score]",
            query_params={"v": embedding}
        )
        if results and results.docs[0].score >= self.threshold:
            return results.docs[0].response
        return None
\`\`\`

---

**User**:
How do we stream responses back to the frontend while preventing connection pool exhaustion?

---

**Assistant**:
> Thinking:
> SSE is lighter than WebSockets for unidirectional streams
> Need to close connections immediately on completion
> Set explicit timeouts to prevent zombie connections
> Use backpressure-aware piping

Use **Server-Sent Events** with explicit lifecycle management. Here's a clean Node implementation:

\`\`\`javascript
app.get('/stream', (req, res) => {
  res.setHeader('Content-Type', 'text/event-stream');
  res.setHeader('Cache-Control', 'no-cache');
  res.setHeader('Connection', 'keep-alive');

  const stream = createLLMStream(req.body.prompt);

  stream.on('data', (chunk) => {
    res.write(\`data: \${JSON.stringify({ text: chunk })}\\n\\n\`);
  });

  stream.on('end', () => {
    res.write('data: [DONE]\\n\\n');
    res.end();
  });

  req.on('close', () => stream.destroy());
});
\`\`\`

The critical pattern: **destroy the upstream stream when the client disconnects**. Without this, you leak connections on every abandoned tab.

    function App() {
      const [conv, setConv] = useState(null);
      const [search, setSearch] = useState('');
      const [searchIdx, setSearchIdx] = useState(0);
      const [collapsedReasoning, setCollapsedReasoning] = useState({});
      const [sidebarOpen, setSidebarOpen] = useState(window.innerWidth >= 1024);
      const [dark, setDark] = useState(() => localStorage.getItem('cr-theme') === 'dark' || (!localStorage.getItem('cr-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches));
      const [progress, setProgress] = useState(0);
      const [drag, setDrag] = useState(false);
      const [toast, setToast] = useState(null);
      const [copiedId, setCopiedId] = useState(null);
      const scrollRef = useRef(null);

      useEffect(() => {
        document.documentElement.classList.toggle('dark', dark);
        localStorage.setItem('cr-theme', dark ? 'dark' : 'light');
      }, [dark]);

      useEffect(() => {
        if (conv && typeof Prism !== 'undefined') setTimeout(() => Prism.highlightAll(), 80);
      }, [conv, search, collapsedReasoning]);

      // Responsive sidebar
      useEffect(() => {
        const handle = () => { if (window.innerWidth < 1024) setSidebarOpen(false); };
        window.addEventListener('resize', handle);
        return () => window.removeEventListener('resize', handle);
      }, []);

      const onScroll = () => {
        const c = scrollRef.current;
        if (!c) return;
        const h = c.scrollHeight - c.clientHeight;
        setProgress(h > 0 ? (c.scrollTop / h) * 100 : 0);
      };

      const loadFile = (file) => {
        const r = new FileReader();
        r.onload = e => {
          const p = parseChat(e.target.result);
          if (p && p.messages.length) { setConv(p); showToast('Conversation loaded'); }
          else showToast('Could not parse this file', true);
        };
        r.readAsText(file);
      };

      const loadDemo = () => {
        const p = parseChat(SAMPLE);
        setConv(p);
        showToast('Demo conversation loaded');
      };

      const clear = () => { setConv(null); setSearch(''); setSearchIdx(0); setCollapsedReasoning({}); setProgress(0); };

      const showToast = (msg, err) => {
        setToast({ msg, err });
        setTimeout(() => setToast(null), 2500);
      };

      const stats = useMemo(() => {
        if (!conv) return null;
        const m = conv.messages;
        const wc = m.reduce((a, x) => a + x.content.split(/\s+/).length + (x.reasoning ? x.reasoning.split(/\s+/).length : 0), 0);
        return { total: m.length, user: m.filter(x => x.role === 'user').length, assistant: m.filter(x => x.role === 'assistant').length, words: wc, readMin: Math.ceil(wc / 230) };
      }, [conv]);

      const sections = useMemo(() => {
        if (!conv) return [];
        const sz = 8, res = [];
        for (let i = 0; i < conv.messages.length; i += sz)
          res.push({ i: res.length, start: i + 1, end: Math.min(i + sz, conv.messages.length), msgs: conv.messages.slice(i, i + sz) });
        return res;
      }, [conv]);

      const matches = useMemo(() => {
        if (!conv || !search.trim()) return [];
        const q = search.toLowerCase();
        return conv.messages.filter(m => m.content.toLowerCase().includes(q) || (m.reasoning && m.reasoning.toLowerCase().includes(q))).map(m => m.id);
      }, [conv, search]);

      const navSearch = (dir) => {
        if (!matches.length) return;
        const ni = dir === 'next' ? (searchIdx + 1) % matches.length : (searchIdx - 1 + matches.length) % matches.length;
        setSearchIdx(ni);
        setTimeout(() => {
          const el = document.getElementById('msg-' + matches[ni]);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      };

      const scrollToSec = (i) => {
        const el = document.getElementById('sec-' + i);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      };

      const copyMsg = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopiedId(id);
        setTimeout(() => setCopiedId(null), 1500);
      };

      const copyAll = () => {
        if (!conv) return;
        const md = conv.messages.map(m => {
          const sp = m.role === 'user' ? '**User**:' : '**Assistant**:';
          const r = m.reasoning ? m.reasoning.split('\n').map(l => '> ' + l).join('\n') + '\n' : '';
          return sp + '\n' + r + m.content;
        }).join('\n\n---\n\n');
        navigator.clipboard.writeText('# ' + conv.title + '\n*' + conv.date + '*\n\n' + md);
        showToast('Full conversation copied');
      };

      const toggleReasoning = (id) => setCollapsedReasoning(p => ({ ...p, [id]: !p[id] }));

      const handleDrag = (e) => { e.preventDefault(); e.stopPropagation(); setDrag(e.type === 'dragover' || e.type === 'dragenter'); };
      const handleDrop = (e) => { e.preventDefault(); e.stopPropagation(); setDrag(false); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); };

      return (
        <div className="h-full flex relative">

            <div className={`fixed top-5 right-5 z-50 px-4 py-2.5 rounded-lg text-sm font-medium shadow-lg animate-fade-in backdrop-blur-md border ${
              toast.err ? 'bg-red-50/90 dark:bg-red-950/90 border-red-200 dark:border-red-900 text-red-700 dark:text-red-300'
                        : 'bg-white/90 dark:bg-ink-800/90 border-parchment-300 dark:border-ink-700 text-ink-600 dark:text-ink-100'
            }`}>{toast.msg}</div>
          )}

            sidebarOpen ? 'translate-x-0' : '-translate-x-full'
          } bg-parchment-50/80 dark:bg-ink-800/80 backdrop-blur-xl border-r border-parchment-300/50 dark:border-ink-700/40 flex flex-col`}>

            {/* Sidebar header */}

              <div className="flex items-center gap-2.5">
                {I.book}
                <span className="font-serif font-semibold text-base text-ink-600 dark:text-ink-100">Chat Reader</span>
              </div>
              <button onClick={() => setSidebarOpen(false)} className="lg:hidden p-1 rounded hover:bg-parchment-200 dark:hover:bg-ink-700 text-ink-300 dark:text-ink-400">{I.x}</button>
            </div>

            {/* Sidebar body */}
            <div className="flex-1 overflow-y-auto p-4 space-y-5">

              {conv && (
                <>
                  {/* Meta card */}
                  <div className="p-3.5 rounded-xl bg-parchment-100/60 dark:bg-ink-700/30 border border-parchment-300/30 dark:border-ink-700/30 space-y-2 animate-fade-in">
                    <p className="font-serif font-semibold text-sm leading-snug line-clamp-2">{conv.title}</p>
                    <p className="text-[11px] text-ink-300 dark:text-ink-400 italic">{conv.date}</p>
                  </div>

                  {/* Stats */}
                  <div className="grid grid-cols-3 gap-2 animate-fade-up delay-1">
                    {[
                      [stats.total, 'msgs'],
                      [stats.user, 'user'],
                      [stats.assistant, 'asst'],
                    ].map(([n, l], i) => (
                      <div key={i} className="text-center p-2.5 rounded-lg bg-parchment-100/40 dark:bg-ink-700/20 border border-parchment-200/30 dark:border-ink-700/20">
                        <div className="font-serif font-bold text-lg text-gold-500">{n}</div>
                        <div className="text-[10px] uppercase tracking-widest text-ink-300 dark:text-ink-500 font-medium">{l}</div>
                      </div>
                    ))}
                  </div>

                  <div className="flex items-center gap-2 text-xs text-ink-300 dark:text-ink-500 animate-fade-up delay-2">
                    <span>{stats.words.toLocaleString()} words</span>
                    <span className="text-parchment-300 dark:text-ink-700">·</span>
                    <span>~{stats.readMin} min read</span>
                  </div>

                  <div className="gold-line" />

                  {/* Search */}
                  <div className="space-y-2 animate-fade-up delay-2">
                    <label className="text-[10px] uppercase tracking-widest font-medium text-ink-300 dark:text-ink-500">Search</label>
                    <div className="relative">
                      <div className="absolute left-2.5 top-2 text-ink-300 dark:text-ink-500">{I.search}</div>
                      <input
                        type="text" placeholder="Find in conversation…"
                        value={search} onChange={e => { setSearch(e.target.value); setSearchIdx(0); }}
                        className="w-full pl-9 pr-3 py-1.5 rounded-lg border border-parchment-300/50 dark:border-ink-700/40 bg-white/50 dark:bg-ink-800/50 text-sm placeholder:text-ink-200 dark:placeholder:text-ink-600 focus:outline-none focus:ring-1 focus:ring-gold-500/50 focus:border-gold-500/40 transition-shadow"
                      />
                    </div>
                    {search.trim() && (
                      <div className="flex items-center justify-between text-[11px] px-0.5">
                        <span className="text-ink-300 dark:text-ink-500">{matches.length} result{matches.length !== 1 ? 's' : ''}</span>
                        {matches.length > 0 && (
                          <div className="flex items-center gap-1.5">
                            <button onClick={() => navSearch('prev')} className="px-1.5 py-0.5 rounded border border-parchment-300/50 dark:border-ink-700/40 bg-white dark:bg-ink-800 hover:bg-parchment-200 dark:hover:bg-ink-700 text-ink-400 dark:text-ink-300 transition-colors">←</button>
                            <span className="font-mono text-ink-400 dark:text-ink-400">{searchIdx + 1}/{matches.length}</span>
                            <button onClick={() => navSearch('next')} className="px-1.5 py-0.5 rounded border border-parchment-300/50 dark:border-ink-700/40 bg-white dark:bg-ink-800 hover:bg-parchment-200 dark:hover:bg-ink-700 text-ink-400 dark:text-ink-300 transition-colors">→</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>

                  <div className="gold-line" />

                  {/* Sections */}
                  <div className="space-y-1.5 animate-fade-up delay-3">
                    <label className="text-[10px] uppercase tracking-widest font-medium text-ink-300 dark:text-ink-500">Sections</label>
                    <div className="space-y-0.5 max-h-48 overflow-y-auto pr-1">
                      {sections.map((s, i) => (
                        <button key={i} onClick={() => scrollToSec(i)}
                          className="w-full flex items-center justify-between px-2.5 py-2 rounded-lg text-left text-[12px] text-ink-400 dark:text-ink-400 hover:text-ink-600 dark:hover:text-ink-200 hover:bg-parchment-200/50 dark:hover:bg-ink-700/30 transition-colors">
                          <span className="font-serif">Section {i + 1}</span>
                          <span className="font-mono text-[10px] text-ink-200 dark:text-ink-600">{s.start}–{s.end}</span>
                        </button>
                      ))}
                    </div>
                  </div>

                  {/* Clear */}
                  <div className="pt-2 animate-fade-up delay-4">
                    <button onClick={clear}
                      className="w-full flex items-center justify-center gap-1.5 py-2 rounded-lg border border-red-200/50 dark:border-red-900/30 text-red-500 dark:text-red-400 text-xs font-medium hover:bg-red-50 dark:hover:bg-red-950/20 transition-colors">
                      {I.trash} <span>Close</span>
                    </button>
                  </div>
                </>
              )}

              {!conv && (
                <div className="flex flex-col items-center justify-center h-full text-ink-300 dark:text-ink-600 space-y-2">
                  {I.book}
                  <p className="text-xs">Import a file to begin</p>
                </div>
              )}
            </div>

            {/* Sidebar footer — theme */}
            <div className="h-12 flex items-center justify-between px-5 border-t border-parchment-300/40 dark:border-ink-700/30 shrink-0">
              <span className="text-[10px] uppercase tracking-widest font-medium text-ink-300 dark:text-ink-500">Theme</span>
              <button onClick={() => setDark(!dark)}
                className="flex items-center gap-1.5 px-2.5 py-1 rounded-lg border border-parchment-300/40 dark:border-ink-700/30 text-[11px] font-medium text-ink-400 dark:text-ink-400 hover:bg-parchment-200/40 dark:hover:bg-ink-700/30 transition-colors">
                {dark ? I.sun : I.moon}
                <span>{dark ? 'Light' : 'Dark'}</span>
              </button>
            </div>
          </aside>

          {/* Sidebar overlay (mobile) */}
          {sidebarOpen && (
            <div className="fixed inset-0 bg-black/20 dark:bg-black/40 z-30 lg:hidden" onClick={() => setSidebarOpen(false)} className="animate-fade-in" />
          )}

          {/* ─── MAIN ─── */}
          <main className="flex-1 flex flex-col min-w-0 h-full">

            {/* Sticky header */}
            <header className="h-14 flex items-center justify-between px-4 md:px-8 border-b border-parchment-300/40 dark:border-ink-700/30 bg-parchment-50/80 dark:bg-ink-900/80 backdrop-blur-xl shrink-0 z-20">
              <div className="flex items-center gap-3 min-w-0">
                <button onClick={() => setSidebarOpen(true)} className="p-1.5 rounded-lg border border-parchment-300/40 dark:border-ink-700/30 hover:bg-parchment-200/40 dark:hover:bg-ink-700/30 transition-colors text-ink-400 dark:text-ink-400 lg:hidden">{I.menu}</button>
                {conv ? (
                  <h1 className="font-serif font-medium text-sm md:text-base truncate text-ink-600 dark:text-ink-100">{conv.title}</h1>
                ) : (
                  <span className="font-serif text-sm text-ink-300 dark:text-ink-500 italic">No file loaded</span>
                )}
              </div>
              {conv && (
                <div className="flex items-center gap-2">
                  <button onClick={copyAll}
                    className="hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-lg border border-parchment-300/40 dark:border-ink-700/30 text-[11px] font-medium text-ink-400 dark:text-ink-400 hover:bg-parchment-200/40 dark:hover:bg-ink-700/30 hover-lift transition-all">
                    {I.copy} <span>Copy All</span>
                  </button>
                  <label className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-gold-500 text-white text-[11px] font-semibold cursor-pointer hover:bg-gold-600 transition-colors hover-lift">
                    Upload
                    <input type="file" accept=".md" className="hidden" onChange={e => e.target.files[0] && loadFile(e.target.files[0])} />
                  </label>
                </div>
              )}
            </header>

            {/* Progress */}
            {conv && <div className="h-[2px] bg-parchment-200/30 dark:bg-ink-700/20 shrink-0"><div className="h-full bg-gradient-to-r from-gold-500 to-gold-400 transition-all duration-100" style={{ width: progress + '%' }} /></div>}

            {/* Content */}
            {!conv ? (
              <div
                className={`flex-1 flex items-center justify-center p-6 transition-colors duration-300 ${drag ? 'bg-gold-400/5' : ''}`}
                onDragOver={handleDrag} onDragEnter={handleDrag} onDragLeave={handleDrag} onDrop={handleDrop}
              >
                <div className="max-w-lg w-full text-center space-y-8">
                  <div className="space-y-4 animate-fade-up">
                    <div className="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-parchment-200/40 dark:bg-ink-700/30 text-gold-500">
                      {I.upload}
                    </div>
                    <h2 className="font-serif text-2xl md:text-3xl font-semibold text-ink-600 dark:text-ink-100 leading-tight">Read your conversations beautifully</h2>
                    <p className="text-sm text-ink-300 dark:text-ink-500 leading-relaxed max-w-sm mx-auto">
                      Drop a Markdown chat export and it transforms into a refined reading experience.
                    </p>
                  </div>

                  <div className={`p-10 rounded-2xl border-2 border-dashed transition-all duration-200 ${
                    drag ? 'border-gold-500 bg-gold-400/5 scale-[1.01]' : 'border-parchment-300/60 dark:border-ink-700/40'
                  }`}>
                    <p className="text-sm font-medium text-ink-400 dark:text-ink-400 mb-5">Drag a <code className="font-mono text-gold-500 text-xs">.md</code> file here</p>
                    <div className="flex flex-col sm:flex-row items-center justify-center gap-3">
                      <label className="px-5 py-2.5 bg-ink-600 dark:bg-ink-100 text-white dark:text-ink-800 rounded-xl text-sm font-semibold cursor-pointer hover:opacity-90 transition-opacity hover-lift">
                        Browse Files
                        <input type="file" accept=".md" className="hidden" onChange={e => e.target.files[0] && loadFile(e.target.files[0])} />
                      </label>
                      <span className="text-[11px] text-ink-300 dark:text-ink-600">or</span>
                      <button onClick={loadDemo} className="px-5 py-2.5 rounded-xl border border-parchment-300/50 dark:border-ink-700/40 text-sm font-medium text-ink-500 dark:text-ink-300 hover:bg-parchment-200/40 dark:hover:bg-ink-700/30 transition-colors hover-lift">
                        Try Demo
                      </button>
                    </div>
                  </div>

                  <div className="text-[11px] text-ink-200 dark:text-ink-600 space-y-1 animate-fade-up delay-3">
                    <p>Supports <code className="font-mono text-[10px] text-gold-500">**User**:</code> and <code className="font-mono text-[10px] text-gold-500">**Assistant**:</code> roles</p>
                    <p>Separated by <code className="font-mono text-[10px] text-gold-500">---</code> with <code className="font-mono text-[10px] text-gold-500">></code> reasoning blocks</p>
                  </div>
                </div>
              </div>
            ) : (
              <div ref={scrollRef} onScroll={onScroll} className="flex-1 overflow-y-auto">
                <div className="max-w-3xl mx-auto px-4 md:px-8 py-10 md:py-16">

                  {/* Conversation title page */}
                  <div className="text-center mb-16 animate-fade-up">
                    <div className="gold-line mb-8" />
                    <h2 className="font-serif text-3xl md:text-4xl font-bold text-ink-600 dark:text-ink-50 leading-tight mb-3">{conv.title}</h2>
                    <p className="text-xs text-ink-300 dark:text-ink-500 italic font-serif">{conv.date}</p>
                    <div className="flex items-center justify-center gap-4 mt-4 text-[11px] text-ink-300 dark:text-ink-500">
                      <span>{stats.total} messages</span>
                      <span className="text-parchment-300 dark:text-ink-700">·</span>
                      <span>~{stats.readMin} min read</span>
                    </div>
                    <div className="gold-line mt-8" />
                  </div>

                  {/* Messages */}
                  <div className="space-y-8">
                    {conv.messages.map((msg, mi) => {
                      const isUser = msg.role === 'user';
                      const isMatch = matches.includes(msg.id);
                      const isCurrentMatch = matches[searchIdx] === msg.id;
                      const reasoningOpen = collapsedReasoning[msg.id] === true;
                      const contentHtml = highlightMatches(marked.parse(msg.content), search);
                      const reasoningHtml = msg.reasoning ? highlightMatches(marked.parse(msg.reasoning), search) : '';

                      return (
                        <div key={msg.id} id={'msg-' + msg.id}
                          className={`group animate-fade-up ${
                            isCurrentMatch ? 'ring-2 ring-gold-400/40 rounded-xl' : ''
                          }`}
                          style={{ animationDelay: `${Math.min(mi * 0.03, 0.5)}s` }}>

                          {/* Speaker label */}
                          <div className="flex items-center gap-2 mb-2.5">
                            <div className={`w-1.5 h-1.5 rounded-full ${isUser ? 'bg-ink-300 dark:bg-ink-500' : 'bg-gold-500'}`} />
                            <span className={`text-[11px] uppercase tracking-widest font-medium ${isUser ? 'text-ink-300 dark:text-ink-500' : 'text-gold-500'}`}>
                              {isUser ? 'User' : 'Assistant'}
                            </span>
                          </div>

                          {/* Message body */}
                          <div className={`relative rounded-xl px-5 py-4 md:px-7 md:py-5 ${
                            isUser
                              ? 'bg-ink-600 dark:bg-ink-100 text-white dark:text-ink-800 ml-8 md:ml-16'
                              : 'bg-parchment-200/30 dark:bg-ink-700/20 border border-parchment-300/30 dark:border-ink-700/20 mr-8 md:mr-16'
                          } ${isMatch && !isCurrentMatch ? 'ring-1 ring-gold-400/20' : ''} transition-shadow duration-300`}>

                            {/* Reasoning */}
                            {!isUser && msg.reasoning && (
                              <div className="mb-4 rounded-lg border border-gold-500/15 dark:border-gold-500/10 bg-sepia-50/40 dark:bg-gold-500/5 overflow-hidden">
                                <button onClick={() => toggleReasoning(msg.id)}
                                  className="w-full flex items-center justify-between px-4 py-2.5 text-[12px] font-medium text-gold-600 dark:text-gold-400 hover:bg-sepia-100/30 dark:hover:bg-gold-500/10 transition-colors">
                                  <span className="flex items-center gap-2">{I.brain} Reasoning</span>
                                  <span className="flex items-center gap-1.5">
                                    <span className="text-[10px] text-gold-500/60">{reasoningOpen ? 'show' : 'hidden'}</span>
                                    {I.chevDown(reasoningOpen)}
                                  </span>
                                </button>
                                <div className={`reasoning-body ${reasoningOpen ? 'collapsed' : 'expanded'}`}
                                  style={!reasoningOpen ? { maxHeight: '600px' } : { maxHeight: '0px' }}>
                                  <div className="px-4 py-3 text-[13px] leading-relaxed text-sepia-300 dark:text-gold-300/60 prose-chat border-t border-gold-500/10">
                                    <div dangerouslySetInnerHTML={{ __html: reasoningHtml }} />
                                  </div>
                                </div>
                              </div>
                            )}

                            {/* Content */}
                            <div className={`prose-chat text-[14px] md:text-[15px] ${isUser ? 'text-inherit' : ''}`} dangerouslySetInnerHTML={{ __html: contentHtml }} />

                            {/* Copy button */}
                            <button onClick={() => copyMsg(msg.content, msg.id)}
                              className={`absolute top-3 right-3 p-1.5 rounded-md text-ink-200 dark:text-ink-500 hover:text-gold-500 dark:hover:text-gold-400 hover:bg-parchment-200/40 dark:hover:bg-ink-700/40 opacity-0 group-hover:opacity-100 transition-all`}
                              title="Copy message">
                              {copiedId === msg.id ? I.check : I.copy}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* End marker */}
                  <div className="text-center mt-20 mb-10">
                    <div className="gold-line mb-6" />
                    <p className="font-serif text-xs text-ink-200 dark:text-ink-600 italic">End of conversation</p>
                  </div>
                </div>
              </div>
            )}

            {/* Back to top */}
            {conv && progress > 15 && (
              <button onClick={() => scrollRef.current?.scrollTo({ top: 0, behavior: 'smooth' })}
                className="fixed bottom-6 right-6 z-20 p-3 rounded-full bg-parchment-50/90 dark:bg-ink-800/90 border border-parchment-300/40 dark:border-ink-700/30 shadow-lg text-ink-400 dark:text-ink-400 hover:text-gold-500 dark:hover:text-gold-400 hover-lift transition-all animate-fade-in backdrop-blur-md">
                {I.arrowUp}
              </button>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
