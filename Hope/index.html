<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Question for Rida...</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* --- Start of Combined CSS --- */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #ffd6e0, #e0f7fa);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      text-align: center;
      overflow: hidden; /* Hide overflow to prevent scrollbars from animations */
      position: relative; /* Needed for positioning hearts */
    }

    #quiz-box {
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
      padding: 40px 30px;
      max-width: 420px;
      width: 100%;
      animation: pop 0.6s ease;
      z-index: 10; /* Keep quiz box above hearts */
      position: relative; /* Ensure it's above absolutely positioned elements */
      transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
    }

    /* State for fading out question */
    .question-changing {
      opacity: 0;
      transform: translateY(20px);
    }

    @keyframes pop {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    h2 {
      font-family: 'Pacifico', cursive;
      font-size: 28px;
      color: #ff6b81;
      margin-bottom: 20px;
      min-height: 60px; /* Prevent layout shift */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button {
      margin: 10px;
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
      will-change: transform; /* Optimize animation */
    }

    button:hover {
      transform: scale(1.05);
    }

    /* Button click feedback */
    button:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .yes-btn { background: #ff6b81; color: white; }
    .yes-btn:hover { background: #ff4757; transform: scale(1.1); } /* Make Yes more inviting */

    .no-btn { background: #74b9ff; color: white; }
    .no-btn:hover {
      background: #54a0ff;
      /* Subtle move effect */
      transform: translate(5px, 2px) scale(1.05);
    }

    #admin-btn { /* Changed ID from #result-btn to #admin-btn */
      position: fixed;
      top: 20px;
      right: 20px;
      background: #6c5ce7;
      color: white;
      padding: 12px 18px;
      border-radius: 10px;
      cursor: pointer;
      border: none;
      font-weight: bold;
      z-index: 20; /* Keep admin button above hearts */
    }
    #admin-btn:hover { background: #5847d1; }

    .emoji {
      font-size: 30px; /* Slightly bigger emoji */
      display: block;
      margin-top: 15px;
      margin-bottom: 25px; /* More space before buttons */
      min-height: 35px; /* Prevent layout shift */
    }

    footer {
      position: fixed;
      bottom: 10px;
      font-size: 14px;
      color: #555;
      z-index: 10; /* Keep footer above hearts */
    }

    /* --- Floating Hearts Animation --- */
    #hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 1; /* Behind quiz box but above background */
      pointer-events: none; /* Allow clicks to go through */
    }

    .heart {
      position: absolute;
      bottom: -50px; /* Start below screen */
      font-size: 20px;
      color: rgba(255, 107, 129, 0.6); /* Semi-transparent pink */
      animation: floatUp 10s infinite linear;
      user-select: none; /* Prevent text selection */
    }

    /* Add variety */
    .heart:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; font-size: 18px; }
    .heart:nth-child(2) { left: 30%; animation-duration: 8s;  animation-delay: 1s; font-size: 22px; }
    .heart:nth-child(3) { left: 50%; animation-duration: 15s; animation-delay: 0.5s; font-size: 16px; }
    .heart:nth-child(4) { left: 70%; animation-duration: 9s;  animation-delay: 2s; font-size: 24px; }
    .heart:nth-child(5) { left: 90%; animation-duration: 11s; animation-delay: 1.5s; font-size: 19px; }
    .heart:nth-child(6) { left: 20%; animation-duration: 13s; animation-delay: 3s; font-size: 21px; }
    .heart:nth-child(7) { left: 80%; animation-duration: 10s; animation-delay: 2.5s; font-size: 17px; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.6;
      }
      100% {
        transform: translateY(-110vh) rotate(720deg); /* Move up past the screen height */
        opacity: 0;
      }
    }
    /* --- End of Combined CSS --- */

    /* Admin Panel Specific Styles */
    #admin-panel {
      display: none; /* Hidden by default */
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0,0,0,0.2);
      padding: 30px;
      max-width: 90%;
      max-height: 90%;
      overflow-y: auto; /* Scroll for long content */
      z-index: 100; /* Above everything */
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
    }

    #admin-panel h3 {
      font-family: 'Pacifico', cursive;
      color: #6c5ce7;
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-size: 24px;
    }

    #admin-panel pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 8px;
      white-space: pre-wrap; /* Wrap long lines */
      word-break: break-all; /* Break long words */
      max-height: 300px; /* Limit height for scroll */
      overflow-y: auto;
      margin-bottom: 20px;
    }

    #admin-panel button {
      display: block;
      width: fit-content;
      margin: 20px auto 0;
      background: #ff4757;
      color: white;
      padding: 10px 20px;
      border-radius: 8px;
    }
    #admin-panel button:hover {
      background: #e13a48;
    }
    #admin-panel .close-btn {
        background: #ccc;
        margin-top: 10px;
    }
    #admin-panel .close-btn:hover {
        background: #bbb;
    }

    /* Why Input Box Styles */
    #why-popup-overlay {
        display: none; /* Crucial: Ensure it's hidden by default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 101; /* Above admin panel */
        /* These below ensure it's centered when it IS displayed */
        align-items: center;
        justify-content: center;
    }

    #why-popup {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        max-width: 350px;
        width: 90%;
        text-align: center;
    }

    #why-popup h4 {
        margin-top: 0;
        color: #ff6b81;
        font-size: 22px;
        font-family: 'Pacifico', cursive;
    }

    #why-popup textarea {
        width: calc(100% - 20px);
        min-height: 80px;
        padding: 10px;
        margin-top: 15px;
        border: 1px solid #ccc;
        border-radius: 8px;
        font-family: 'Poppins', sans-serif;
        font-size: 14px;
        resize: vertical; /* Allow vertical resizing */
    }

    #why-popup button {
        background: #6c5ce7;
        color: white;
        margin-top: 20px;
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: bold;
        transition: background-color 0.2s ease;
    }

    #why-popup button:hover {
        background: #5847d1;
    }

  </style>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>

  <div id="hearts-container">
    <div class="heart">❤️</div>
    <div class="heart">💖</div>
    <div class="heart">💕</div>
    <div class="heart">💗</div>
    <div class="heart">💓</div>
    <div class="heart">💝</div>
    <div class="heart">💞</div>
  </div>

  <button id="admin-btn">Admin</button> <div id="quiz-box">
    <h2 id="question">Loading...</h2>
    <div class="emoji" id="emoji">...</div>
    <button class="yes-btn" onclick="selectAnswer('Yes')">Yes</button>
    <button class="no-btn" onclick="selectAnswer('No')">No</button>
  </div>

  <div id="admin-panel">
    <h3>Admin Panel</h3>
    <h4>Rida's Responses:</h4>
    <pre id="rida-responses"></pre>
    <h4>Visitor Information:</h4>
    <pre id="visitor-info"></pre>
    <button id="clear-results-btn">Clear Previous Results (Rida's Answers Only)</button>
    <button class="close-btn" onclick="document.getElementById('admin-panel').style.display='none';">Close</button>
  </div>

  <div id="why-popup-overlay">
      <div id="why-popup">
          <h4>Why?</h4>
          <textarea id="why-input" placeholder="Please tell me why..."></textarea>
          <button id="submit-why-btn">Submit</button>
      </div>
  </div>

  <footer>
    © <span id="year"></span> Ammar. All rights reserved.
  </footer>

  <script defer>
    // Firebase Config (Ensure this is correct)
    // SECURITY RISK: These keys are visible in the browser !!
    // Changed to var to allow re-declaration without error if script runs multiple times
    var firebaseConfig = {
      apiKey: "AIzaSyADxJDcYRyurB-0WGD3dLIP-U9606N_3lQ", // Replace with YOUR key if different
      authDomain: "lokiodinsonauth.firebaseapp.com",
      databaseURL: "https://lokiodinsonauth-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "lokiodinsonauth",
      storageBucket: "lokiodinsonauth.appspot.com",
      messagingSenderId: "867025984222",
      appId: "1:867025984222:web:5c9d19de0d77ffeee4804f",
      measurementId: "G-9NQGLPNW6B"
    };

    // Initialize Firebase only if it hasn't been initialized yet
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    // Changed to var to allow re-declaration without error
    var db = firebase.database();

    // Updated Questions (from previous turn, with grammatical corrections)
    const questions = [
      "Are you having a good day?",
      "Now that your exams are over, can I text you as usual?",
      "I know you might find this weird, but I don't have many friends to talk with, so I'd like to be your friend. May I?",
      "Should I visit your place? I was thinking I could come with Bhai Waqas.",
      "Since this month marks the beginning of our issues, I feel it's also when I should try to resolve them. What do you think?",
      "From now on, can I send you some low IQ memes? ✨"
    ];

    // Updated Emojis
    const emojis = [
      '💫', '💬', '🙂', '🫂', '😊', '🧐'
    ];
    let current = 0;
    let pendingNoAnswerData = null; // To store data temporarily for 'No' answer

    // Get DOM elements once
    const quizBox = document.getElementById('quiz-box');
    const questionEl = document.getElementById('question');
    const emojiEl = document.getElementById('emoji');
    const yesBtn = document.querySelector('.yes-btn');
    const noBtn = document.querySelector('.no-btn');
    const adminBtn = document.getElementById('admin-btn'); // Corrected ID
    const adminPanel = document.getElementById('admin-panel');
    const ridaResponsesPre = document.getElementById('rida-responses');
    const visitorInfoPre = document.getElementById('visitor-info');
    const clearResultsBtn = document.getElementById('clear-results-btn');
    const whyPopupOverlay = document.getElementById('why-popup-overlay');
    const whyInput = document.getElementById('why-input');
    const submitWhyBtn = document.getElementById('submit-why-btn');


    // Function to display the current question
    function showQuestion() {
      quizBox.classList.remove('question-changing'); // Fade in

      if (current < questions.length) {
        if (current === 0) {
          questionEl.innerHTML = `Hey Rida, ${questions[current]}`;
        } else {
          questionEl.innerHTML = questions[current];
        }
        emojiEl.innerText = emojis[current];
        yesBtn.style.display = 'inline-block';
        noBtn.style.display = 'inline-block';
      } else {
        // Final message
        questionEl.innerText = "Aww, Thank You Rida for your time ♥️";
        emojiEl.innerHTML = " Muaaah ❤️";
        yesBtn.style.display = 'none';
        noBtn.style.display = 'none';
      }
    }

    // Function to handle answer selection
    function selectAnswer(ans) {
      if (current < questions.length) {
        if (ans === 'No') {
            // Store current question data and show the 'Why' popup
            pendingNoAnswerData = {
                question: questions[current],
                answer: ans,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                whyReason: '' // Will be filled later
            };
            whyPopupOverlay.style.display = 'flex'; // Show the popup
            whyInput.value = ''; // Clear previous input
            whyInput.focus(); // Focus on the input
        } else {
            // For 'Yes' answers, directly save and proceed
            saveResponse({
                question: questions[current],
                answer: ans,
                timestamp: firebase.database.ServerValue.TIMESTAMP
            });
            nextQuestion();
        }
      }
    }

    // Function to save response to Firebase
    function saveResponse(data) {
        db.ref('responses/rida').push(data)
            .then(() => {
                console.log("Response saved successfully!");
            })
            .catch((error) => {
                console.error("Error saving response: ", error);
                alert("Sorry, there was an error saving your answer. Please try again.");
            });
    }

    // Function to move to the next question
    function nextQuestion() {
        quizBox.classList.add('question-changing'); // Fade out
        current++;
        setTimeout(showQuestion, 500); // Wait for fade out animation before showing next question
    }

    // Event listener for the 'Submit' button in the 'Why' popup
    submitWhyBtn.addEventListener('click', () => {
        const reason = whyInput.value.trim();
        if (reason === '') {
            alert("Please tell me why. This field is mandatory.");
            return;
        }

        if (pendingNoAnswerData) {
            pendingNoAnswerData.whyReason = reason;
            saveResponse(pendingNoAnswerData); // Save the 'No' answer with reason
            pendingNoAnswerData = null; // Clear pending data
        }
        whyPopupOverlay.style.display = 'none'; // Hide the popup
        nextQuestion(); // Proceed to next question
    });

    // --- Visitor Tracking Function ---
    async function trackVisitor() {
        const visitorData = {
            userAgent: navigator.userAgent,
            screenResolution: `${window.screen.width}x${window.screen.height}`,
            language: navigator.language,
            platform: navigator.platform,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        try {
            // Attempt to get public IP from a third-party service
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            visitorData.ipAddress = ipData.ip;
        } catch (error) {
            console.error("Could not fetch IP address:", error);
            visitorData.ipAddress = "N/A"; // Fallback if IP cannot be fetched
        }

        db.ref('visitors').push(visitorData)
            .then(() => {
                console.log("Visitor data saved successfully!");
            })
            .catch((error) => {
                console.error("Error saving visitor data: ", error);
            });
    }

    // --- Admin Panel Functions ---
    const ADMIN_PASSWORD = "1234"; // !! This is insecure in client-side code !!

    async function fetchResultsAndVisitors() {
        let ridaOutput = 'Rida\'s Sweet Answers:\n====================\n';
        let visitorOutput = 'Visitor Information:\n====================\n';

        try {
            // Fetch Rida's Responses
            const responsesSnapshot = await db.ref('responses/rida').once('value');
            const allResponses = responsesSnapshot.val();

            if (allResponses) {
                for (let key in allResponses) {
                    const response = allResponses[key];
                    const date = response.timestamp ? new Date(response.timestamp).toLocaleString() : 'N/A';
                    ridaOutput += `\nQ: ${response.question}\nA: ${response.answer}`;
                    if (response.answer === 'No' && response.whyReason) {
                        ridaOutput += ` (Reason: ${response.whyReason})`;
                    }
                    ridaOutput += `\n(Time: ${date})\n---\n`;
                }
            } else {
                ridaOutput += "\nNo responses recorded yet.";
            }
            ridaResponsesPre.innerText = ridaOutput;

            // Fetch Visitor Info
            const visitorsSnapshot = await db.ref('visitors').once('value');
            const allVisitors = visitorsSnapshot.val();

            if (allVisitors) {
                for (let key in allVisitors) {
                    const visitor = allVisitors[key];
                    const date = visitor.timestamp ? new Date(visitor.timestamp).toLocaleString() : 'N/A';
                    visitorOutput += `\nIP: ${visitor.ipAddress || 'N/A'}\nUser Agent: ${visitor.userAgent}\nScreen: ${visitor.screenResolution}\nLanguage: ${visitor.language}\nPlatform: ${visitor.platform}\n(Time: ${date})\n---\n`;
                }
            } else {
                visitorOutput += "\nNo visitor info recorded yet.";
            }
            visitorInfoPre.innerText = visitorOutput;

        } catch (error) {
            console.error("Error fetching admin data: ", error);
            ridaResponsesPre.innerText = "Error fetching responses. Check console or Firebase rules.";
            visitorInfoPre.innerText = "Error fetching visitor info. Check console or Firebase rules.";
        }
    }

    adminBtn.addEventListener('click', () => {
      const password = prompt("Enter Admin Password:");
      if (password === ADMIN_PASSWORD) {
        adminPanel.style.display = 'block'; // Show panel
        fetchResultsAndVisitors(); // Fetch and display data
      } else if (password !== null) { // If user didn't cancel
        alert("Incorrect Password!");
      }
    });

    clearResultsBtn.addEventListener('click', () => {
        if (confirm("Are you sure you want to clear Rida's previous answers? This cannot be undone.")) {
            db.ref('responses/rida').remove()
                .then(() => {
                    alert("Rida's previous answers cleared successfully!");
                    fetchResultsAndVisitors(); // Refresh the panel
                })
                .catch((error) => {
                    console.error("Error clearing responses: ", error);
                    alert("Error clearing responses. Check console or Firebase rules.");
                });
        }
    });


    // Set current year in footer
    document.getElementById("year").innerText = new Date().getFullYear();

    // Initial call to display the first question and track visitor
    // Ensure these run after the DOM is ready and Firebase is initialized
    document.addEventListener('DOMContentLoaded', () => {
        showQuestion();
        trackVisitor();
    });

  </script>
</body>
</html>
