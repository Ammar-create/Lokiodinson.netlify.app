<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ammar's Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: #fafafa;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #777;
      margin-bottom: 2rem;
    }

    .welcome {
      font-size: 1.5rem;
      font-weight: 600;
      animation: fadeIn 2s forwards;
      opacity: 0;
    }

    @keyframes fadeIn { to { opacity: 1; } }

    .login-section {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      margin-top: 2rem;
    }

    .login-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .login-card h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
      color: #6e6e73;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
    }

    .form-group input:focus {
      border-color: #0071e3;
    }

    .btn {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    .btn-primary {
      background-color: #0071e3;
      color: white;
    }

    .btn-primary:hover { background-color: #005bb5; }

    .btn-secondary {
      background-color: #e5e5ea;
      color: #1d1d1f;
    }

    .btn-secondary:hover { background-color: #d1d1d6; }

    .btn-google {
      background-color: #fff;
      border: 1px solid #d2d2d7;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .error-message, .success-message {
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .error-message { color: #ff3b30; }
    .success-message { color: #34c759; }

    .main-content {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      margin-top: 2rem;
    }

    .edit-panel {
      align-self: flex-end;
      margin-bottom: 1rem;
    }

    .edit-panel button {
      background: #000;
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 0.5rem;
    }

    .buttons-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 1rem;
    }

    .hub-btn {
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      cursor: pointer;
    }

    .controls {
      display: none;
      gap: 0.3rem;
    }

    .controls button {
      font-size: 0.9rem;
      border: none;
      background: #eee;
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
    }

    footer {
      margin-top: 3rem;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>Ammar's Hub</h1>
  <div class="subtitle">Your gateway to organized fandom & personal projects</div>
  <div class="welcome" id="welcome">Welcome to Ammar's Hub</div>

  <section id="login-section" class="login-section">
    <div class="login-card">
      <h2>Login to Your App</h2>
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
        <button type="button" id="signup-btn" class="btn btn-secondary">Sign Up</button>
        <button type="button" id="google-btn" class="btn btn-google">
          Continue with Google
        </button>
      </form>
      <p id="login-error" class="error-message" style="display: none;"></p>
      <p id="success-message" class="success-message" style="display: none;"></p>
    </div>
  </section>

  <div class="main-content" id="mainContent">
    <div class="edit-panel">
      <button onclick="toggleEdit()">Edit</button>
      <button onclick="firebase.auth().signOut()">Sign Out</button>
    </div>
    <div class="buttons-container" id="hubButtons"></div>
    <button class="btn btn-secondary" onclick="addButton()">+ Add</button>
  </div>

  <footer>&copy; <span id="year"></span> Ammar. All rights reserved.</footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyADxJDcYRyurB-0WGD3dLIP-U9606N_3lQ",
      authDomain: "lokiodinsonauth.firebaseapp.com",
      projectId: "lokiodinsonauth",
      storageBucket: "lokiodinsonauth.appspot.com",
      messagingSenderId: "867025984222",
      appId: "1:867025984222:web:5c9d19de0d77ffeee4804f",
      measurementId: "G-9NQGLPNW6B"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
  </script>

  <script>
    const loginSection = document.getElementById('login-section');
    const mainContent = document.getElementById('mainContent');
    const loginForm = document.getElementById('login-form');
    const signupBtn = document.getElementById('signup-btn');
    const googleBtn = document.getElementById('google-btn');
    const errorMsg = document.getElementById('login-error');
    const successMsg = document.getElementById('success-message');
    const buttons = JSON.parse(localStorage.getItem("buttons") || JSON.stringify([
      {name: "Watchlist", path: "Watchlist/index.html"},      {name: "Pdf Generator", path: "PdfGenerator/index.html"},
      {name: "One Piece Wiki", path: "OnePieceWiki/OnePieceWiki.html"},{name: "Diary Generator", path: "Diary Generator/index.html"}
    ]));
    let editMode = false;

    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        loginSection.style.display = 'none';
        mainContent.style.display = 'flex';
        renderButtons();
      } else {
        loginSection.style.display = 'flex';
        mainContent.style.display = 'none';
      }
    });

    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const email = `${usernameInput.value}@myapp.com`;
      const password = passwordInput.value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          successMsg.textContent = "Login successful!";
          successMsg.style.display = 'block';
          errorMsg.style.display = 'none';
        })
        .catch(() => {
          errorMsg.textContent = "Invalid username or password.";
          errorMsg.style.display = 'block';
          successMsg.style.display = 'none';
        });
    });

    signupBtn.addEventListener('click', () => {
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const email = `${usernameInput.value}@myapp.com`;
      const password = passwordInput.value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          successMsg.textContent = "Sign-up successful!";
          successMsg.style.display = 'block';
          errorMsg.style.display = 'none';
        })
        .catch(() => {
          errorMsg.textContent = "Username already exists.";
          errorMsg.style.display = 'block';
          successMsg.style.display = 'none';
        });
    });

    googleBtn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider).catch(error => {
        errorMsg.textContent = "Google login failed.";
        errorMsg.style.display = 'block';
      });
    });

    function renderButtons() {
      const container = document.getElementById("hubButtons");
      container.innerHTML = '';
      buttons.forEach((btn, i) => {
        const el = document.createElement("div");
        el.className = "hub-btn";
        el.onclick = () => { if (!editMode) location.href = btn.path; };
        const nameSpan = document.createElement("span");
        nameSpan.textContent = btn.name;
        el.appendChild(nameSpan);
        const controls = document.createElement("div");
        controls.className = "controls";
        ["↑", "↓", "✏️", "🗑️"].forEach(icon => {
          const b = document.createElement("button");
          b.textContent = icon;
          b.onclick = e => handleButtonControl(i, icon, e);
          controls.appendChild(b);
        });
        if (editMode) controls.style.display = "flex";
        el.appendChild(controls);
        container.appendChild(el);
      });
    }

    function toggleEdit() {
      editMode = !editMode;
      renderButtons();
    }

    function handleButtonControl(i, action, e) {
      e.stopPropagation();
      if (action === "↑" && i > 0) [buttons[i], buttons[i-1]] = [buttons[i-1], buttons[i]];
      if (action === "↓" && i < buttons.length - 1) [buttons[i], buttons[i+1]] = [buttons[i+1], buttons[i]];
      if (action === "✏️") {
        const name = prompt("New name:", buttons[i].name);
        const path = prompt("New path:", buttons[i].path);
        if (name && path) buttons[i] = {name, path};
      }
      if (action === "🗑️") buttons.splice(i, 1);
      localStorage.setItem("buttons", JSON.stringify(buttons));
      renderButtons();
    }

    function addButton() {
      const name = prompt("Enter button name:");
      const path = prompt("Enter button path:");
      if (name && path) {
        buttons.push({name, path});
        localStorage.setItem("buttons", JSON.stringify(buttons));
        renderButtons();
      }
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    setTimeout(() => document.getElementById("welcome").style.opacity = 1, 500);
  </script>
</body>
</html>
