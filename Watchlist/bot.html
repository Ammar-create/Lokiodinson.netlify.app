<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie & TV Info Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #eee; text-align: center; padding: 20px; }
    input, button { padding: 10px; margin: 10px; font-size: 1em; }
    #result { margin-top: 30px; text-align: left; max-width: 600px; margin-inline: auto; background: #222; padding: 20px; border-radius: 8px; position: relative; }
    #poster-container { position: relative; width: 100%; text-align: center; margin-bottom: 20px; }
    #poster-container img { max-width: 100%; max-height: 400px; border-radius: 8px; }
    .arrow-btn { position: absolute; top: 50%; transform: translateY(-50%); font-size: 2em; background: none; border: none; color: #eee; cursor: pointer; }
    #left-arrow { left: 0; }
    #right-arrow { right: 0; }
    .btn { background: #444; color: #fff; border: none; padding: 10px 15px; cursor: pointer; border-radius: 5px; margin: 5px; }
  </style>
</head>
<body>
  <h1>Movie & TV Info Bot</h1>
  <input type="text" id="movieName" placeholder="Enter movie or TV show name" />
  <button onclick="searchMovie()">Search</button>

  <div id="result"></div>

  <script>
    const OMDB_KEY = 'fc9b875a';
    const TMDB_KEY = '0666d38936ae64a3e537a6d6989fcae0';

    function normalizeTitle(title) {
      return title.trim().toLowerCase().replace(/[^a-z0-9]+/g, "");
    }

    async function searchMovie() {
      const name = document.getElementById("movieName").value.trim();
      if (!name) return alert("Enter a movie or TV show name");

      document.getElementById("result").innerHTML = "Loading...";
      let posters = [], currentPoster = 0;

      try {
        const omdbRes = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&t=${encodeURIComponent(name)}`);
        const omdbData = await omdbRes.json();

        const tmdbSearchRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(name)}`);
        const tmdbSearch = await tmdbSearchRes.json();
        
        let tmdbData = null;
        for (const item of tmdbSearch.results) {
          const type = item.media_type;
          const detailRes = await fetch(`https://api.themoviedb.org/3/${type}/${item.id}?api_key=${TMDB_KEY}`);
          const detailData = await detailRes.json();
          if (detailData.poster_path && (detailData.name || detailData.title)) {
            tmdbData = detailData;
            break;
          }
        }

        const omdbTitle = normalizeTitle(omdbData.Title || "");
        const tmdbTitle = normalizeTitle(tmdbData?.name || tmdbData?.title || "");
        const titlesMatch = omdbTitle === tmdbTitle;
        const useTMDB = titlesMatch;

        const title = omdbData.Title || "Unknown Title";
        const type = omdbData.Type || "N/A";
        const releaseDate = omdbData.Released || "N/A";
        const rating = omdbData.imdbRating || "N/A";
        const seasons = omdbData.totalSeasons || (useTMDB ? tmdbData?.number_of_seasons : "N/A");
        const episodes = useTMDB ? tmdbData?.number_of_episodes : "N/A";
        const totalRuntime = omdbData.Runtime && episodes !== "N/A"
          ? `${Math.round(parseInt(omdbData.Runtime) * episodes / 60)} hours`
          : "N/A";
        const genre = omdbData.Genre || "N/A";
        const plot = omdbData.Plot || "N/A";
        const language = omdbData.Language || "N/A";
        const actors = omdbData.Actors || "N/A";
        const imdbLink = `https://www.imdb.com/title/${omdbData.imdbID}`;

        posters = [];
        if (omdbData.Poster && omdbData.Poster !== "N/A") posters.push(omdbData.Poster);
        if (useTMDB && tmdbData?.poster_path) posters.push(`https://image.tmdb.org/t/p/w500${tmdbData.poster_path}`);

        document.getElementById("result").innerHTML = `
          <div id="poster-container">
            <button class="arrow-btn" id="left-arrow" onclick="changePoster(-1)">&#10094;</button>
            <img id="poster" src="${posters[0] || ''}" alt="Poster" />
            <button class="arrow-btn" id="right-arrow" onclick="changePoster(1)">&#10095;</button>
          </div>
          <h2>${title}</h2>
          <p><strong>Type:</strong> ${type.charAt(0).toUpperCase() + type.slice(1)}</p>
          <p><strong>Release Date:</strong> ${releaseDate}</p>
          <p><strong>IMDb Rating:</strong> ${rating}</p>
          <p><strong>Seasons:</strong> ${seasons}</p>
          <p><strong>Episodes:</strong> ${episodes}</p>
          <p><strong>Total Watch Time:</strong> ${totalRuntime}</p>
          <p><strong>Genre:</strong> ${genre}</p>
          <p><strong>Top Actors:</strong> ${actors}</p>
          <p><strong>Plot:</strong> ${plot}</p>
          <p><strong>Language:</strong> ${language}</p>
          <button class="btn" onclick="downloadPoster()">Download Poster</button>
          <button class="btn" onclick="copyIMDbLink('${imdbLink}')">Copy IMDb Link</button>
        `;

        window.posters = posters;
        window.currentPoster = 0;
      } catch (error) {
        console.error(error);
        document.getElementById("result").innerHTML = "<p>Something went wrong. Try again.</p>";
      }
    }

    function changePoster(direction) {
      if (!window.posters || window.posters.length === 0) return;
      window.currentPoster = (window.currentPoster + direction + posters.length) % posters.length;
      document.getElementById("poster").src = posters[window.currentPoster];
    }

    function downloadPoster() {
      if (!window.posters || posters.length === 0) return;
      const a = document.createElement("a");
      a.href = posters[window.currentPoster];
      a.download = "poster.jpg";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function copyIMDbLink(link) {
      navigator.clipboard.writeText(link).then(() => {
        alert("IMDb link copied to clipboard!");
      });
    }
  </script>
  <p style="border-radius: 8px; text-align: center; font-size: 12px; color: #fff; margin-top: 16px;position: left: 8px; bottom: 8px; z-index: 10; background: rgba(0, 0, 0, 0.8); padding: 4px 8px;">Made by Ammar By Love ♥️</a></p>
</body>
</html>
