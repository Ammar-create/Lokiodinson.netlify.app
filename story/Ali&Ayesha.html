<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ali & Ayesha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300&family=Noto+Nastaliq+Urdu:wght@400&family=Amiri:wght@400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg-cream:#f4f1ea;--bg-parchment:#fdf9ef;--bg-dark:#0e0b12;--bg-dawn:#e8e4db;
      --ink:#1a1816;--ink-faint:rgba(26,24,22,.45);--gold:#a68843;--red-faded:#8a3324;
      --font-body:'Crimson Text',Georgia,serif;
      --font-display:'Cinzel Decorative',serif;
      --font-note:'Dancing Script',cursive;
      --font-ui:'Inter',system-ui,sans-serif;
      --font-mono:'JetBrains Mono',monospace;
    }
    html{scroll-behavior:smooth;font-size:18px}
    body{
      font-family:var(--font-body);color:var(--ink);background:var(--bg-parchment);
      line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    }
    /* scene wrappers */
    .scene{
      position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;padding:6rem 1.5rem;
      transition:background-color 1.2s ease,color 1s ease;
    }
    .scene--reality{background:var(--bg-cream);color:var(--ink)}
    .scene--memory{background:linear-gradient(180deg,var(--bg-cream) 0%,var(--bg-parchment) 100%);color:var(--ink)}
    .scene--void{background:var(--bg-dark);color:#c8c4bc}
    .scene--dawn{background:var(--bg-dawn);color:var(--ink)}
    /* narrative container */
    .narrative{max-width:680px;width:100%;position:relative}
    .narrative p{
      font-size:1.25rem;line-height:1.75;margin-bottom:1.5rem;text-align:justify;
      opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform 1.1s ease;
    }
    .narrative p.is-visible{opacity:1;transform:translateY(0)}
    .drop-cap::first-letter{
      float:left;font-family:var(--font-display);font-size:4.4rem;line-height:.85;
      padding-right:.6rem;color:var(--gold);margin-top:.1rem;
    }
    /* RTL adjustments */
    [dir="rtl"] .scene{direction:rtl}
    [dir="rtl"] .drop-cap::first-letter{float:right;padding-right:0;padding-left:.6rem}
    [dir="rtl"] .text-msg-bubble::after{right:auto;left:18px;clip-path:polygon(0 0,100% 0,0 100%)}
    [dir="rtl"] .lang-switcher{direction:ltr}
    /* header */
    .story-header{text-align:center;margin-bottom:4rem;padding-top:3vh}
    .story-header h1{
      font-family:var(--font-display);font-size:clamp(1.8rem,5vw,3rem);
      line-height:1.15;letter-spacing:.02em;margin-bottom:.8rem;
    }
    .story-header .sub{font-style:italic;font-size:1.05rem;color:var(--ink-faint);letter-spacing:.04em}
    .ornament{margin:1.5rem auto;width:60px;height:1px;background:var(--gold);position:relative}
    .ornament::after{
      content:'❦';position:absolute;top:-.65rem;left:50%;transform:translateX(-50%);
      font-size:.9rem;color:var(--gold);background:var(--bg-cream);padding:0 .4rem;
    }
    .scene--dawn .ornament::after{background:var(--bg-dawn)}
    /* foreign phrase */
    .foreign-phrase{font-style:italic;color:var(--red-faded)}
    /* handwritten */
    .handwritten{
      font-family:var(--font-note);font-size:clamp(1.4rem,3vw,1.9rem);text-align:center;
      color:#5e5850;margin:3rem 0;padding:2rem;line-height:1.55;position:relative;
      opacity:0;transform:scale(.96);transition:all 1.2s ease;
    }
    .scene--void .handwritten{color:#a0978a}
    .handwritten.is-visible{opacity:1;transform:scale(1)}
    .handwritten::before{
      content:'';position:absolute;inset:0;border-top:1px dashed rgba(0,0,0,.12);
      border-bottom:1px dashed rgba(0,0,0,.12);pointer-events:none;
    }
    .scene--void .handwritten::before{border-color:rgba(255,255,255,.08)}
    /* silence */
    .silence-gap{
      height:20vh;display:flex;align-items:center;justify-content:center;
      font-family:var(--font-mono);font-size:.75rem;color:var(--ink-faint);
      letter-spacing:.15em;text-transform:uppercase;opacity:0;transition:opacity 1.5s ease;
    }
    .scene--void .silence-gap{color:rgba(200,196,188,.35)}
    .silence-gap.is-visible{opacity:1}
    /* text pivot */
    .text-pivot{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:50vh;text-align:center;position:relative;
    }
    .text-pivot .label{font-family:var(--font-mono);font-size:.7rem;color:rgba(200,196,188,.5);letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.5rem}
    .text-msg-bubble{
      background:#1c1c1e;color:#e5e5ea;padding:14px 22px;border-radius:22px;
      font-family:var(--font-ui);font-size:1.05rem;line-height:1.4;position:relative;
      box-shadow:0 8px 30px rgba(0,0,0,.4);margin-bottom:2rem;
    }
    .text-msg-bubble::after{
      content:'';position:absolute;bottom:-6px;right:18px;width:14px;height:14px;
      background:#1c1c1e;border-bottom-right-radius:14px;clip-path:polygon(0 0,100% 0,100% 100%);
    }
    .clock-readout{
      font-family:var(--font-mono);font-size:.8rem;color:rgba(200,196,188,.35);
      display:flex;gap:2rem;margin-top:1rem;
    }
    .clock-readout span{opacity:0;animation:tickIn .6s ease forwards}
    .clock-readout span:nth-child(1){animation-delay:.6s}
    .clock-readout span:nth-child(2){animation-delay:1.2s}
    .clock-readout span:nth-child(3){animation-delay:1.8s}
    .clock-readout span:nth-child(4){animation-delay:2.4s}
    @keyframes tickIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    /* realization */
    .realization{max-width:640px;margin:0 auto;padding:4rem 1.5rem;text-align:center}
    .realization p{font-size:1.35rem;line-height:1.65;color:#e6e2d8;font-style:italic;opacity:0;transform:translateY(20px);transition:all 1s ease}
    .realization p.is-visible{opacity:1;transform:translateY(0)}
    .realization p+p{margin-top:1.2rem}
    /* epilogue */
    .epilogue{padding:5rem 1.5rem 8rem;text-align:center}
    .epilogue p{max-width:600px;margin:0 auto 1.2rem;font-size:1.15rem;line-height:1.75;opacity:0;transform:translateY(20px);transition:all 1s ease}
    .epilogue p.is-visible{opacity:1;transform:translateY(0)}
    .final-marker{margin-top:3rem;font-size:1.2rem;color:var(--gold);opacity:0;transition:opacity 2s ease}
    .final-marker.is-visible{opacity:.7}
    /* top nav */
    .top-nav{
      position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:flex-end;
      align-items:center;gap:.5rem;padding:1rem 1.5rem;pointer-events:none;
    }
    .top-nav>*{pointer-events:auto}
    .lang-switcher{
      display:flex;background:rgba(255,255,255,.65);backdrop-filter:blur(8px);
      border:1px solid rgba(0,0,0,.08);border-radius:8px;overflow:hidden;
    }
    .lang-btn{
      font-family:var(--font-ui);font-size:.78rem;padding:.5rem .9rem;background:transparent;
      border:none;color:var(--ink);cursor:pointer;transition:all .25s ease;white-space:nowrap;
    }
    .lang-btn:hover{background:rgba(0,0,0,.04)}
    .lang-btn.active{background:rgba(26,24,22,.9);color:#fff}
    .export-btn{
      font-family:var(--font-ui);font-size:.78rem;padding:.5rem 1rem;
      background:rgba(26,24,22,.9);color:#fff;border:none;border-radius:8px;
      cursor:pointer;transition:background .25s ease;
    }
    .export-btn:hover{background:var(--gold);color:var(--ink)}
    /* printable */
    #printable-content{display:none}
    @media print{
      body *{visibility:hidden}
      body{background:#fff!important;margin:0;padding:0}
      #printable-content,#printable-content *{
        visibility:visible!important;opacity:1!important;transform:none!important;animation:none!important;
      }
      #printable-content{
        position:absolute;left:0;top:0;width:100%;padding:2.5cm;background:#fff;color:#000;display:block!important;
      }
      #printable-content .scene{
        background:none!important;color:#000!important;min-height:auto!important;padding:0!important;margin-bottom:12pt;
      }
      #printable-content .scene--void{color:#000!important}
      #printable-content .ornament{display:none}
      #printable-content .text-msg-bubble{background:#eee;color:#000;box-shadow:none;border:1px solid #ccc}
      #printable-content .clock-readout{display:none}
      #printable-content .handwritten{color:#333;margin:18pt 0}
      #printable-content .handwritten::before{border-color:#ccc}
      #printable-content .silence-gap{color:#777;height:auto;margin:14pt 0}
      #printable-content .realization p{color:#000;font-style:italic;margin-bottom:12pt}
      #printable-content .story-header h1{font-size:24pt;margin-bottom:6pt}
      #printable-content .story-header .sub{font-size:11pt;color:#555;margin-bottom:24pt}
      #printable-content p{margin-bottom:12pt;font-size:12pt;line-height:1.7;text-align:justify}
      #printable-content .final-marker{color:#555;margin-top:20pt}
      .print-footer{text-align:center;margin-top:40pt;font-size:9pt;color:#555;border-top:1px solid #ddd;padding-top:10pt}
      [dir="rtl"] #printable-content,[dir="rtl"] #printable-content p{direction:rtl;text-align:justify}
    }
    /* responsive */
    @media(max-width:650px){
      html{font-size:16px}
      .scene{padding:4rem 1.2rem}
      .narrative p{font-size:1.1rem;text-align:left}
      .drop-cap::first-letter{font-size:3.5rem;line-height:.85}
      .handwritten{margin:2.5rem 0;padding:1.5rem 1rem}
      .realization p{font-size:1.15rem;text-align:left}
      .story-header{padding-top:1vh;margin-bottom:2.5rem}
      .story-header h1{font-size:clamp(1.6rem,8vw,2.2rem)}
      .clock-readout{gap:1rem;font-size:.7rem}
      .lang-switcher{border-radius:6px}
      .lang-btn{padding:.45rem .6rem;font-size:.72rem}
    }
  </style>
</head>
<body>

<nav class="top-nav" aria-label="Story controls">
  <div class="lang-switcher" id="langSwitcher">

  <button class="export-btn" onclick="exportPDF()">Export PDF</button>
</nav>

<main id="story-stage"></main>

let currentLang='en';
let revealObserver;

/* ═════════ RENDER ENGINE ═════════ */
function setLang(lang){
  currentLang=lang;
  const s=stories[lang];
  document.documentElement.lang=lang;
  document.documentElement.dir=s.dir;

  /* active pill */
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.lang===lang);
  });

  let html='';

  /* Scene 1: Reality + Header */
  html+='<section class="scene scene--reality">';
  html+='<header class="story-header"><h1>'+s.title+'</h1><p class="sub">'+s.sub+'</p><div class="ornament"></div></header>';
  html+='<div class="narrative">';
  s.s1.forEach((text,i)=>{
    const cls=i===0?'drop-cap':'';
    html+='<p data-reveal'+(cls?' class="'+cls+'"':'')+'>'+text+'</p>';
  });
  html+='</div></section>';

  /* Scene 2: Memory */
  html+='<section class="scene scene--memory">';
  html+='<div class="narrative">';
  s.s2a.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  if(s.silence) html+='<div class="silence-gap" data-reveal>'+s.silence+'</div>';
  s.s2b.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  if(s.hw && s.hw.length){
    html+='<div class="handwritten" data-reveal>'+s.hw.join('<br>')+'</div>';
  }
  s.s2c.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  html+='</div></section>';

  /* Scene 3: Void */
  html+='<section class="scene scene--void">';
  html+='<div class="narrative">';
  s.s3a.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  html+='</div>';

  /* Pivot */
  html+='<div class="text-pivot" id="pivot">';
  html+='<div class="label">'+s.pivotLabel+'</div>';
  html+='<div class="text-msg-bubble">'+s.pivotMsg+'</div>';
  html+='<div class="clock-readout" aria-label="Time passing silently">';
  s.pivotTimes.forEach((t,i)=>{
    html+='<span style="animation-delay:'+(0.6+i*0.6)+'s">'+t+'</span>';
  });
  html+='</div></div>';

  html+='<div class="narrative" style="margin-top:3rem;">';
  s.s3b.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  html+='</div></section>';

  /* Scene 4: Realization */
  html+='<section class="scene scene--void" style="min-height:auto;">';
  html+='<div class="realization">';
  s.realization.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  html+='</div></section>';

  /* Scene 5: Dawn */
  html+='<section class="scene scene--dawn">';
  html+='<div class="narrative">';
  s.s5.forEach(t=>html+='<p data-reveal>'+t+'</p>');
  html+='</div>';
  html+='<div class="epilogue narrative">';
  html+='<div class="final-marker" data-reveal>'+s.marker+'</div>';
  html+='</div></section>';

  document.getElementById('story-stage').innerHTML=html;
  initReveals();
}

function initReveals(){
  if(revealObserver) revealObserver.disconnect();
  revealObserver=new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        entry.target.classList.add('is-visible');
        revealObserver.unobserve(entry.target);
      }
    });
  },{threshold:0.12,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('[data-reveal]').forEach(el=>revealObserver.observe(el));
}

/* ═════════ EXPORT (clone visible story) ═════════ */
function exportPDF(){
  const stage=document.getElementById('story-stage');
  const printable=document.getElementById('printable-content');
  const clone=stage.cloneNode(true);

  /* strip reveal locks so print shows everything */
  clone.querySelectorAll('[data-reveal]').forEach(el=>{
    el.removeAttribute('data-reveal');
    el.classList.remove('is-visible');
    el.style.cssText+=';opacity:1!important;transform:none!important;transition:none!important;';
  });

  /* build clean print wrapper */
  printable.innerHTML='';
  const wrapper=document.createElement('div');
  wrapper.className='print-body';
  wrapper.setAttribute('dir',stories[currentLang].dir);
  wrapper.appendChild(clone);
  printable.appendChild(wrapper);

  /* add footer */
  const footer=document.createElement('div');
  footer.className='print-footer';
  footer.textContent='Story Archive — Ali & Ayesha';
  printable.appendChild(footer);

  requestAnimationFrame(()=>window.print());
}
