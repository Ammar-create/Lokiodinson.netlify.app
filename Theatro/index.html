<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Theatro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
<!-- BUG 1: Correct CSS load order: variables → styles (base layout) → components → chat -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/chat.css">
</head>
<body>
<div id="app">
  <header id="app-header"></header>
  <main id="main-content">
    <div id="screen-dashboard" class="screen"></div>
    <div id="screen-char-create" class="screen"></div>
    <div id="screen-scenario-create" class="screen"></div>
    <div id="screen-chat" class="screen"></div>
    <div id="screen-settings" class="screen"></div>
  </main>
</div>
<div id="modal-overlay"></div>
<div id="toast-container"></div>

<!-- JS — load order matters: each file uses globals from the ones above -->
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/controllers.js"></script>
<script src="js/controllers-creative.js"></script>
<!-- Chat engine split into 3 modules (load in order: core → render → session) -->
<script src="js/chat-core.js"></script>
<script src="js/chat-render.js"></script>
<script src="js/chat-session.js"></script>
<script src="js/chat-actions.js"></script>
<script src="js/header.js"></script>
<script src="js/screens.js"></script>
<script src="js/screens-chat.js"></script>
<script src="js/screens-ui.js"></script>
<script src="js/init.js"></script>
</body>
</html>
