<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Theatro</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08080f;--surface:#0f0f1a;--s2:#161624;--s3:#1d1d2e;
  --border:#252538;--bl:#343450;
  --gold:#c9a84c;--gdim:#7a6028;--gglow:rgba(201,168,76,.12);--gglow2:rgba(201,168,76,.06);
  --crim:#8b2232;--criml:#c23050;
  --text:#e6e2d8;--tdim:#8c8898;--tmut:#4e4c60;
  --ok:#3d8a5f;--warn:#c07730;--err:#b02540;
  --r:8px;--rl:12px;--rxl:18px;
  --fd:'Cinzel',serif;--fb:'Raleway',sans-serif;
  --pw:304px;--hdr:54px;--ease:cubic-bezier(.4,0,.2,1);--t:.18s;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--fb);font-size:14px;line-height:1.6}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bl);border-radius:2px}

/* STRUCTURE */
#app{height:100vh;display:flex;flex-direction:column;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,.05) 0%,transparent 70%),
             radial-gradient(ellipse 60% 30% at 100% 100%,rgba(139,34,50,.05) 0%,transparent 70%),var(--bg)}
#app-header{flex-shrink:0}
#main-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.screen{display:none;flex:1;overflow:hidden;min-height:0}
.screen.active{display:flex;flex-direction:column}

/* HEADER */
.hdr{height:var(--hdr);background:rgba(15,15,26,.95);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;backdrop-filter:blur(8px);position:relative;z-index:100}
.logo{font-family:var(--fd);font-size:17px;font-weight:700;color:var(--gold);letter-spacing:.2em;
  text-transform:uppercase;cursor:pointer;flex-shrink:0;text-shadow:0 0 30px rgba(201,168,76,.3);user-select:none}
.logo span{color:var(--tdim);font-weight:400}
.hdr-nav{display:flex;gap:2px}
.hnbtn{background:none;border:none;color:var(--tmut);font-family:var(--fb);font-size:11px;font-weight:600;
  letter-spacing:.1em;padding:5px 12px;border-radius:6px;cursor:pointer;transition:var(--t) var(--ease);text-transform:uppercase}
.hnbtn:hover{color:var(--tdim);background:var(--s2)}
.hnbtn.on{color:var(--gold);background:var(--gglow)}
.hdr-right{display:flex;gap:6px;margin-left:auto;align-items:center}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-family:var(--fb);
  font-size:12px;font-weight:600;letter-spacing:.06em;border:none;cursor:pointer;
  transition:var(--t) var(--ease);text-transform:uppercase;white-space:nowrap;user-select:none}
.bp{background:var(--gold);color:#0a0a12}.bp:hover{background:#d8b85a;box-shadow:0 0 16px rgba(201,168,76,.3)}
.bs{background:var(--s3);color:var(--text);border:1px solid var(--border)}.bs:hover{border-color:var(--bl);background:var(--s2)}
.bg{background:none;color:var(--tdim);border:1px solid transparent}.bg:hover{color:var(--text);border-color:var(--border);background:var(--s2)}
.bd{background:var(--crim);color:var(--text)}.bd:hover{background:var(--criml)}
.bsm{padding:5px 10px;font-size:11px}.blg{padding:10px 22px;font-size:13px}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.ibtn{width:30px;height:30px;background:none;border:1px solid transparent;border-radius:var(--r);
  color:var(--tdim);cursor:pointer;transition:var(--t) var(--ease);display:inline-flex;align-items:center;justify-content:center}
.ibtn:hover{color:var(--text);border-color:var(--border);background:var(--s2)}
.ibtn.on{color:var(--gold);border-color:var(--gdim);background:var(--gglow)}
.ibtn svg{pointer-events:none}

/* FIELDS */
.field{display:flex;flex-direction:column;gap:5px}
.lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tmut)}
.lbl span{color:var(--gold);font-size:9px;margin-left:3px}
input[type=text],input[type=url],input[type=password],input[type=number],textarea{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);
  font-family:var(--fb);font-size:13px;padding:9px 11px;width:100%;transition:var(--t) var(--ease);outline:none}
textarea{resize:vertical}
input:focus,textarea:focus{border-color:var(--gdim);box-shadow:0 0 0 2px var(--gglow2)}
input::placeholder,textarea::placeholder{color:var(--tmut)}

/* TOGGLE */
.tgl-wrap{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.tgl{width:34px;height:18px;background:var(--s3);border:1px solid var(--border);border-radius:9px;
  position:relative;transition:var(--t) var(--ease);flex-shrink:0}
.tgl.on{background:var(--gdim);border-color:var(--gold)}
.tgl::after{content:'';position:absolute;width:12px;height:12px;background:var(--tmut);
  border-radius:50%;top:2px;left:2px;transition:var(--t) var(--ease)}
.tgl.on::after{left:18px;background:var(--gold)}
.tgl-lbl{font-size:12px;color:var(--tdim)}

/* DASHBOARD */
#screen-dashboard{flex-direction:column}
.dash-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;background:var(--surface);flex-shrink:0}
.dtab{background:none;border:none;border-bottom:2px solid transparent;color:var(--tmut);font-family:var(--fb);
  font-size:12px;font-weight:700;letter-spacing:.08em;padding:12px 16px;cursor:pointer;
  transition:var(--t) var(--ease);text-transform:uppercase;margin-bottom:-1px}
.dtab:hover{color:var(--tdim)}.dtab.on{color:var(--gold);border-bottom-color:var(--gold)}
.dash-body{flex:1;overflow-y:auto;padding:20px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-family:var(--fd);font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--tmut);text-transform:uppercase}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}

/* CHAR CARD */
.ccard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;
  cursor:pointer;transition:var(--t) var(--ease);position:relative;overflow:hidden}
.ccard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--cc,var(--gold));opacity:.6}
.ccard:hover{border-color:var(--bl);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.ccard-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.cav{width:40px;height:40px;border-radius:50%;background:var(--s2);border:2px solid var(--cc,var(--border));
  overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:var(--cc,var(--tdim));font-family:var(--fd)}
.cav img{width:100%;height:100%;object-fit:cover}
.ccard-name{font-family:var(--fd);font-size:14px;font-weight:600;color:var(--cc,var(--text));letter-spacing:.04em}
.ccard-sub{font-size:10px;color:var(--tmut);margin-top:1px}
.ccard-desc{font-size:11px;color:var(--tdim);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ccard-foot{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}

/* SCENARIO CARD */
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;cursor:pointer;transition:var(--t) var(--ease)}
.scard:hover{border-color:var(--gdim);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.scard-name{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--text);letter-spacing:.04em;margin-bottom:6px}
.scard-lore{font-size:12px;color:var(--tdim);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.scard-chars{display:flex;margin-bottom:8px}
.mav{width:24px;height:24px;border-radius:50%;border:2px solid var(--surface);background:var(--s2);
  display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:var(--fd);
  margin-left:-5px;flex-shrink:0;overflow:hidden}
.mav:first-child{margin-left:0}.mav img{width:100%;height:100%;object-fit:cover}
.scard-meta{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--tmut)}
.scard-foot{display:flex;gap:6px;margin-top:10px;justify-content:flex-end}

/* EMPTY STATE */
.empty{text-align:center;padding:50px 20px;color:var(--tmut)}
.empty-ico{font-size:40px;margin-bottom:14px;opacity:.4}
.empty-t{font-family:var(--fd);font-size:14px;color:var(--tdim);margin-bottom:6px;letter-spacing:.06em}
.empty-d{font-size:12px;margin-bottom:18px}

/* TAG / PILL */
.tag{background:var(--s3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--tmut);letter-spacing:.04em}
.tag.g{background:var(--gglow);border-color:var(--gdim);color:var(--gold)}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.pill.g{background:var(--gglow);color:var(--gold);border:1px solid var(--gdim)}

/* CHAT SCREEN */
#screen-chat{flex-direction:row}
.chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.chat-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-title{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--tdim);letter-spacing:.04em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-log{flex:1;overflow-y:auto;padding:18px 16px 10px;display:flex;flex-direction:column;gap:4px}

/* MESSAGES */
.msg{display:flex;flex-direction:column;gap:3px;animation:msgIn .25s var(--ease)}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-hdr{display:flex;align-items:center;gap:7px}
.msg-av{width:26px;height:26px;border-radius:50%;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:var(--fd)}
.msg-av img{width:100%;height:100%;object-fit:cover}
.msg-name{font-family:var(--fd);font-size:12px;font-weight:600;letter-spacing:.06em}
.msg-time{font-size:10px;color:var(--tmut);margin-left:auto}
.msg-body{padding:10px 13px;background:var(--surface);border-radius:3px var(--rl) var(--rl) var(--rl);
  border-left:2px solid var(--mc,var(--border));font-size:13.5px;line-height:1.75;max-width:680px;word-break:break-word}
.msg-body.stream::after{content:'';display:inline-block;width:2px;height:13px;
  background:var(--mc,var(--gold));margin-left:2px;vertical-align:middle;animation:cur .7s step-end infinite}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.msg.usr .msg-hdr{flex-direction:row-reverse}
.msg.usr .msg-time{margin-left:0;margin-right:auto}
.msg.usr .msg-body{background:var(--s2);margin-left:auto;border-left:none;border-right:2px solid var(--mc,var(--gold));border-radius:var(--rl) 3px var(--rl) var(--rl)}
.msg.ctrl .msg-body{background:transparent;border:1px dashed var(--border);border-left:2px solid var(--tmut);font-size:11px;color:var(--tmut);font-style:italic;max-width:500px}
.msg-ar{display:flex;gap:4px;padding-left:33px;margin-top:2px;opacity:0;transition:opacity var(--t) var(--ease)}
.msg:hover .msg-ar{opacity:1}
.msg.usr .msg-ar{flex-direction:row-reverse;padding-left:0;padding-right:33px}
.mabtn{background:var(--s2);border:1px solid var(--border);border-radius:5px;color:var(--tmut);
  font-size:10px;padding:2px 7px;cursor:pointer;transition:var(--t) var(--ease);display:flex;align-items:center;gap:3px;white-space:nowrap;font-family:var(--fb)}
.mabtn:hover{color:var(--text);border-color:var(--bl)}
.msg-img{max-width:280px;border-radius:var(--r);margin-top:8px;cursor:pointer;display:block;border:1px solid var(--border)}
.thinking{display:flex;gap:4px;align-items:center;padding:8px 13px}
.thinking span{width:5px;height:5px;background:var(--mc,var(--tmut));border-radius:50%;animation:dp 1.2s ease-in-out infinite}
.thinking span:nth-child(2){animation-delay:.2s}.thinking span:nth-child(3){animation-delay:.4s}
@keyframes dp{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* CHAT INPUT */
.chat-input-area{background:var(--surface);border-top:1px solid var(--border);padding:10px 14px;flex-shrink:0}
.input-row{display:flex;align-items:flex-end;gap:7px;background:var(--s2);border:1px solid var(--border);
  border-radius:var(--rl);padding:6px;transition:border-color var(--t) var(--ease)}
.input-row:focus-within{border-color:var(--gdim)}
.input-char-btn{width:30px;height:30px;border-radius:50%;background:var(--s3);border:2px solid var(--gdim);cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--fd);
  align-self:flex-end;margin-bottom:2px;overflow:hidden;transition:var(--t) var(--ease)}
.input-char-btn:hover{border-color:var(--gold)}
.input-char-btn img{width:100%;height:100%;object-fit:cover}
#chat-ta{flex:1;background:none;border:none;color:var(--text);font-family:var(--fb);font-size:13.5px;resize:none;outline:none;min-height:32px;max-height:110px;line-height:1.5;padding:3px 4px}
.input-btns{display:flex;gap:4px;align-items:flex-end;padding-bottom:2px;flex-shrink:0}
.input-sub-row{display:flex;gap:8px;margin-top:7px;align-items:center}
.char-pill{display:flex;align-items:center;gap:5px;padding:3px 8px 3px 4px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;font-size:11px;color:var(--tdim);cursor:pointer;transition:var(--t) var(--ease);user-select:none}
.char-pill:hover{border-color:var(--bl)}
.char-pill .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.char-pill .arr{font-size:8px;color:var(--tmut)}

/* SIDE PANEL */
.spanel{width:var(--pw);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--t) var(--ease);overflow:hidden;position:relative}
.spanel.collapsed{width:0;border-left:none}
.ptoggle{position:absolute;left:-28px;top:10px;background:var(--surface);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tdim);z-index:10;transition:color var(--t) var(--ease)}
.ptoggle:hover{color:var(--text)}
.ptabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.ptab{background:none;border:none;border-bottom:2px solid transparent;padding:9px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tmut);cursor:pointer;white-space:nowrap;transition:var(--t) var(--ease);flex-shrink:0}
.ptab:hover{color:var(--tdim)}.ptab.on{color:var(--gold);border-bottom-color:var(--gold)}
.pcontent{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px}
.p-sec{display:none;flex-direction:column;gap:12px}.p-sec.on{display:flex}
.plbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tmut);margin-bottom:4px}
.rel-entry{background:var(--s2);border-radius:var(--r);padding:8px 10px;font-size:12px;display:flex;flex-direction:column;gap:4px}
.rel-chars{color:var(--tdim)}.rel-reason{font-size:11px;color:var(--tmut)}
.rmood{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.rmood.pos{background:rgba(61,138,95,.2);color:#4a9b6f}.rmood.neg{background:rgba(176,37,64,.2);color:#c23050}
.rmood.neu{background:var(--s3);color:var(--tmut)}.rmood.rom{background:rgba(139,34,50,.2);color:#e06080}
.debug-area{background:#000;border:1px solid var(--border);border-radius:var(--r);padding:8px;font-family:monospace;font-size:10px;color:#50c8f0;height:180px;overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.debug-area .derr{color:#f06050}.debug-area .dok{color:#50f090}.debug-area .dwarn{color:#f0c050}.debug-area .dinfo{color:#9090f0}
.act-char-row{display:flex;align-items:center;gap:8px;padding:7px 8px;background:var(--s2);border-radius:var(--r);font-size:12px}

/* MODAL */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity var(--t) var(--ease)}
#modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--bl);border-radius:var(--rxl);width:min(90vw,540px);max-height:86vh;display:flex;flex-direction:column;transform:scale(.97) translateY(8px);transition:transform var(--t) var(--ease);overflow:hidden}
#modal-overlay.open .modal{transform:none}
.modal.wide{max-width:760px}.modal.narrow{max-width:380px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:var(--fd);font-size:14px;font-weight:700;letter-spacing:.08em;color:var(--gold)}
.modal-x{background:none;border:none;color:var(--tdim);cursor:pointer;font-size:18px;line-height:1;transition:color var(--t) var(--ease)}
.modal-x:hover{color:var(--text)}
.modal-body{overflow-y:auto;padding:18px;flex:1;display:flex;flex-direction:column;gap:14px}
.modal-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}

/* COLOR GRID */
.cgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .1s,border-color .1s}
.csw:hover{transform:scale(1.2)}.csw.sel{border-color:#fff;box-shadow:0 0 0 2px var(--surface)}

/* MODEL LIST */
.mpbtn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--fb);font-size:13px;padding:9px 11px;width:100%;cursor:pointer;text-align:left;transition:var(--t) var(--ease);display:flex;align-items:center;justify-content:space-between}
.mpbtn:hover{border-color:var(--bl)}.mpbtn .arr{color:var(--tmut);font-size:10px}
.mlist{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow-y:auto;max-height:200px;margin-top:4px}
.mopt{padding:9px 11px;cursor:pointer;font-size:12px;transition:background var(--t) var(--ease);display:flex;justify-content:space-between;align-items:flex-start}
.mopt:hover{background:var(--s3)}.mopt.sel{background:var(--gglow)}
.mopt-id{font-family:monospace;font-size:11px;color:var(--tmut);margin-top:2px}
.mopt-rec{font-size:10px;color:var(--gold)}
.vopt{padding:8px 11px;cursor:pointer;transition:background var(--t) var(--ease);display:flex;gap:10px;align-items:center;font-size:12px}
.vopt:hover{background:var(--s3)}.vopt.sel{background:var(--gglow);color:var(--gold)}
.vopt-desc{font-size:11px;color:var(--tmut)}

/* SETTINGS */
#screen-settings{flex-direction:row}
.sett-nav{width:180px;background:var(--surface);border-right:1px solid var(--border);padding:14px 0;flex-shrink:0;overflow-y:auto}
.sett-ni{padding:9px 16px;font-size:12px;color:var(--tmut);cursor:pointer;transition:var(--t) var(--ease);display:flex;align-items:center;gap:8px;border-right:2px solid transparent}
.sett-ni:hover{color:var(--text);background:var(--s2)}.sett-ni.on{color:var(--gold);background:var(--gglow);border-right-color:var(--gold)}
.sett-body{flex:1;overflow-y:auto;padding:24px}
.sett-sec{display:none;flex-direction:column;gap:20px;max-width:580px}.sett-sec.on{display:flex}
.sett-grp{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:18px;display:flex;flex-direction:column;gap:14px}
.sett-gt{font-family:var(--fd);font-size:12px;font-weight:700;letter-spacing:.09em;color:var(--gold);text-transform:uppercase;margin-bottom:2px}

/* CREATE SCREENS */
#screen-char-create,#screen-scenario-create{overflow-y:auto}
.create-wrap{max-width:700px;margin:0 auto;padding:28px 20px;display:flex;flex-direction:column;gap:20px}
.create-hdr{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.create-title{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.av-uploader{width:72px;height:72px;border-radius:50%;background:var(--s2);border:2px dashed var(--border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--tmut);transition:var(--t) var(--ease);overflow:hidden;flex-shrink:0}
.av-uploader:hover{border-color:var(--gdim);color:var(--tdim)}.av-uploader img{width:100%;height:100%;object-fit:cover}
.char-sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.cs-item{background:var(--surface);border:2px solid var(--border);border-radius:var(--r);padding:8px 10px;cursor:pointer;transition:var(--t) var(--ease);display:flex;align-items:center;gap:7px;font-size:12px}
.cs-item:hover{border-color:var(--bl)}.cs-item.sel{border-color:var(--cc,var(--gold));background:color-mix(in srgb,var(--cc,var(--gold)) 8%,transparent)}
.cs-item .chk{margin-left:auto;color:var(--tmut);font-size:12px}.cs-item.sel .chk{color:var(--cc,var(--gold))}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--bl);border-radius:var(--r);padding:11px 14px;font-size:12px;min-width:220px;max-width:340px;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:tIn .25s var(--ease);pointer-events:all}
.toast.s{border-left:3px solid var(--ok)}.toast.e{border-left:3px solid var(--err)}.toast.w{border-left:3px solid var(--warn)}.toast.i{border-left:3px solid var(--gold)}
@keyframes tIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

/* MISC */
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
hr{border:none;border-top:1px solid var(--border)}

@media(max-width:700px){
  :root{--pw:100vw}
  .spanel{position:fixed;right:0;top:var(--hdr);height:calc(100vh - var(--hdr));z-index:500}
  .two-col{grid-template-columns:1fr}
  .sett-nav{width:44px}.sett-ni span:last-child{display:none}
  .cards{grid-template-columns:1fr}
}

function parseRP(text,color){
  if(!text)return '';
  let h='',i=0;
  const c=esc(color||'#c9a84c');
  while(i<text.length){
    if(text[i]==='*'){
      const e=text.indexOf('*',i+1);
      if(e!==-1){h+=`<em style="color:${c};opacity:.85">${esc(text.slice(i+1,e))}</em>`;i=e+1;continue}
    }
    if(text[i]==='"'){
      const e=text.indexOf('"',i+1);
      if(e!==-1){h+=`<span style="color:${c};font-weight:500">${esc(text.slice(i,e+1))}</span>`;i=e+1;continue}
    }
    if(text[i]==='\n'){h+='<br>';i++;continue}
    h+=esc(text[i]);i++;
  }
  return h;
}

// ===== DB =====
const DB=(()=>{
  let db=null;
  async function open(){
    if(db)return db;
    return new Promise((res,rej)=>{
      const req=indexedDB.open('theatro',2);
      req.onupgradeneeded=e=>{
        const d=e.target.result;
        ['characters','scenarios','memories','relationships','providers'].forEach(s=>{
          if(!d.objectStoreNames.contains(s))d.createObjectStore(s,{keyPath:'id'});
        });
        if(!d.objectStoreNames.contains('messages')){
          const ms=d.createObjectStore('messages',{keyPath:'id'});
          ms.createIndex('scenarioId','scenarioId',{unique:false});
        }
        if(!d.objectStoreNames.contains('settings'))d.createObjectStore('settings',{keyPath:'key'});
      };
      req.onsuccess=e=>{db=e.target.result;res(db)};
      req.onerror=e=>rej(e.target.error);
    });
  }
  async function tx(store,mode,fn){
    const d=await open();
    return new Promise((res,rej)=>{
      const t=d.transaction(store,mode);
      const s=t.objectStore(store);
      const r=fn(s);
      if(r){r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error);}
      else{t.oncomplete=()=>res();t.onerror=e=>rej(e.target.error);}
    });
  }
  const get=(st,k)=>tx(st,'readonly',s=>s.get(k));
  const put=(st,v)=>tx(st,'readwrite',s=>s.put(v));
  const del=(st,k)=>tx(st,'readwrite',s=>s.delete(k));
  async function getAll(store){
    const d=await open();
    return new Promise((res,rej)=>{const r=d.transaction(store,'readonly').objectStore(store).getAll();r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)});
  }
  async function getByIndex(store,idx,val){
    const d=await open();
    return new Promise((res,rej)=>{const r=d.transaction(store,'readonly').objectStore(store).index(idx).getAll(val);r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e.target.error)});
  }
  async function getSetting(k,def=null){const r=await get('settings',k);return r?r.value:def}
  async function setSetting(k,v){await put('settings',{key:k,value:v})}
  return{get,put,del,getAll,getByIndex,getSetting,setSetting};
})();

// ===== MODAL =====
const Modal={
  open(opts){
    const ov=$('#modal-overlay');
    const{title,content,footer,wide,narrow,onClose,afterOpen}=opts;
    ov.innerHTML=`<div class="modal ${wide?'wide':''} ${narrow?'narrow':''}">
      <div class="modal-hdr">
        <span class="modal-title">${esc(title)}</span>
        <button class="modal-x" id="mx">&times;</button>
      </div>
      <div class="modal-body" id="mb">${typeof content==='function'?content():content||''}</div>
      ${footer?`<div class="modal-foot" id="mf">${typeof footer==='function'?footer():footer}</div>`:''}
    </div>`;
    ov.classList.add('open');
    $('#mx').onclick=()=>Modal.close(onClose);
    ov.onclick=e=>{if(e.target===ov)Modal.close(onClose)};
    if(afterOpen)afterOpen();
  },
  close(cb){
    const ov=$('#modal-overlay');
    ov.classList.remove('open');
    setTimeout(()=>{ov.innerHTML=''},200);
    if(cb)cb();
  },
  confirm(msg,opts={}){
    return new Promise(res=>{
      Modal.open({title:opts.title||'Confirm',narrow:true,
        content:`<p style="color:var(--tdim);font-size:13px">${esc(msg)}</p>`,

        onClose:()=>res(false)
      });

      $('#mc').onclick=()=>{Modal.close();res(false)};
    });
  },

    return new Promise(res=>{
      Modal.open({title:opts.title||'Input',narrow:true,
        content:`<div class="field"><label class="lbl">${esc(label)}</label><input type="text" id="mi" placeholder="${esc(opts.placeholder||'')}" value="${esc(opts.value||'')}"></div>`,
        footer:`<button class="btn bg bsm" id="mc">Cancel</button><button class="btn bp bsm" id="mok">${esc(opts.ok||'OK')}</button>`,
        onClose:()=>res(null),
        afterOpen(){
          const i=$('#mi');i.focus();i.select();

// ===== API =====
const API={
  endpoint(model){
    const s=ST.settings;
    const m=MODELS.find(x=>x.id===model);
    if(m?.provider==='aqua'&&s.aquaKey)
      return{url:'https://api.aqua-ai.com/v1/chat/completions',headers:{'Content-Type':'application/json','Authorization':`Bearer ${s.aquaKey}`}};
    if(s.customUrl&&s.customKey)
      return{url:s.customUrl,headers:{'Content-Type':'application/json','Authorization':`Bearer ${s.customKey}`}};
    const url=s.pollinationsKey?'https://gen.pollinations.ai/v1/chat/completions':'https://text.pollinations.ai/openai';
    const h={'Content-Type':'application/json'};
    if(s.pollinationsKey)h['Authorization']=`Bearer ${s.pollinationsKey}`;
    return{url,headers:h};
  },
  async chat(msgs,model,opts={}){
    const{url,headers}=API.endpoint(model);
    const r=await fetch(url,{method:'POST',headers,body:JSON.stringify({model,messages:msgs,max_tokens:opts.maxTokens||1000,temperature:opts.temp??0.9,stream:false})});
    if(!r.ok){const t=await r.text();throw new Error(`API ${r.status}: ${t.slice(0,150)}`);}
    const d=await r.json();
    return d.choices?.[0]?.message?.content||'';
  },
  async stream(msgs,model,onChunk,opts={}){
    if(!ST.settings.streaming){const t=await API.chat(msgs,model,opts);onChunk(t,true);return;}
    const{url,headers}=API.endpoint(model);
    const r=await fetch(url,{method:'POST',headers,body:JSON.stringify({model,messages:msgs,max_tokens:opts.maxTokens||1000,temperature:opts.temp??0.9,stream:true})});
    if(!r.ok){const t=await r.text();throw new Error(`API ${r.status}: ${t.slice(0,150)}`);}
    const reader=r.body.getReader();const dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();if(data==='[DONE]')return;
        try{const p=JSON.parse(data);const delta=p.choices?.[0]?.delta?.content;if(delta)onChunk(delta,false);}catch{}
      }
    }
  },
  imageUrl(prompt,opts={}){
    const model=opts.model||ST.settings.imgModel||'zimage';
    return`https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?model=${model}&width=${opts.w||512}&height=${opts.h||512}&nologo=true`;
  },
  async tts(text,voice='nova',model='tts-1'){
    const{url,headers}=API.endpoint(model);
    const ttsUrl=url.replace('/chat/completions','/audio/speech');
    const r=await fetch(ttsUrl,{method:'POST',headers,body:JSON.stringify({model,input:text,voice})});
    if(!r.ok)throw new Error('TTS failed');
    return URL.createObjectURL(await r.blob());
  }
};

// ===== CONTROLLERS =====
const Ctrl={
  dlog(msg,type='info'){
    const entry=`[${new Date().toLocaleTimeString()}] ${msg}`;
    ST.chat.debugLog.push({entry,type});
    if(ST.chat.debugLog.length>200)ST.chat.debugLog.shift();
    const area=$('#debug-area');
    if(area){
      const cls=type==='error'?'derr':type==='ok'?'dok':type==='warn'?'dwarn':'dinfo';
      area.innerHTML+=`<span class="${cls}">${esc(entry)}\n</span>`;
      area.scrollTop=area.scrollHeight;
    }
  },
  buildSysPrompt(char,scenario,messages,rels){
    const stw=ST.settings.stWindow||30;
    const recent=messages.slice(-stw);
    const relCtx=Object.entries(rels||{})
      .filter(([k])=>k.startsWith(char.id+'→'))
      .map(([,r])=>`  • Toward ${r.toName||r.toId}: ${r.mood||'neutral'} (${r.intensity||5}/10) — ${r.reason||''}`)
      .join('\n');
    const cast=ST.chat.characters.map(c=>c.name).join(', ');
    return`You are ${char.name}. You are NOT an AI assistant — you are this character, fully immersed in the roleplay. Never break character. Never admit you are an AI.

SCENARIO: ${scenario.name}
SETTING: ${scenario.lore||'Unspecified setting.'}
YOUR PERSONALITY: ${char.personality||'No specific personality.'}
YOUR APPEARANCE: ${char.appearance||'No specific appearance.'}
YOUR CURRENT MOOD: ${char.emotionalState||'neutral'}
MOOD NOTES: ${char.moodNotes||'None'}
${relCtx?`\nYOUR RELATIONSHIPS:\n${relCtx}`:''}
${scenario.summary?`\nSTORY SO FAR: ${scenario.summary}`:''}
OTHERS PRESENT: ${cast}

FORMAT: Use *italics* for actions, "quotes" for dialogue. Mix freely: *smirks* "Is that so?"
Be natural, immersive, authentic to your personality. Vary response length based on the scene.
${scenario.settings?.aiKnowsUser===false?'You do not know which participant is the real human. Treat everyone as characters.':''}
${char.systemInjection?`\n[PRIVATE DIRECTOR NOTE - only you see this]: ${char.systemInjection}`:''}
${ST.chat.directive.next?`\n[STORY DIRECTION]: ${ST.chat.directive.next}`:''}`;
  },
  buildConvo(char,messages,chars){
    const stw=ST.settings.stWindow||30;
    const recent=messages.slice(-stw);
    const hist=[];
    for(const m of recent){
      if(m.charId===char.id){hist.push({role:'assistant',content:m.content});}
      else{
        const spk=chars.find(c=>c.id===m.charId);
        hist.push({role:'user',content:`${spk?.name||'Unknown'}: ${m.content}`});
      }
    }
    if(!hist.length)hist.push({role:'user',content:'[The scene begins.]'});
    return hist;
  },
  async runMain(scenario,chars,messages,rels){
    const model=ST.settings.ctrlModel||'llama-scout';
    Ctrl.dlog(`Main Controller firing (${model})...`,'dinfo');
    const stw=ST.settings.stWindow||30;
    const recent=messages.slice(-stw);
    const convo=recent.map(m=>{const c=chars.find(x=>x.id===m.charId);return`${c?.name||'?'}: ${m.content}`;}).join('\n');
    const charList=chars.map(c=>`- ${c.name} [${c.id}] mood:${c.emotionalState||'neutral'}`).join('\n');
    const sys=`You are the Main Controller for a roleplay scenario. Analyze the conversation, then respond ONLY with a valid JSON object — no other text, no markdown fences.
Return this exact structure:
{
  "characterUpdates":[{"charId":"id","emotionalState":"mood","moodNotes":"notes","systemInjection":"optional hidden note to inject"}],
  "relationshipUpdates":[{"fromId":"id","toId":"id","fromName":"name","toName":"name","mood":"positive|negative|neutral|romantic|suspicious|jealous|fearful","intensity":7,"reason":"why"}],
  "storySummary":"brief summary of events so far",
  "requestScenario":false
}`;
    const usr=`CHARACTERS:\n${charList}\n\nCONVERSATION:\n${convo}\n\nUSER DIRECTIVE: ${ST.chat.directive.next||'Continue naturally'}\nSTORY NOTES: ${ST.chat.directive.details||'None'}`;
    try{
      const raw=await API.chat([{role:'user',content:usr}],model,{temp:0.7,maxTokens:1500});
      Ctrl.dlog('Main Controller: response received','dok');
      let parsed;
      try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
      catch{Ctrl.dlog('Main Controller: JSON parse failed','derr');return null;}
      if(parsed.characterUpdates){
        for(const u of parsed.characterUpdates){
          const c=ST.chat.characters.find(x=>x.id===u.charId);
          if(c){c.emotionalState=u.emotionalState||c.emotionalState;c.moodNotes=u.moodNotes||'';c.systemInjection=u.systemInjection||'';}
        }
      }
      if(parsed.relationshipUpdates){
        for(const r of parsed.relationshipUpdates)ST.chat.rels[`${r.fromId}→${r.toId}`]=r;
        Chat.renderRels();
      }
      if(parsed.storySummary&&scenario){
        scenario.summary=parsed.storySummary;
        const sm=$('#panel-memory');if(sm)sm.textContent=parsed.storySummary;
        await DB.put('scenarios',scenario);
      }
      Ctrl.dlog(`Applied: ${parsed.characterUpdates?.length||0} char updates, ${parsed.relationshipUpdates?.length||0} rel updates`,'dok');
      if(parsed.storySummary)Chat.addCtrlMsg('◆ Narrative updated by Main Controller');
      Chat.renderCast();
      return parsed;
    }catch(err){Ctrl.dlog(`Main Controller error: ${err.message}`,'derr');return null;}
  },
  async runCreative(brief){
    const model=ST.settings.ctrlModel||'llama-scout';
    Ctrl.dlog(`Creative Controller: generating character from brief...`,'dinfo');
    const sys=`You are the Creative Controller. Generate a complete roleplay character from a brief description.
Respond ONLY with valid JSON — no other text, no markdown fences:
{"name":"Name","personality":"2-3 sentence personality","appearance":"2-3 sentence appearance","voice":"alloy|echo|fable|onyx|nova|shimmer","colorHint":"#hexcolor matching the character vibe","backstory":"brief backstory"}`;
    try{
      const raw=await API.chat([{role:'user',content:`Create a character based on: ${brief}`}],model,{temp:0.97,maxTokens:800});
      return JSON.parse(raw.replace(/```json|```/g,'').trim());
    }catch(err){Ctrl.dlog('Creative Controller failed: '+err.message,'derr');return null;}
  },
  async autoImprove(userChar,scenario,messages){
    const model=ST.settings.ctrlModel||'llama-scout';
    const recent=messages.slice(-15).map(m=>{const c=ST.chat.characters.find(x=>x.id===m.charId);return`${c?.name||'?'}: ${m.content}`;}).join('\n');
    const prompt=`Write the next in-character message for ${userChar.name} in this roleplay.

SCENARIO: ${scenario.name} — ${scenario.lore||''}
${userChar.name}'s PERSONALITY: ${userChar.personality||''}
DIRECTIVE: ${ST.chat.directive.next||'Continue naturally'}

RECENT CONVERSATION:
${recent}

Write only ${userChar.name}'s next message using *actions* and "dialogue". No labels.`;
    return await API.chat([{role:'user',content:prompt}],model,{temp:0.94,maxTokens:600});
  }
};

// ===== CHAT ENGINE =====
const Chat={
  async init(scenId){
    const scenario=await DB.get('scenarios',scenId);
    if(!scenario){Toast.e('Scenario not found');return;}
    const chars=[];
    for(const cid of scenario.characterIds||[]){
      const c=await DB.get('characters',cid);
      if(c)chars.push({...c,emotionalState:'neutral',moodNotes:'',systemInjection:''});
    }
    let msgs=await DB.getByIndex('messages','scenarioId',scenId);
    msgs.sort((a,b)=>a.timestamp-b.timestamp);
    const relData=await DB.get('relationships',scenId);
    const allChars=await DB.getAll('characters');
    const userChar=allChars.find(c=>c.isUser);
    ST.chat={
      ...ST.chat,scenId,scenario,characters:chars,messages:msgs,rels:relData?.matrix||{},
      activeCharId:userChar?.id||chars[0]?.id||null,
      autoChatRunning:false,autoChatStop:false,msgSinceCtrl:0,
      panelOpen:window.innerWidth>900,panelTab:'directive',
      directive:{next:'',details:''},debugLog:[],
    };
    Router.go('chat');
  },
  async send(content,charId){
    if(!content.trim())return;
    const char=ST.chat.characters.find(c=>c.id===charId);if(!char)return;
    const msg={id:uid(),scenarioId:ST.chat.scenId,charId,content:content.trim(),timestamp:Date.now(),isUser:!!char.isUser};
    ST.chat.messages.push(msg);
    await DB.put('messages',msg);
    Chat.renderMsg(msg,char,true);
    Chat.scrollEnd();
    const isUserChar=char.isUser||ST.chat.scenario?.settings?.aiKnowsUser!==false;
    if(isUserChar)await Chat.doResponses(charId);
  },
  async doResponses(excludeId){
    const responders=ST.chat.characters.filter(c=>c.id!==excludeId&&!c.isUser);
    for(const c of responders){await Chat.genResponse(c);if(ST.chat.autoChatStop)break;}
  },
  async genResponse(char){
    if(!char)return;
    const tid=`th-${char.id}-${Date.now()}`;
    Chat.addThinking(tid,char);Chat.scrollEnd();
    try{
      const sys=Ctrl.buildSysPrompt(char,ST.chat.scenario,ST.chat.messages,ST.chat.rels);
      const hist=Ctrl.buildConvo(char,ST.chat.messages,ST.chat.characters);
      const model=char.modelId||ST.settings.charModel||'llama-scout';
      Ctrl.dlog(`Generating for ${char.name} (${model})...`,'dinfo');
      let full='';
      const msgId=uid();
      const el=Chat.createStreamEl(msgId,char);
      $(`#${tid}`)?.remove();
      await API.stream([{role:'system',content:sys},...hist],model,(chunk,done)=>{
        full+=chunk;Chat.updateStreamEl(el,char,full,done);Chat.scrollEnd();
      },{temp:0.93});
      Chat.finalizeEl(el,msgId);
      const msg={id:msgId,scenarioId:ST.chat.scenId,charId:char.id,content:full,timestamp:Date.now(),isUser:false};
      ST.chat.messages.push(msg);
      await DB.put('messages',msg);
      ST.chat.msgSinceCtrl++;
      const freq=ST.chat.scenario?.settings?.controllerFreq||ST.settings.ctrlFreq||10;
      if(ST.chat.msgSinceCtrl>=freq){
        ST.chat.msgSinceCtrl=0;
        setTimeout(async()=>{
          await Ctrl.runMain(ST.chat.scenario,ST.chat.characters,ST.chat.messages,ST.chat.rels);
          await DB.put('relationships',{scenarioId:ST.chat.scenId,matrix:ST.chat.rels});
        },500);
      }
      if(ST.chat.scenario?.settings?.autoImage){
        try{
          const imgPrompt=`${char.appearance||''}, ${full.replace(/\*[^*]+\*/g,'').replace(/"[^"]+"/g,'').slice(0,200)}`;
          const imgUrl=API.imageUrl(imgPrompt);
          const mb=el.querySelector('.msg-body');
          if(mb){const img=document.createElement('img');img.className='msg-img';img.src=imgUrl;img.loading='lazy';mb.appendChild(img);}
        }catch{}
      }
      Ctrl.dlog(`${char.name} responded`,'dok');
    }catch(err){
      $(`#${tid}`)?.remove();
      Toast.e(`${char.name} failed: ${err.message}`);
      Ctrl.dlog(`${char.name} error: ${err.message}`,'derr');
    }
  },
  addThinking(id,char){
    const log=$('#chat-log');if(!log)return;
    const el=document.createElement('div');el.className='msg';el.id=id;
    el.innerHTML=`<div class="msg-hdr">${Chat.avHtml(char,26)}<span class="msg-name" style="color:${esc(char.color)}">${esc(char.name)}</span></div>
    <div class="msg-body" style="--mc:${esc(char.color)}"><div class="thinking"><span></span><span></span><span></span></div></div>`;
    log.appendChild(el);
  },
  createStreamEl(msgId,char){
    const log=$('#chat-log');if(!log)return null;
    const el=document.createElement('div');el.className='msg';el.id=`msg-${msgId}`;
    el.innerHTML=`<div class="msg-hdr">${Chat.avHtml(char,26)}<span class="msg-name" style="color:${esc(char.color)}">${esc(char.name)}</span><span class="msg-time">${fmtT(Date.now())}</span></div>
    <div class="msg-body stream" id="mb-${msgId}" style="--mc:${esc(char.color)}"></div>`;
    log.appendChild(el);return el;
  },
  updateStreamEl(el,char,text,done){
    if(!el)return;
    const mb=el.querySelector('[id^="mb-"]');if(!mb)return;
    mb.innerHTML=parseRP(text,char.color);
    if(done)mb.classList.remove('stream');
  },
  finalizeEl(el,msgId){
    if(!el)return;
    const mb=el.querySelector('[id^="mb-"]');if(mb)mb.classList.remove('stream');
    const ar=document.createElement('div');ar.className='msg-ar';
    ar.innerHTML=`<button class="mabtn" onclick="CA.img('${msgId}')">${I('image',11)} Image</button>
    <button class="mabtn" onclick="CA.voice('${msgId}')">${I('voice',11)} Voice</button>
    <button class="mabtn" onclick="CA.regen('${msgId}')">${I('regen',11)} Regen</button>
    <button class="mabtn" onclick="CA.branch('${msgId}')">${I('branch',11)} Branch</button>`;
    el.appendChild(ar);
  },
  renderMsg(msg,char,withActions=false){
    const log=$('#chat-log');if(!log)return;
    const el=document.createElement('div');
    el.className=`msg${char.isUser?' usr':''}`;el.id=`msg-${msg.id}`;
    el.innerHTML=`<div class="msg-hdr">${Chat.avHtml(char,26)}<span class="msg-name" style="color:${esc(char.color)}">${esc(char.name)}</span><span class="msg-time">${fmtT(msg.timestamp)}</span></div>
    <div class="msg-body" style="--mc:${esc(char.color)}">${parseRP(msg.content,char.color)}${msg.imageUrl?`<img class="msg-img" src="${esc(msg.imageUrl)}" loading="lazy">`:''}</div>`;
    if(withActions){
      const ar=document.createElement('div');ar.className='msg-ar';
      ar.innerHTML=`<button class="mabtn" onclick="CA.img('${msg.id}')">${I('image',11)} Image</button>
      <button class="mabtn" onclick="CA.voice('${msg.id}')">${I('voice',11)} Voice</button>
      <button class="mabtn" onclick="CA.regen('${msg.id}')">${I('regen',11)} Regen</button>
      <button class="mabtn" onclick="CA.branch('${msg.id}')">${I('branch',11)} Branch</button>`;
      el.appendChild(ar);
    }
    log.appendChild(el);
  },
  addCtrlMsg(text){
    const log=$('#chat-log');if(!log)return;
    const el=document.createElement('div');el.className='msg ctrl';
    el.innerHTML=`<div class="msg-hdr"><div class="msg-av" style="background:var(--s3);color:var(--tmut);font-size:10px">⚙</div><span class="msg-name" style="color:var(--tmut);font-size:10px">System</span></div><div class="msg-body">${esc(text)}</div>`;
    log.appendChild(el);Chat.scrollEnd();
  },
  scrollEnd(){const l=$('#chat-log');if(l)l.scrollTop=l.scrollHeight},
  avHtml(char,sz=26){
    const st=`width:${sz}px;height:${sz}px;background:${char.color}22;border:2px solid ${char.color};`;
    if(char.avatar)return`<div class="msg-av" style="${st}"><img src="${esc(char.avatar)}" style="width:100%;height:100%;object-fit:cover"></div>`;
    return`<div class="msg-av" style="${st};color:${char.color};font-size:${Math.floor(sz*.4)}px">${char.name[0].toUpperCase()}</div>`;
  },
  renderRels(){
    const c=$('#rel-container');if(!c)return;
    const entries=Object.values(ST.chat.rels);
    if(!entries.length){c.innerHTML='<p style="color:var(--tmut);font-size:12px">No relationships tracked yet.</p>';return;}
    c.innerHTML=entries.map(r=>`<div class="rel-entry">
      <div class="rel-chars">${esc(r.fromName||r.fromId)} → ${esc(r.toName||r.toId)}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="rmood ${r.mood==='positive'||r.mood==='romantic'?r.mood==='romantic'?'rom':'pos':r.mood==='negative'?'neg':'neu'}">${esc(r.mood||'neutral')}</span>
        <span style="font-size:11px;color:var(--tmut)">${r.intensity||5}/10</span>
      </div>
      <div class="rel-reason">${esc(r.reason||'')}</div>
    </div>`).join('');
  },
  renderCast(){
    const c=$('#active-chars-list');if(!c)return;
    c.innerHTML=ST.chat.characters.map(ch=>`<div class="act-char-row">${Chat.avHtml(ch,24)}
      <div style="flex:1"><div style="font-size:12px;color:${esc(ch.color)};font-weight:600">${esc(ch.name)}</div>
      <div style="font-size:11px;color:var(--tmut)">${esc(ch.emotionalState||'neutral')}</div></div>
      ${ch.isUser?'<span class="pill g" style="font-size:10px">You</span>':''}
    </div>`).join('');
  },
  async startAuto(){
    if(ST.chat.autoChatRunning)return;
    ST.chat.autoChatRunning=true;ST.chat.autoChatStop=false;
    const btn=$('#auto-btn');if(btn){btn.classList.add('on');btn.innerHTML=`${I('pause',13)} Pause`;}
    Toast.i('Auto-chat started');
    const chars=ST.chat.characters.filter(c=>!c.isUser);
    while(!ST.chat.autoChatStop){
      if(!chars.length)break;
      const last=ST.chat.messages[ST.chat.messages.length-1];
      const li=last?chars.findIndex(c=>c.id===last.charId):-1;
      const next=chars[(li+1)%chars.length];
      await Chat.genResponse(next);
      if(ST.chat.autoChatStop)break;
      await sleep(1200);
    }
    ST.chat.autoChatRunning=false;
    const btn2=$('#auto-btn');if(btn2){btn2.classList.remove('on');btn2.innerHTML=`${I('play',13)} Auto`;}
  },
  stopAuto(){
    ST.chat.autoChatStop=true;ST.chat.autoChatRunning=false;
    const btn=$('#auto-btn');if(btn){btn.classList.remove('on');btn.innerHTML=`${I('play',13)} Auto`;}
    Toast.i('Auto-chat paused');
  },
  async saveJSON(){
    const name=await Modal.prompt('Save name:',{title:'Save Chat Session',placeholder:`${ST.chat.scenario?.name||'session'} - ${new Date().toLocaleDateString()}`,ok:'Save'});
    if(!name)return;
    const data={_theatro:true,version:1,name,savedAt:Date.now(),scenario:ST.chat.scenario,characters:ST.chat.characters,messages:ST.chat.messages,rels:ST.chat.rels};
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download=`${name.replace(/[^a-z0-9]/gi,'_')}.json`;a.click();
    Toast.s('Chat saved');
  },
  async loadJSON(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      try{
        const data=JSON.parse(await f.text());
        if(!data._theatro){Toast.e('Not a Theatro file');return;}
        ST.chat.messages=data.messages||[];ST.chat.rels=data.rels||{};
        const log=$('#chat-log');if(log){log.innerHTML='';
          for(const m of ST.chat.messages){const ch=ST.chat.characters.find(c=>c.id===m.charId);if(ch)Chat.renderMsg(m,ch,true);}
        }
        Toast.s(`Loaded: "${data.name}"`);
      }catch{Toast.e('Load failed');}
    };
    inp.click();
  }
};

// ===== CHAT ACTIONS =====
const CA={
  async img(msgId){
    const msg=ST.chat.messages.find(m=>m.id===msgId);
    const char=msg?ST.chat.characters.find(c=>c.id===msg.charId):null;
    if(!msg||!char)return;
    Toast.i('Generating image...');
    try{
      const prompt=`${char.appearance||''}, ${msg.content.replace(/\*[^*]+\*/g,'').replace(/"[^"]+"/g,'').trim().slice(0,200)}`;
      const url=API.imageUrl(prompt);
      const mb=$(`#msg-${msgId} .msg-body`);
      if(mb){
        const img=document.createElement('img');img.className='msg-img';img.src=url;img.loading='lazy';
        img.onclick=()=>Modal.open({title:'Image',wide:true,content:`<img src="${esc(url)}" style="width:100%;border-radius:8px">`});
        mb.appendChild(img);
      }
      msg.imageUrl=url;Toast.s('Image generated');
    }catch(err){Toast.e('Image failed: '+err.message);}
  },
  async voice(msgId){
    const msg=ST.chat.messages.find(m=>m.id===msgId);
    const char=msg?ST.chat.characters.find(c=>c.id===msg.charId):null;
    if(!msg||!char)return;
    Toast.i('Generating voice...');
    try{
      const text=msg.content.replace(/\*[^*]+\*/g,'').replace(/"/g,'').trim();
      const voice=char.voice||ST.settings.defVoice||'nova';
      const audioUrl=await API.tts(text,voice,ST.settings.ttsModel||'tts-1');
      const mb=$(`#msg-${msgId} .msg-body`);
      if(mb){
        mb.querySelector('audio')?.remove();
        const au=document.createElement('audio');au.controls=true;au.src=audioUrl;
        au.style.cssText='width:200px;height:32px;margin-top:8px;display:block;filter:invert(.8)';
        mb.appendChild(au);au.play().catch(()=>{});
      }
      Toast.s('Voice generated');
    }catch(err){Toast.e('Voice failed: '+err.message);}
  },
  async regen(msgId){
    const idx=ST.chat.messages.findIndex(m=>m.id===msgId);if(idx<0)return;
    const msg=ST.chat.messages[idx];
    const char=ST.chat.characters.find(c=>c.id===msg.charId);if(!char)return;
    const ok=await Modal.confirm('Regenerate this message? Current version will be lost.',{ok:'Regenerate'});if(!ok)return;
    ST.chat.messages.splice(idx,1);await DB.del('messages',msgId);
    $(`#msg-${msgId}`)?.remove();
    await Chat.genResponse(char);
  },
  async branch(msgId){
    const idx=ST.chat.messages.findIndex(m=>m.id===msgId);if(idx<0)return;
    const ok=await Modal.confirm('Create a branch from this message point?',{ok:'Branch Here'});if(!ok)return;
    const base=ST.chat.scenario?.name||'Scenario';
    const all=await DB.getAll('scenarios');
    const bc=all.filter(s=>s.parentId===ST.chat.scenId).length;
    const bname=`${base}-${bc+2}`;
    const bs={...ST.chat.scenario,id:uid(),name:bname,parentId:ST.chat.scenId,messageIds:[],summary:'',createdAt:Date.now(),updatedAt:Date.now()};
    await DB.put('scenarios',bs);
    for(const m of ST.chat.messages.slice(0,idx+1)){await DB.put('messages',{...m,id:uid(),scenarioId:bs.id});}
    Toast.s(`Branch "${bname}" created`);
    const go=await Modal.confirm(`Branch "${bname}" created. Open it?`,{ok:'Open Branch'});
    if(go)await Chat.init(bs.id);
  }
};

// ===== HEADER =====
const Hdr={
  render(screen){
    const h=$('#app-header');if(!h)return;
    const isDash=['dashboard','char-create','scenario-create','settings'].includes(screen);

// ===== SCREENS =====
const Scr={
  async render(screen){
    if(screen==='dashboard')await Scr.dashboard();
    else if(screen==='char-create')await Scr.charCreate();
    else if(screen==='scenario-create')await Scr.scenCreate();
    else if(screen==='chat')await Scr.chat();
    else if(screen==='settings')await Scr.settings();

  // --- DASHBOARD ---
  async dashboard(){
    const el=$('#screen-dashboard');if(!el)return;
    const chars=await DB.getAll('characters');
    const scens=await DB.getAll('scenarios');
    const tab=ST.dashTab||'scenarios';
    el.innerHTML=`<div class="dash-tabs">
      <button class="dtab ${tab==='scenarios'?'on':''}" onclick="ST.dashTab='scenarios';Scr.dashboard()">${I('film',12)} Scenarios (${scens.length})</button>
      <button class="dtab ${tab==='characters'?'on':''}" onclick="ST.dashTab='characters';Scr.dashboard()">${I('user',12)} Characters (${chars.length})</button>
    </div>
    <div class="dash-body">${tab==='scenarios'?Scr.scenHtml(scens,chars):Scr.charHtml(chars)}</div>`;
  },

  scenHtml(scens,chars){
    if(!scens.length)return`<div class="empty"><div class="empty-ico">🎭</div><div class="empty-t">No Scenarios Yet</div><div class="empty-d">Create your first scenario to begin</div><button class="btn bp" onclick="Scr.newScenario()">${I('plus',14)} Create Scenario</button></div>`;
    return`<div class="sec-hdr"><span class="sec-title">Your Scenarios</span></div><div class="cards">${
      scens.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).map(s=>{
        const sc=(s.characterIds||[]).map(id=>chars.find(c=>c.id===id)).filter(Boolean);
        return`<div class="scard" onclick="Chat.init('${s.id}')">
          <div class="scard-name">${esc(s.name)}${s.parentId?` <span class="tag g">Branch</span>`:''}</div>
          <div class="scard-lore">${esc(s.lore||'No lore defined')}</div>
          <div class="scard-chars">${sc.slice(0,7).map(c=>`<div class="mav" style="background:${c.color}22;border:2px solid ${c.color};color:${c.color}">${c.avatar?`<img src="${esc(c.avatar)}" style="width:100%;height:100%;object-fit:cover">`:c.name[0]}</div>`).join('')}${sc.length>7?`<div class="mav">+${sc.length-7}</div>`:''}</div>
          <div class="scard-meta"><span>${sc.length} character${sc.length!==1?'s':''}</span><span>${s.updatedAt?fmtD(s.updatedAt):'New'}</span></div>
          <div class="scard-foot">
            <button class="btn bg bsm" onclick="event.stopPropagation();Scr.editScen('${s.id}')">${I('edit',12)}</button>
            <button class="btn bd bsm" onclick="event.stopPropagation();Scr.delScen('${s.id}')">${I('trash',12)}</button>
            <button class="btn bp bsm" onclick="event.stopPropagation();Chat.init('${s.id}')">${I('play',12)} Open</button>
          </div>
        </div>`;
      }).join('')
    }</div>`;
  },

  charHtml(chars){
    if(!chars.length)return`<div class="empty"><div class="empty-ico">🎪</div><div class="empty-t">No Characters Yet</div><div class="empty-d">Create characters to cast in your scenarios</div><button class="btn bp" onclick="Scr.newChar()">${I('plus',14)} Create Character</button></div>`;
    return`<div class="sec-hdr"><span class="sec-title">Your Characters</span></div><div class="cards">${
      chars.map(c=>`<div class="ccard" style="--cc:${c.color}">
        <div class="ccard-top">
          <div class="cav" style="border-color:${c.color};background:${c.color}22;color:${c.color}">${c.avatar?`<img src="${esc(c.avatar)}">`:c.name[0]}</div>
          <div style="flex:1;min-width:0">
            <div class="ccard-name">${esc(c.name)}</div>
            <div class="ccard-sub">${esc(c.modelId||'llama-scout')} · ${esc(c.voice||'nova')}</div>
          </div>
          ${c.isUser?'<span class="pill g" style="margin-left:auto;font-size:10px">You</span>':''}
        </div>
        <div class="ccard-desc">${esc(c.personality||'No personality defined')}</div>
        <div class="ccard-foot">
          <button class="btn bg bsm" onclick="Scr.editChar('${c.id}')">${I('edit',12)}</button>
          <button class="btn bd bsm" onclick="Scr.delChar('${c.id}')">${I('trash',12)}</button>
        </div>
      </div>`).join('')
    }</div>`;
  },

  // --- CHAR CREATE ---
  newChar(){
    ST.editCharId=null;
    ST.charForm={name:'',color:COLORS[0],personality:'',appearance:'',modelId:ST.settings.charModel||'llama-scout',voice:'nova',avatar:'',isUser:false};
    Router.go('char-create');
  },
  async editChar(id){

  },
  async delChar(id){

    await DB.del('characters',id);Toast.s('Character deleted');Scr.dashboard();
  },
  async charCreate(){
    const el=$('#screen-char-create');if(!el)return;
    const f=ST.charForm;const isEdit=!!ST.editCharId;
    el.innerHTML=`<div class="create-wrap">
      <div class="create-hdr">
        <button class="ibtn" onclick="Router.go('dashboard')">${I('back',16)}</button>
        <h1 class="create-title">${isEdit?'Edit Character':'New Character'}</h1>
        <div style="margin-left:auto"><button class="btn bs bsm" id="auto-gen-btn" onclick="Scr.autoGenChar()">${I('magic',13)} Auto-Create</button></div>
      </div>
      <div style="display:flex;align-items:flex-start;gap:16px">
        <div>
          <div class="lbl" style="margin-bottom:6px">Avatar</div>
          <div class="av-uploader" id="av-drop" onclick="Scr.trigAvatar()">${f.avatar?`<img src="${esc(f.avatar)}">`:`${I('user',22)}<span>Upload</span>`}</div>
          <input type="file" id="av-file" accept="image/*" style="display:none" onchange="Scr.handleAvatar(event)">
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:12px">
          <div class="field">
            <label class="lbl">Name <span>*</span></label>
            <input type="text" id="cf-name" value="${esc(f.name)}" placeholder="Character name" oninput="ST.charForm.name=this.value">

          <div class="field">
            <label class="lbl">Avatar URL</label>
            <input type="url" id="cf-av-url" placeholder="https://..." value="${f.avatar?.startsWith('http')?esc(f.avatar):''}" oninput="Scr.setAvUrl(this.value)">
          </div>
        </div>
      </div>
      <div class="field">
        <label class="lbl">Character Color</label>
        <div class="cgrid">${COLORS.map(c=>`<div class="csw ${c===f.color?'sel':''}" style="background:${c}" onclick="Scr.pickColor('${c}')"></div>`).join('')}</div>
        <div style="margin-top:6px;display:flex;gap:8px;align-items:center">
          <input type="text" id="cf-color" value="${esc(f.color)}" placeholder="#c9a84c" style="width:100px" oninput="Scr.pickColor(this.value)">
          <div id="cp" style="width:26px;height:26px;border-radius:50%;background:${esc(f.color)};border:2px solid var(--border)"></div>
        </div>
      </div>
      <div class="field">
        <label class="lbl">Personality <span>*</span></label>
        <textarea id="cf-p" rows="3" placeholder="Personality, traits, speaking style, quirks..." oninput="ST.charForm.personality=this.value">${esc(f.personality)}</textarea>
      </div>
      <div class="field">
        <label class="lbl">Appearance</label>
        <textarea id="cf-a" rows="2" placeholder="Physical description, clothing, distinctive features..." oninput="ST.charForm.appearance=this.value">${esc(f.appearance)}</textarea>
      </div>
      <div class="two-col">
        <div class="field"><label class="lbl">AI Model</label>${Scr.mpHtml('cf-model',f.modelId)}</div>
        <div class="field"><label class="lbl">Voice</label>${Scr.vpHtml('cf-voice',f.voice)}</div>
      </div>
      <div class="tgl-wrap" onclick="Scr.toggleUser()">
        <div class="tgl ${f.isUser?'on':''}" id="cf-usr"></div>
        <span class="tgl-lbl">This character represents me (the user)</span>
      </div>
      <hr>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn bg" onclick="Router.go('dashboard')">Cancel</button>
        <button class="btn bp" onclick="Scr.saveChar()">${I('check',14)} ${isEdit?'Save Changes':'Create Character'}</button>
      </div>
    </div>`;
  },
  trigAvatar(){$('#av-file')?.click()},
  handleAvatar(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{ST.charForm.avatar=ev.target.result;const d=$('#av-drop');if(d)d.innerHTML=`<img src="${esc(ev.target.result)}" style="width:100%;height:100%;object-fit:cover">`};
    r.readAsDataURL(file);
  },
  setAvUrl(url){
    ST.charForm.avatar=url;
    const d=$('#av-drop');
    if(d&&url.startsWith('http'))d.innerHTML=`<img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<span style=&quot;font-size:10px&quot;>Invalid URL</span>'">`;
  },
  pickColor(color){
    ST.charForm.color=color;
    $$('.csw').forEach(s=>{s.classList.remove('sel');if(s.style.background===color||s.title===color)s.classList.add('sel');});
    const cp=$('#cp');if(cp)cp.style.background=color;
    const ci=$('#cf-color');if(ci)ci.value=color;
  },
  toggleUser(){ST.charForm.isUser=!ST.charForm.isUser;$('#cf-usr')?.classList.toggle('on',ST.charForm.isUser)},
  async saveChar(){
    const f=ST.charForm;
    if(!f.name.trim()){Toast.e('Name is required');return;}
    if(f.isUser){
      const all=await DB.getAll('characters');
      for(const c of all)if(c.isUser&&c.id!==ST.editCharId){c.isUser=false;await DB.put('characters',c);}
    }
    const char={id:ST.editCharId||uid(),name:f.name.trim(),color:f.color||COLORS[0],personality:f.personality||'',appearance:f.appearance||'',modelId:f.modelId||'llama-scout',voice:f.voice||'nova',avatar:f.avatar||'',isUser:!!f.isUser,updatedAt:Date.now()};
    if(!ST.editCharId)char.createdAt=Date.now();
    else{const ex=await DB.get('characters',char.id);char.createdAt=ex?.createdAt||Date.now();}
    await DB.put('characters',char);
    Toast.s(`"${char.name}" saved`);
    ST.dashTab='characters';Router.go('dashboard');
  },
  async autoGenChar(){
    const brief=await Modal.prompt('Describe the character briefly:',{title:'Auto-Create Character',placeholder:'e.g. A sarcastic medieval knight with a hidden soft side',ok:'Generate'});
    if(!brief)return;
    const btn=$('#auto-gen-btn');if(btn){btn.disabled=true;btn.innerHTML=`<div class="spinner" style="width:13px;height:13px"></div> Generating...`;}
    try{
      const r=await Ctrl.runCreative(brief);if(!r){Toast.e('Generation failed');return;}
      ST.charForm={...ST.charForm,name:r.name||'',personality:r.personality||'',appearance:r.appearance||'',voice:r.voice||'nova',color:r.colorHint||COLORS[Math.floor(Math.random()*COLORS.length)]};
      await Scr.charCreate();Toast.s('Character generated!');
    }catch(err){Toast.e('Failed: '+err.message);}
    finally{const b=$('#auto-gen-btn');if(b){b.disabled=false;b.innerHTML=`${I('magic',13)} Auto-Create`;}}
  },

  // --- SCENARIO CREATE ---
  newScenario(){
    ST.editScenId=null;
    ST.scenForm={name:'',lore:'',characterIds:[],settings:{aiKnowsUser:true,autoImage:false,autoTTS:false,controllerFreq:null},openingMessage:''};
    Router.go('scenario-create');
  },
  async editScen(id){
    const s=await DB.get('scenarios',id);if(!s)return;

        <label class="lbl">Scenario Name <span>*</span></label>

      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">

      </div>
      <div class="pcontent">
        <div class="p-sec ${ST.chat.panelTab==='directive'?'on':''}" id="pt-directive">
          <div><div class="plbl">🎯 What Happens Next</div><textarea rows="3" placeholder="What should happen in the next few messages..." style="font-size:12px" oninput="ST.chat.directive.next=this.value">${esc(ST.chat.directive.next)}</textarea></div>
          <div><div class="plbl">📝 Style Notes</div><textarea rows="3" placeholder="Writing style, tone, things to avoid..." style="font-size:12px" oninput="ST.chat.directive.details=this.value">${esc(ST.chat.directive.details)}</textarea></div>
          <button class="btn bp bsm" onclick="Scr.runCtrl()" style="align-self:flex-start">${I('ctrl',12)} Apply to Controller</button>
        </div>
        <div class="p-sec ${ST.chat.panelTab==='memory'?'on':''}" id="pt-memory">
          <div class="plbl">📜 Story Summary</div>
          <div id="panel-memory" style="font-size:12px;color:var(--tdim);line-height:1.6;background:var(--s2);padding:10px;border-radius:var(--r);min-height:60px">${esc(scenario.summary||'No summary yet — generated after first controller analysis.')}</div>
        </div>
        <div class="p-sec ${ST.chat.panelTab==='rels'?'on':''}" id="pt-rels">
          <div class="plbl">💞 Relationship Matrix</div>
          <div id="rel-container"><p style="color:var(--tmut);font-size:12px">Relationships appear after controller analysis.</p></div>
        </div>
        <div class="p-sec ${ST.chat.panelTab==='cast'?'on':''}" id="pt-cast">
          <div class="plbl">👥 Active Cast</div>
          <div id="active-chars-list"></div>
        </div>
        <div class="p-sec ${ST.chat.panelTab==='debug'?'on':''}" id="pt-debug">
          <div class="plbl">🐞 Debug Console</div>
          <div class="debug-area" id="debug-area">Theatro Debug Console\nReady.\n</div>
          <button class="btn bg bsm" onclick="const d=$('#debug-area');if(d)d.innerHTML=''">Clear</button>
        </div>
      </div>
    </div>`;

    // Render existing messages
    for(const msg of messages){
      const char=characters.find(c=>c.id===msg.charId)||{id:'narrator',name:'Narrator',color:'#8b7355',isUser:false};
      Chat.renderMsg(msg,char,true);
    }
    // Opening message
    if(!messages.length&&scenario.openingMessage){
      const narr={id:'narrator',name:'Narrator',color:'#8b7355',isUser:false};
      Chat.renderMsg({id:uid(),scenarioId:scenario.id,charId:'narrator',content:scenario.openingMessage,timestamp:Date.now()},narr,false);
    }
    Chat.scrollEnd();
    Chat.renderCast();
    Chat.renderRels();
    Scr.updateCPill();
  },
  updateCPill(){
    const el=$('#cpill');if(!el)return;
    const char=ST.chat.characters.find(c=>c.id===ST.chat.activeCharId);if(!char)return;
    el.innerHTML=`<div class="char-pill" onclick="Scr.openCharPicker()"><div class="dot" style="background:${esc(char.color)}"></div>Playing as <strong style="color:${esc(char.color)}">${esc(char.name)}</strong><span class="arr">▼</span></div>`;
  },
  openCharPicker(){
    const chars=ST.chat.characters;
    Modal.open({title:'Play As Character',narrow:true,content:()=>`<div class="mlist">${
      chars.map(c=>`<div class="mopt ${c.id===ST.chat.activeCharId?'sel':''}" onclick="Scr.selectChar('${c.id}')">
        <div style="display:flex;align-items:center;gap:8px">${Chat.avHtml(c,22)}<span style="color:${esc(c.color)};font-weight:600">${esc(c.name)}</span>${c.isUser?'<span class="pill g" style="font-size:10px">You</span>':''}</div>
        ${c.id===ST.chat.activeCharId?'<span style="color:var(--gold)">✓</span>':''}
      </div>`).join('')
    }</div>`});
  },
  selectChar(cid){
    ST.chat.activeCharId=cid;Modal.close();Scr.updateCPill();
    const char=ST.chat.characters.find(c=>c.id===cid);
    if(char){
      const ta=$('#chat-ta');if(ta)ta.placeholder=`Write as ${char.name}... (*action* and "dialogue")`;
      const avb=$('#char-av-btn');
      if(avb)avb.innerHTML=char.avatar?`<img src="${esc(char.avatar)}" style="width:100%;height:100%;object-fit:cover">`:`<span style="color:${char.color};font-family:var(--fd);font-size:11px">${char.name[0]}</span>`;
    }
  },
  taResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px'},
  taKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();Scr.sendMsg();}},
  async sendMsg(){
    const ta=$('#chat-ta');if(!ta)return;
    const content=ta.value.trim();if(!content)return;
    ta.value='';ta.style.height='auto';
    await Chat.send(content,ST.chat.activeCharId);
  },
  setPTab(tab){
    ST.chat.panelTab=tab;
    $$('.ptab').forEach(t=>t.classList.toggle('on',t.getAttribute('onclick')?.includes(`'${tab}'`)));
    $$('.p-sec').forEach(s=>s.classList.remove('on'));
    $(`#pt-${tab}`)?.classList.add('on');
  },
  togPanel(){ST.chat.panelOpen=!ST.chat.panelOpen;$('#spanel')?.classList.toggle('collapsed',!ST.chat.panelOpen)},
  toggleAuto(){if(ST.chat.autoChatRunning)Chat.stopAuto();else Chat.startAuto()},
  async runCtrl(){
    Toast.i('Running Main Controller...');
    const r=await Ctrl.runMain(ST.chat.scenario,ST.chat.characters,ST.chat.messages,ST.chat.rels);
    if(r){await DB.put('relationships',{scenarioId:ST.chat.scenId,matrix:ST.chat.rels});Toast.s('Analysis complete');}
    else Toast.e('Controller failed');
  },
  async improve(){
    const char=ST.chat.characters.find(c=>c.id===ST.chat.activeCharId);if(!char)return;
    const btn=$('#improve-btn');if(btn){btn.disabled=true;btn.innerHTML=`<div class="spinner" style="width:14px;height:14px"></div>`;}
    try{
      const text=await Ctrl.autoImprove(char,ST.chat.scenario,ST.chat.messages);
      const ta=$('#chat-ta');if(ta){ta.value=text;Scr.taResize(ta);ta.focus();}
      Toast.i('Suggestion ready — edit then send');
    }catch(err){Toast.e('Auto-improve failed: '+err.message);}
    finally{const b=$('#improve-btn');if(b){b.disabled=false;b.innerHTML=I('improve',15);}}
  },

  // --- SETTINGS ---
  async settings(){
    const el=$('#screen-settings');if(!el)return;
    const s=ST.settings;const tab=ST.settTab||'providers';
    el.innerHTML=`<nav class="sett-nav">
      ${[['providers','🔑','API Keys'],['models','🤖','Models'],['controllers','⚙','Controllers'],['memory','🧠','Memory'],['storage','💾','Storage']].map(([id,ico,label])=>`
        <div class="sett-ni ${tab===id?'on':''}" onclick="ST.settTab='${id}';Scr.settings()"><span>${ico}</span><span>${esc(label)}</span></div>
      `).join('')}
    </nav>
    <div class="sett-body">
      <div class="sett-sec ${tab==='providers'?'on':''}">
        <div class="sett-grp">
          <div class="sett-gt">Pollinations (Default)</div>
          <p style="font-size:12px;color:var(--tdim)">Works out-of-the-box. Add your publishable key (pk_...) for authenticated endpoints and higher limits.</p>
          <div class="field"><label class="lbl">Pollinations Key</label><input type="text" id="s-pk" value="${esc(s.pollinationsKey)}" placeholder="pk_..." oninput="ST.settings.pollinationsKey=this.value"></div>
        </div>
        <div class="sett-grp">
          <div class="sett-gt">Aqua API (Premium Models)</div>
          <p style="font-size:12px;color:var(--tdim)">Unlocks Grok 4.1 Thinking for controllers and premium characters.</p>
          <div class="field"><label class="lbl">Aqua API Key</label><input type="password" id="s-aq" value="${esc(s.aquaKey)}" placeholder="Paste key..." oninput="ST.settings.aquaKey=this.value"></div>
        </div>
        <div class="sett-grp">
          <div class="sett-gt">Custom OpenAI-Compatible Endpoint</div>
          <div class="field"><label class="lbl">Base URL</label><input type="url" id="s-curl" value="${esc(s.customUrl||'')}" placeholder="https://..." oninput="ST.settings.customUrl=this.value"></div>
          <div class="field"><label class="lbl">API Key</label><input type="password" id="s-ckey" value="${esc(s.customKey||'')}" placeholder="Bearer token..." oninput="ST.settings.customKey=this.value"></div>
        </div>
        <button class="btn bp bsm" onclick="Scr.saveSettings()">Save Provider Settings</button>
      </div>
      <div class="sett-sec ${tab==='models'?'on':''}">
        <div class="sett-grp">
          <div class="sett-gt">Default Model Assignments</div>
          <div class="field"><label class="lbl">Character Default</label>${Scr.mpHtml('s-cm',s.charModel||'llama-scout')}</div>
          <div class="field"><label class="lbl">Controller Default</label>${Scr.mpHtml('s-ctm',s.ctrlModel||'llama-scout')}</div>
          <div class="field"><label class="lbl">Image Model</label><input type="text" value="${esc(s.imgModel||'zimage')}" oninput="ST.settings.imgModel=this.value"></div>
          <div class="field"><label class="lbl">TTS Model</label><input type="text" value="${esc(s.ttsModel||'tts-1')}" oninput="ST.settings.ttsModel=this.value"></div>
          <div class="field"><label class="lbl">Default Voice</label>${Scr.vpHtml('s-dv',s.defVoice||'nova')}</div>
        </div>
        <button class="btn bp bsm" onclick="Scr.saveSettings()">Save Model Settings</button>
      </div>
      <div class="sett-sec ${tab==='controllers'?'on':''}">
        <div class="sett-grp">
          <div class="sett-gt">Main Controller</div>
          <div class="field" style="flex-direction:row;align-items:center;gap:12px"><label class="lbl" style="flex-shrink:0">Analysis Frequency</label><input type="number" min="3" max="100" value="${s.ctrlFreq||10}" style="width:70px" oninput="ST.settings.ctrlFreq=parseInt(this.value)||10"><span style="font-size:11px;color:var(--tmut)">messages between runs</span></div>
          <div class="tgl-wrap" onclick="ST.settings.streaming=!ST.settings.streaming;$('#s-stream').classList.toggle('on',ST.settings.streaming)">
            <div class="tgl ${s.streaming!==false?'on':''}" id="s-stream"></div>
            <span class="tgl-lbl">Enable streaming responses</span>
          </div>
        </div>
        <button class="btn bp bsm" onclick="Scr.saveSettings()">Save Controller Settings</button>
      </div>
      <div class="sett-sec ${tab==='memory'?'on':''}">
        <div class="sett-grp">
          <div class="sett-gt">Memory Configuration</div>
          <div class="field" style="flex-direction:row;align-items:center;gap:12px"><label class="lbl" style="flex-shrink:0">Short-term Window</label><input type="number" min="5" max="100" value="${s.stWindow||30}" style="width:70px" oninput="ST.settings.stWindow=parseInt(this.value)||30"><span style="font-size:11px;color:var(--tmut)">messages in context</span></div>
        </div>
        <button class="btn bp bsm" onclick="Scr.saveSettings()">Save Memory Settings</button>
      </div>
      <div class="sett-sec ${tab==='storage'?'on':''}">
        <div class="sett-grp">
          <div class="sett-gt">Data Management</div>
          <p style="font-size:12px;color:var(--tdim)">All data is stored locally in your browser's IndexedDB. Export regularly to back up your scenarios and characters.</p>
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <button class="btn bs bsm" onclick="Scr.exportAll()">${I('download',12)} Export All</button>
            <button class="btn bs bsm" onclick="Scr.importAll()">${I('upload',12)} Import</button>
            <button class="btn bd bsm" onclick="Scr.clearAll()">🗑 Clear Everything</button>
          </div>
        </div>
      </div>
    </div>`;
  },
  async saveSettings(){
    await DB.setSetting('app_settings',ST.settings);Toast.s('Settings saved');
  },
  async exportAll(){
    const data={_theatro:true,version:1,exportedAt:Date.now(),characters:await DB.getAll('characters'),scenarios:await DB.getAll('scenarios'),settings:ST.settings};
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
    a.download=`theatro_backup_${Date.now()}.json`;a.click();Toast.s('Exported');
  },
  async importAll(){
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      try{
        const data=JSON.parse(await f.text());if(!data._theatro){Toast.e('Not a Theatro backup');return;}
        const ok=await Modal.confirm('Import characters and scenarios from file?',{ok:'Import'});if(!ok)return;
        for(const c of data.characters||[])await DB.put('characters',c);
        for(const s of data.scenarios||[])await DB.put('scenarios',s);
        Toast.s('Import complete');Scr.dashboard();
      }catch{Toast.e('Import failed');}
    };inp.click();
  },
  async clearAll(){
    const ok=await Modal.confirm('Permanently delete ALL data? Cannot be undone.',{ok:'Delete Everything',danger:true});if(!ok)return;
    const r=indexedDB.deleteDatabase('theatro');r.onsuccess=()=>{Toast.s('All data cleared. Reloading...');setTimeout(()=>location.reload(),1500)};
  },

  // ---- MODEL / VOICE PICKERS ----
  mpHtml(id,selId){
    const m=MODELS.find(x=>x.id===selId);
    return`<div><button class="mpbtn" onclick="Scr.openMP('${id}')" id="${id}-btn"><span id="${id}-lbl">${esc(m?.name||selId||'Select model')}</span><span class="arr">▼</span></button><input type="hidden" id="${id}" value="${esc(selId||'')}"></div>`;
  },
  openMP(id){
    const cur=$(`#${id}`)?.value;
    Modal.open({title:'Select Model',content:()=>`<div class="mlist">${
      MODELS.map(m=>`<div class="mopt ${m.id===cur?'sel':''}" onclick="Scr.selModel('${id}','${m.id}','${esc(m.name)}')">
        <div><div style="font-weight:600">${esc(m.name)}</div><div class="mopt-id">${esc(m.id)} · ${esc(m.provider)}</div><div style="font-size:11px;color:var(--tdim)">${esc(m.desc||'')}</div></div>
        ${m.rec?'<span class="mopt-rec">★ Recommended</span>':''}
      </div>`).join('')
    }</div>`});
  },
  selModel(id,val,name){
    const inp=$(`#${id}`);const lbl=$(`#${id}-lbl`);
    if(inp)inp.value=val;if(lbl)lbl.textContent=name;
    if(id==='cf-model')ST.charForm.modelId=val;
    else if(id==='s-cm')ST.settings.charModel=val;
    else if(id==='s-ctm')ST.settings.ctrlModel=val;
    Modal.close();
  },
  vpHtml(id,selId){
    const v=VOICES.find(x=>x.id===selId);
    return`<div><button class="mpbtn" onclick="Scr.openVP('${id}')" id="${id}-btn"><span id="${id}-lbl">${esc(v?.name||selId||'Select voice')}</span><span class="arr">▼</span></button><input type="hidden" id="${id}" value="${esc(selId||'nova')}"></div>`;
  },
  openVP(id){
    const cur=$(`#${id}`)?.value;
    Modal.open({title:'Select Voice',narrow:true,content:()=>`<div class="mlist">${
      VOICES.map(v=>`<div class="vopt ${v.id===cur?'sel':''}" onclick="Scr.selVoice('${id}','${v.id}','${esc(v.name)}')">
        <div style="flex:1"><div style="font-weight:600">${esc(v.name)}</div><div class="vopt-desc">${esc(v.desc)}</div></div>
        ${v.id===cur?'<span style="color:var(--gold)">✓</span>':''}
      </div>`).join('')
    }</div>`});
  },
  selVoice(id,val,name){
    const inp=$(`#${id}`);const lbl=$(`#${id}-lbl`);
    if(inp)inp.value=val;if(lbl)lbl.textContent=name;
    if(id==='cf-voice')ST.charForm.voice=val;
    else if(id==='s-dv')ST.settings.defVoice=val;
    Modal.close();
  }
};

// ===== INIT =====
async function init(){
  try{
    const saved=await DB.getSetting('app_settings');
    if(saved)Object.assign(ST.settings,saved);
  }catch{}
  // Show welcome banner if no key
  Router.go('dashboard');
  // Check if first run
  const chars=await DB.getAll('characters');
  if(!chars.length){
    setTimeout(()=>{
      Toast.i('Welcome to Theatro! Create characters, then build a scenario to begin.',7000);
    },500);
  }
}

init().catch(e=>console.error('Init failed:',e));
</script>
</body>
</html>
