<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ammar's Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary-color: #6a11cb;
            --secondary-color: #2575fc;
            --background-color: #121212;
            --text-color: #e0e0e0;
            --card-bg-color: #1e1e1e;
            --button-hover-brightness: 1.2;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --glow-color: rgba(106, 17, 203, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Hide scrollbars during animation */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); /* Deep space gradient */

        }

        /* Welcome Animation */
        #welcome-animation {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: fadeInOutScale 4s ease-in-out forwards;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px var(--glow-color);
        }

        @keyframes fadeInOutScale {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            25%, 75% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
                display: none; /* Hide after animation */
            }
        }

        /* Main Content Area - Appears after animation */
        #main-content {
            display: none; /* Initially hidden */
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 1000px;
            margin-top: 30px; /* Space from top after animation */
            opacity: 0;
            animation: fadeInContent 1s ease-out forwards 4s; /* Delay matches welcome animation */
        }

        @keyframes fadeInContent {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }


        h1.site-title {
            font-size: 2.5rem;
            margin-bottom: 40px;
            font-weight: 600;
            color: var(--text-color);
             text-shadow: 0 0 10px var(--glow-color);
        }

        #button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px; /* Space between buttons */
            margin-bottom: 30px;
        }

        /* General Button Styling */
        .hub-button, #add-button-trigger {
            display: inline-block;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(145deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 50px; /* Pill shape */
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px var(--shadow-color);
            transform: translateY(0);
            min-width: 180px; /* Minimum width for consistency */
        }

        .hub-button:hover, #add-button-trigger:hover {
            filter: brightness(var(--button-hover-brightness));
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 20px var(--glow-color);
        }

        .hub-button:active, #add-button-trigger:active {
             transform: translateY(0px) scale(0.98);
             box-shadow: 0 2px 10px var(--shadow-color);
        }

         /* Specific style for the Add button */
         #add-button-trigger {
             background: linear-gradient(145deg, #1e6b1e, #38a138); /* Green gradient for add */
         }
         #add-button-trigger:hover {
             box-shadow: 0 8px 20px rgba(56, 161, 56, 0.5); /* Green glow */
         }

        /* Add Button Form Styling */
        #add-form {
            display: none; /* Initially hidden */
            background-color: var(--card-bg-color);
            padding: 30px;
            border-radius: 15px;
            margin-top: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 90%;
            max-width: 400px;
            animation: slideDownFadeIn 0.5s ease-out;
        }

        @keyframes slideDownFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }


        #add-form label {
            display: block;
            margin-bottom: 8px;
            font-weight: 400;
            color: #bbb;
        }

        #add-form input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: var(--text-color);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        #add-form input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.3);
        }

        #add-form button {
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(145deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: filter 0.3s ease;
            margin-top: 10px;
            width: 100%; /* Make button full width */
        }

        #add-form button:hover {
            filter: brightness(var(--button-hover-brightness));
        }

        /* Footer */
        footer {
            position: absolute; /* Fixed at bottom */
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #aaa;
            opacity: 0; /* Fade in with content */
            animation: fadeInContent 1s ease-out forwards 4.2s; /* Slightly delayed */
        }
    </style>
</head>
<body>

    <!-- Welcome Animation -->
    <div id="welcome-animation">Welcome To Ammar's Hub</div>

    <!-- Main Content Area -->
    <div id="main-content">
        <h1 class="site-title">Ammar's Hub</h1>

        <!-- Container for Dynamic Buttons -->
        <div id="button-container">
            <!-- Initial Buttons -->
            <a href="Watchlist/index.html" class="hub-button">Watchlist</a>
            <a href="OnePieceWiki/OnePieceWiki.html" class="hub-button">One Piece Wiki</a>

            <!-- Persistent Add Button Trigger -->
            <button id="add-button-trigger" class="hub-button">+</button>
        </div>

        <!-- Form to Add New Buttons (Initially Hidden) -->
        <div id="add-form">
            <h3 style="text-align: center; margin-bottom: 20px; font-weight: 600;">Add New Link</h3>
            <label for="new-button-name">Button Name:</label>
            <input type="text" id="new-button-name" placeholder="e.g., My Project">

            <label for="new-button-path">Path / URL:</label>
            <input type="text" id="new-button-path" placeholder="e.g., Project/start.html or https://...">

            <button id="submit-new-button">Add Button</button>
        </div>

    </div>

    <!-- Copyright Footer -->
    <footer>
        Ammar © All copyright revised.
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const welcomeAnimation = document.getElementById('welcome-animation');
            const mainContent = document.getElementById('main-content');
            const buttonContainer = document.getElementById('button-container');
            const addButtonTrigger = document.getElementById('add-button-trigger');
            const addForm = document.getElementById('add-form');
            const newButtonNameInput = document.getElementById('new-button-name');
            const newButtonPathInput = document.getElementById('new-button-path');
            const submitNewButton = document.getElementById('submit-new-button');

            // 1. Handle Welcome Animation and Content Fade-in
            // Using animationend event is more robust than fixed setTimeout
            welcomeAnimation.addEventListener('animationend', () => {
                welcomeAnimation.style.display = 'none'; // Ensure it's hidden
                mainContent.style.display = 'flex';    // Show main content
                document.body.style.overflow = 'auto'; // Restore scrollbars if needed
            });

            // Fallback if animationend doesn't fire (e.g., browser issues)
            // setTimeout(() => {
            //     if (welcomeAnimation.style.display !== 'none') { // Only run if not already hidden
            //          welcomeAnimation.style.display = 'none';
            //          mainContent.style.display = 'flex';
            //          document.body.style.overflow = 'auto';
            //     }
            // }, 4100); // Slightly longer than animation duration

            // 2. Toggle Add Button Form Visibility
            addButtonTrigger.addEventListener('click', () => {
                // Toggle display: none/block and handle animation reset if needed
                if (addForm.style.display === 'block') {
                    addForm.style.display = 'none';
                } else {
                    addForm.style.display = 'block';
                    // Optional: Clear fields when opening
                    // newButtonNameInput.value = '';
                    // newButtonPathInput.value = '';
                }
            });

            // 3. Handle New Button Submission
            submitNewButton.addEventListener('click', () => {
                const name = newButtonNameInput.value.trim();
                const path = newButtonPathInput.value.trim();

                if (name && path) {
                    // Create the new button (link)
                    const newLink = document.createElement('a');
                    newLink.href = path;
                    newLink.textContent = name;
                    newLink.classList.add('hub-button'); // Apply the same styling class

                    // Insert the new button *before* the "Add" button trigger
                    buttonContainer.insertBefore(newLink, addButtonTrigger);

                    // Clear the input fields
                    newButtonNameInput.value = '';
                    newButtonPathInput.value = '';

                    // Hide the form
                    addForm.style.display = 'none';
                } else {
                    alert('Please enter both a name and a path for the new button.');
                }
            });
        });
    </script>

</body>
</html>
