<img" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Drop image here or click to upload</span></div>
<img id="refPreview" alt="" style="display:none">
<input type="file" id="refFileInput" accept="image/*" style="display:none">
</div>
<div class="ref-url-row"><input type="url" id="refUrlInput" placeholder="Or paste image URL..."><button class="btn-sm" id="refUrlBtn" type="button">Load</button></div>
</div>

<div class="p-section">
<div class="p-label"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="15" height="15"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>Model</div>
<select class="p-select" id="modelSelect">
<optgroup label="Direct">
<option value="gptimage-2">GPT Image 2 - OpenAI</option>
<option value="flux-2">Flux 2 - Black Forest Labs</option>
<option value="gptimage-1.5">GPT Image 1.5 - OpenAI</option>
<option value="zimage">ZImage - Fast</option>
<option value="grok-image">Grok Imagine 1.0 - xAI</option>
<option value="midjourney">Midjourney 7</option>
<option value="qwen-image">Qwen Image</option>
<option value="seedream">Seedream 5 Lite</option>
</optgroup>
<optgroup label="Async (polling)">
<option value="imagen4">Imagen 4 - Google</option>
<option value="nanobanana">NanoBanana - Gemini Flash</option>
<option value="nanobanana-pro">NanoBanana Pro - Gemini Pro</option>
</optgroup>
</select>
</div>

<div class="p-section">
<div class="p-label"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="15" height="15"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>Aspect Ratio</div>
<div class="ratio-row">
<button class="ratio-btn active" data-ratio="square" type="button"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="14" height="14" rx="1"/></svg><span>1:1</span></button>
<button class="ratio-btn" data-ratio="landscape" type="button"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="4" width="18" height="12" rx="1"/></svg><span>16:9</span></button>
<button class="ratio-btn" data-ratio="portrait" type="button"><svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="1" width="12" height="18" rx="1"/></svg><span>9:16</span></button>
</div>
<!-- NEW: Custom ratio -->
<div class="custom-ratio-wrap" id="customRatioWrap">
<div class="custom-ratio-row">
<input type="text" id="customRatioInput" placeholder="e.g. 4:7, 2:3, 21:9" maxlength="7">
<button class="btn-sm" id="customRatioApply" type="button">Set</button>
</div>
</div>
<button class="btn-add-style" id="customRatioBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Custom Ratio</button>
</div>

<div class="p-section">
<div class="p-label"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="15" height="15"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>Style</div>
<div class="style-chips" id="styleChips">
<button class="schip active" data-style="" type="button">None</button>
<button class="schip" data-style="cinematic" type="button">Cinematic</button>
<button class="schip" data-style="anime" type="button">Anime</button>
<button class="schip" data-style="3d render" type="button">3D Render</button>
<button class="schip" data-style="oil painting" type="button">Oil Painting</button>
<button class="schip" data-style="watercolor" type="button">Watercolor</button>
<button class="schip" data-style="cyberpunk" type="button">Cyberpunk</button>
<button class="schip" data-style="photorealistic" type="button">Photorealistic</button>
<button class="schip" data-style="fantasy" type="button">Fantasy</button>
<button class="schip" data-style="minimalist" type="button">Minimalist</button>
</div>
<div class="add-style-row" id="addStyleRow" style="display:none"><input type="text" id="customStyleInput" placeholder="Custom style name..." maxlength="30"><button class="btn-sm" id="addStyleConfirm" type="button">Add</button></div>
<button class="btn-add-style" id="addStyleBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Style</button>
</div>

<div class="p-section">
<div class="p-label"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" width="15" height="15"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Number of Images</div>
<div class="count-grid"><button class="cbtn active" data-count="1" type="button">1</button><button class="cbtn" data-count="2" type="button">2</button><button class="cbtn" data-count="3" type="button">3</button><button class="cbtn" data-count="4" type="button">4</button></div>
</div>

<!-- NEW: Enhance button (visible in manual mode) -->
<div class="p-section" id="enhanceSection" style="display:none">
<button class="btn-enhance" id="enhanceBtn" type="button">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/><line x1="17" y1="1" x2="17" y2="5"/><line x1="15" y1="3" x2="19" y2="3"/></svg>
<span>Enhance Prompt</span>
</button>
</div>

<button class="btn-generate" id="generateBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg><span>Generate</span></button>
</div>
</div>
</div>
</main>
</div>

<nav class="mobile-nav" id="mobileNav">
<div class="mobile-nav-inner">
<div class="mnav active" data-view="images"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Images</span></div>
<div class="mnav" data-view="favorites"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Favorites</span></div>

</div>
</nav>

<button class="fab" id="fabBtn" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>

<div class="modal-overlay" id="imageModal">
<div class="modal modal-viewer">
<div class="viewer-img-wrap">
<img id="viewerImg" alt="">
<button class="viewer-close" id="viewerClose" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
</div>
<div class="viewer-info">
<p id="viewerPrompt"></p>
<div class="viewer-meta" id="viewerMeta"></div>
<div class="viewer-actions">
<button class="btn-secondary" id="viewerDownload" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download</button>
<button class="btn-secondary" id="viewerCopy" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copy Prompt</button>
<button class="btn-secondary btn-fav-toggle" id="viewerFav" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
<button class="btn-secondary btn-danger" id="viewerDelete" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
</div>
</div>
</div>
</div>

<div class="toast-wrap" id="toastWrap"></div>
<script src="app.js"></script>
