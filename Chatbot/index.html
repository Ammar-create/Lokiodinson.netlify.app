<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Loki Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #888;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    .chat-container {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      flex-direction: row-reverse;
      align-self: flex-end;
    }

    .message.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, #FFD700, #FFA500);
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 4px;
      backdrop-filter: blur(10px);
    }

    .message.loading .bubble {
      background: rgba(255, 255, 255, 0.05);
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      background: #FFD700;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-container {
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
    }

    #userInput {
      flex: 1;
      padding: 14px 20px;
      border: none;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    #userInput::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }

    #userInput:focus {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.3);
    }

    #sendBtn {
      padding: 14px 28px;
      border: none;
      border-radius: 25px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1e1e2f;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #sendBtn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
    }

    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .welcome-message {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.6);
    }

    .welcome-message h2 {
      color: #FFD700;
      margin-bottom: 10px;
    }

    .error {
      background: rgba(255, 71, 87, 0.2) !important;
      border: 1px solid rgba(255, 71, 87, 0.5);
    }

    @media (max-width: 600px) {
      .message {
        max-width: 90%;
      }
      
      .header h1 {
        font-size: 1.5rem;
      }
      
      #sendBtn span {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Loki Chatbot</h1>
    <p>Powered by Pollination AI</p>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="welcome-message">
      <h2>👋 Welcome!</h2>
      <p>I'm Loki, your AI assistant. Ask me anything!</p>
    </div>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <input 
        type="text" 
        id="userInput" 
        placeholder="Type your message..." 
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">
        <span>Send</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Enter key support
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function addMessage(text, isUser, isLoading = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user' : 'bot'}${isLoading ? ' loading' : ''}`;
      
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = isUser ? '🙂' : '🤖';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      
      if (isLoading) {
        bubble.innerHTML = `
          <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
        `;
      } else {
        bubble.textContent = text;
      }
      
      messageDiv.appendChild(avatar);
      messageDiv.appendChild(bubble);
      
      // Remove welcome message on first real message
      const welcome = chatContainer.querySelector('.welcome-message');
      if (welcome) welcome.remove();
      
      chatContainer.appendChild(messageDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      
      return messageDiv;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Add user message
      addMessage(message, true);
      userInput.value = '';
      userInput.disabled = true;
      sendBtn.disabled = true;

      // Add loading indicator
      const loadingMsg = addMessage('', false, true);

      try {
        // Using Pollination AI text generation API
        // This is their open endpoint - no API key needed for basic usage!
        const prompt = encodeURIComponent(message);
        const seed = Math.floor(Math.random() * 1000000);
        
        // Pollination text generation endpoint
        const response = await fetch(
          `https://text.pollinations.ai/${prompt}?seed=${seed}&width=800&height=200`,
          {
            method: 'GET',
            headers: {
              'Accept': 'text/plain',
            }
          }
        );

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const reply = await response.text();
        
        // Remove loading and add actual response
        loadingMsg.remove();
        addMessage(reply || "I'm not sure how to respond to that. Try asking something else!", false);
        
      } catch (error) {
        console.error('Error:', error);
        loadingMsg.remove();
        const errorMsg = addMessage(
          "⚠️ Oops! I'm having trouble connecting right now. Please try again in a moment.",
          false
        );
        errorMsg.querySelector('.bubble').classList.add('error');
      } finally {
        userInput.disabled = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    // Focus input on load
    userInput.focus();
  </script>
</body>
</html>
